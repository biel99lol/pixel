<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body>
<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const imgUrl = urlParams.get('url');
    const w = parseInt(urlParams.get('w')) || 64;
    const h = parseInt(urlParams.get('h')) || 64;

    if (!imgUrl) {
        document.write(JSON.stringify({ error: "missing url parameter" }));
        return;
    }

    async function loadImage(url) {
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
        const response = await fetch(proxyUrl);
        const blob = await response.blob();
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = URL.createObjectURL(blob);
        });
    }

    loadImage(imgUrl).then(img => {
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const imgData = ctx.getImageData(0, 0, w, h).data;

        const palette = [];
        const paletteMap = {};
        const indices = [];

        for (let i = 0; i < imgData.length; i += 4) {
            const r = imgData[i];
            const g = imgData[i+1];
            const b = imgData[i+2];
            const a = imgData[i+3];
            
            if (a === 0) {
                indices.push(-1);
                continue;
            }
            
            const key = r + "," + g + "," + b;
            
            if (paletteMap[key] === undefined) {
                paletteMap[key] = palette.length;
                palette.push([r, g, b]);
            }
            indices.push(paletteMap[key]);
        }

        const result = JSON.stringify({ w: w, h: h, p: palette, i: indices });
        document.write(result);
    }).catch(err => {
        document.write(JSON.stringify({ error: err.message }));
    });
})();
</script>
</body>
</html>
