<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mouse + Teclado Virtual - Funcional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        /* Tela principal */
        .screen {
            flex: 1;
            background: #1e1e2e;
            margin: 10px;
            border-radius: 24px;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }
        .app-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            min-height: 100%;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
        }
        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 5px;
            font-size: 14px;
        }
        /* Cursor flutuante */
        .floating-cursor {
            position: fixed;
            width: 60px;
            height: 60px;
            background: rgba(88, 101, 242, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            z-index: 10000;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.5);
            cursor: grab;
            touch-action: none;
            transition: transform 0.05s;
            backdrop-filter: blur(4px);
            border: 2px solid white;
        }
        .floating-cursor:active {
            transform: scale(0.95);
            cursor: grabbing;
        }
        /* Teclado virtual */
        .virtual-keyboard {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 42, 0.98);
            backdrop-filter: blur(15px);
            border-top: 2px solid #5865F2;
            padding: 10px;
            z-index: 10001;
            transition: transform 0.3s;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .key {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 12px 10px;
            border-radius: 10px;
            font-size: 14px;
            min-width: 45px;
            text-align: center;
            cursor: pointer;
            transition: 0.03s linear;
        }
        .key:active {
            transform: scale(0.92);
            background: #5865F2;
        }
        .key.special {
            background: #eb459e;
            min-width: 60px;
        }
        .key.wide {
            min-width: 120px;
        }
        .keyboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            margin-bottom: 10px;
        }
        .keyboard-title {
            color: #eb459e;
            font-weight: bold;
        }
        .minimize-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 280px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 10px;
            border-radius: 25px;
            text-align: center;
            z-index: 10002;
            animation: fadeUp 0.3s;
            font-size: 13px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="screen">
    <div class="app-card">
        <h2>🎮 Mouse + Teclado Virtual</h2>
        <p style="margin: 10px 0; color: #666;">✅ Funciona DENTRO desta página</p>
        <input type="text" id="campo1" placeholder="Campo de texto - Clique aqui e digite">
        <textarea id="campo2" placeholder="Área de texto" rows="3"></textarea>
        <button onclick="alert('Botão clicado pelo mouse virtual!')">Clique em mim</button>
        <p style="margin-top: 20px; color: #888; font-size: 12px;">
            🖱️ Arraste o cursor azul pela tela<br>
            🖱️ Toque RÁPIDO no cursor = clique<br>
            ⌨️ Teclado virtual na parte inferior
        </p>
    </div>
</div>

<div id="cursor" class="floating-cursor">🖱️</div>

<div id="keyboard" class="virtual-keyboard">
    <div class="keyboard-header">
        <span class="keyboard-title">⌨️ TECLADO VIRTUAL</span>
        <button id="minimizeBtn" class="minimize-btn">─ Minimizar</button>
    </div>
    <div id="keyboardRows">
        <div class="keyboard-row">
            <button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button>
            <button class="key" data-key="0">0</button><button class="key special" data-key="Backspace">⌫</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="q">q</button><button class="key" data-key="w">w</button><button class="key" data-key="e">e</button>
            <button class="key" data-key="r">r</button><button class="key" data-key="t">t</button><button class="key" data-key="y">y</button>
            <button class="key" data-key="u">u</button><button class="key" data-key="i">i</button><button class="key" data-key="o">o</button>
            <button class="key" data-key="p">p</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button><button class="key" data-key="d">d</button>
            <button class="key" data-key="f">f</button><button class="key" data-key="g">g</button><button class="key" data-key="h">h</button>
            <button class="key" data-key="j">j</button><button class="key" data-key="k">k</button><button class="key" data-key="l">l</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="Shift">⇧ Shift</button><button class="key" data-key="z">z</button><button class="key" data-key="x">x</button>
            <button class="key" data-key="c">c</button><button class="key" data-key="v">v</button><button class="key" data-key="b">b</button>
            <button class="key" data-key="n">n</button><button class="key" data-key="m">m</button><button class="key special" data-key="Enter">↵ Enter</button>
        </div>
        <div class="keyboard-row">
            <button class="key wide" data-key="Space">ESPAÇO</button>
            <button class="key special" data-key="ArrowLeft">←</button>
            <button class="key special" data-key="ArrowRight">→</button>
        </div>
    </div>
</div>

<script>
    // ==================== VARIÁVEIS ====================
    let shiftPressed = false;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let lastTapTime = 0;
    let keyboardVisible = true;
    
    // Elementos
    const cursor = document.getElementById('cursor');
    const keyboard = document.getElementById('keyboard');
    const keyboardRows = document.getElementById('keyboardRows');
    const minimizeBtn = document.getElementById('minimizeBtn');
    
    // Posição inicial do cursor
    let cursorX = window.innerWidth - 100;
    let cursorY = window.innerHeight - 250;
    cursor.style.left = cursorX + 'px';
    cursor.style.top = cursorY + 'px';
    
    // ==================== FUNÇÕES ====================
    
    function mostrarToast(msg, cor = '#5865F2') {
        let toast = document.querySelector('.toast');
        if(toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }
    
    // Obter elemento ativo (input/textarea)
    function getActiveElement() {
        let active = document.activeElement;
        if(!active || active === document.body) {
            let input = document.querySelector('input, textarea');
            if(input) {
                input.focus();
                return input;
            }
            mostrarToast('⚠️ Clique em um campo de texto primeiro', '#faa61a');
            return null;
        }
        return active;
    }
    
    // Enviar clique na posição do cursor
    function sendClick() {
        const x = cursorX + 30;
        const y = cursorY + 30;
        let element = document.elementFromPoint(x, y);
        
        if(element) {
            // Disparar eventos
            element.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, clientX: x, clientY: y }));
            element.dispatchEvent(new MouseEvent('mouseup', { bubbles: true, clientX: x, clientY: y }));
            element.dispatchEvent(new MouseEvent('click', { bubbles: true, clientX: x, clientY: y }));
            
            // Se for input, focar
            if(element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                element.focus();
                mostrarToast('🖱️ Campo focado', '#23a55a');
            } else {
                mostrarToast('🖱️ Clique', '#5865F2');
            }
        }
    }
    
    // Enviar caractere
    function sendChar(char) {
        let el = getActiveElement();
        if(!el) return;
        
        let finalChar = shiftPressed && /[a-z]/.test(char) ? char.toUpperCase() : char;
        
        let start = el.selectionStart || 0;
        let end = el.selectionEnd || 0;
        let newValue = el.value.slice(0, start) + finalChar + el.value.slice(end);
        el.value = newValue;
        el.selectionStart = el.selectionEnd = start + 1;
        
        el.dispatchEvent(new Event('input', { bubbles: true }));
        mostrarToast(`⌨️ ${finalChar}`, '#23a55a');
        
        // Resetar shift após usar
        if(shiftPressed && /[a-z]/.test(char)) {
            shiftPressed = false;
            mostrarToast('🔡 Shift desativado', '#faa61a');
        }
    }
    
    // Teclas especiais
    function sendSpecial(key) {
        let el = getActiveElement();
        if(!el) return;
        
        if(key === 'Backspace') {
            let start = el.selectionStart || 0;
            let end = el.selectionEnd || 0;
            if(start === end && start > 0) {
                el.value = el.value.slice(0, start-1) + el.value.slice(end);
                el.selectionStart = el.selectionEnd = start-1;
            } else if(start !== end) {
                el.value = el.value.slice(0, start) + el.value.slice(end);
                el.selectionStart = el.selectionEnd = start;
            }
            el.dispatchEvent(new Event('input', { bubbles: true }));
            mostrarToast('⌨️ Apagar', '#5865F2');
        }
        else if(key === 'Enter') {
            sendChar('\n');
        }
        else if(key === 'Shift') {
            shiftPressed = !shiftPressed;
            mostrarToast(shiftPressed ? '🔠 MAIÚSCULAS ATIVADO' : '🔡 minúsculas', '#faa61a');
        }
        else if(key === 'Space') {
            sendChar(' ');
        }
        else if(key === 'ArrowLeft') {
            let pos = el.selectionStart || 0;
            if(pos > 0) {
                el.selectionStart = el.selectionEnd = pos - 1;
            }
        }
        else if(key === 'ArrowRight') {
            let pos = el.selectionStart || 0;
            let max = el.value.length;
            if(pos < max) {
                el.selectionStart = el.selectionEnd = pos + 1;
            }
        }
    }
    
    function sendScroll(delta) {
        window.scrollBy(0, delta);
        mostrarToast(`📜 ${delta > 0 ? 'Scroll ↓' : 'Scroll ↑'}`, '#faa61a');
    }
    
    // ==================== MOUSE DRAG ====================
    cursor.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = cursor.getBoundingClientRect();
        dragStartX = touch.clientX - rect.left;
        dragStartY = touch.clientY - rect.top;
        isDragging = false;
        
        // Detectar tap rápido (clique)
        const now = Date.now();
        if(now - lastTapTime < 200) {
            sendClick();
            lastTapTime = 0;
        } else {
            isDragging = true;
            lastTapTime = now;
        }
    });
    
    cursor.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        let newX = touch.clientX - dragStartX;
        let newY = touch.clientY - dragStartY;
        
        newX = Math.max(5, Math.min(window.innerWidth - 70, newX));
        newY = Math.max(60, Math.min(window.innerHeight - 200, newY));
        
        cursorX = newX;
        cursorY = newY;
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';
    });
    
    cursor.addEventListener('touchend', () => {
        isDragging = false;
    });
    
    // ==================== TECLADO ====================
    function minimizeKeyboard() {
        keyboardVisible = !keyboardVisible;
        if(keyboardVisible) {
            keyboardRows.style.display = 'flex';
            minimizeBtn.textContent = '─ Minimizar';
        } else {
            keyboardRows.style.display = 'none';
            minimizeBtn.textContent = '□ Maximizar';
        }
    }
    
    minimizeBtn.addEventListener('click', minimizeKeyboard);
    
    // Adicionar eventos às teclas
    document.querySelectorAll('.key').forEach(btn => {
        btn.addEventListener('click', () => {
            let key = btn.getAttribute('data-key');
            if(key === 'Backspace' || key === 'Enter' || key === 'Shift' || 
               key === 'Space' || key === 'ArrowLeft' || key === 'ArrowRight') {
                sendSpecial(key);
            } else {
                sendChar(key);
            }
        });
    });
    
    // Scroll buttons (opcional)
    const scrollUpBtn = document.createElement('button');
    const scrollDownBtn = document.createElement('button');
    scrollUpBtn.textContent = '▲';
    scrollDownBtn.textContent = '▼';
    scrollUpBtn.style.cssText = 'position:fixed; bottom:200px; right:20px; background:#5865F2; color:white; border:none; border-radius:50%; width:45px; height:45px; font-size:20px; z-index:9999;';
    scrollDownBtn.style.cssText = 'position:fixed; bottom:140px; right:20px; background:#5865F2; color:white; border:none; border-radius:50%; width:45px; height:45px; font-size:20px; z-index:9999;';
    
    scrollUpBtn.onclick = () => sendScroll(-200);
    scrollDownBtn.onclick = () => sendScroll(200);
    document.body.appendChild(scrollUpBtn);
    document.body.appendChild(scrollDownBtn);
    
    mostrarToast('✅ Mouse + Teclado Virtual ATIVADOS!', '#23a55a');
    mostrarToast('🖱️ Arraste o cursor | Toque rápido = clique', '#5865F2');
</script>
</body>
</html>
