<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegador Completo - Pesquisa e Abas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Barra superior */
        .toolbar {
            background: #2a2a3a;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #3a3a4a;
        }
        .url-bar {
            flex: 1;
            display: flex;
            gap: 8px;
            background: #1e1e2f;
            border-radius: 30px;
            padding: 5px 15px;
            align-items: center;
        }
        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 0;
            outline: none;
        }
        .url-bar button {
            background: #23a55a;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn:active { transform: scale(0.95); }
        /* Botões de atalho */
        .shortcuts {
            display: flex;
            gap: 8px;
            background: #2a2a3a;
            padding: 8px;
        }
        .shortcuts button {
            background: #1e1e2f;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        /* Abas */
        .tabs-container {
            background: #2a2a3a;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 5px 5px 0 5px;
        }
        .tab {
            background: #1e1e2f;
            color: white;
            padding: 10px 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            min-width: 150px;
            justify-content: space-between;
        }
        .tab.active {
            background: #5865F2;
        }
        .tab button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        .new-tab {
            background: #23a55a;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }
        /* Área do conteúdo */
        .content-area {
            flex: 1;
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        iframe.active {
            display: block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 9999;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="url-bar">
        <input type="text" id="urlInput" placeholder="Digite um site ou pesquise... Ex: roblox, youtube, google">
        <button id="goBtn">IR</button>
    </div>
    <button id="backBtn" class="nav-btn">◀</button>
    <button id="forwardBtn" class="nav-btn">▶</button>
    <button id="reloadBtn" class="nav-btn">🔄</button>
</div>
<div class="shortcuts">
    <button id="googleBtn">🔍 Google</button>
    <button id="youtubeBtn">📺 YouTube</button>
    <button id="robloxBtn">🎮 Roblox</button>
    <button id="discordBtn">🎙️ Discord</button>
    <button id="geradorBtn">📧 Gerador</button>
</div>
<div class="tabs-container" id="tabsContainer"></div>
<button id="newTabBtn" class="new-tab">+ NOVA ABA</button>
<div class="content-area" id="contentArea"></div>

<script>
    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;

    function mostrarToast(msg, cor = '#23a55a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function criarNovaTab(url = null) {
        const tabId = 'tab_' + (++tabCounter);
        const iframeId = 'iframe_' + tabId;
        
        const iframe = document.createElement('iframe');
        iframe.id = iframeId;
        iframe.src = url || 'https://www.google.com/webhp?igu=1';
        document.getElementById('contentArea').appendChild(iframe);
        
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.id = tabId;
        tabDiv.innerHTML = `
            <span>${url ? new URL(url).hostname : 'Nova aba'}</span>
            <button class="close-tab" data-tab="${tabId}">✕</button>
        `;
        document.getElementById('tabsContainer').appendChild(tabDiv);
        
        tabs.push({
            id: tabId,
            iframeId: iframeId,
            url: url || 'https://www.google.com/webhp?igu=1'
        });
        
        tabDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('close-tab')) return;
            ativarAba(tabId);
        });
        
        const closeBtn = tabDiv.querySelector('.close-tab');
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fecharAba(tabId);
        });
        
        ativarAba(tabId);
        return tabId;
    }

    function ativarAba(tabId) {
        activeTabId = tabId;
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        document.querySelectorAll('iframe').forEach(iframe => iframe.classList.remove('active'));
        document.getElementById(tab.iframeId).classList.add('active');
        
        const iframe = document.getElementById(tab.iframeId);
        try {
            const currentUrl = iframe.contentWindow.location.href;
            if (currentUrl && currentUrl !== 'about:blank') {
                document.getElementById('urlInput').value = currentUrl;
            }
        } catch(e) {
            document.getElementById('urlInput').value = tab.url;
        }
    }

    function fecharAba(tabId) {
        const index = tabs.findIndex(t => t.id === tabId);
        if (index === -1) return;
        
        const tab = tabs[index];
        const iframe = document.getElementById(tab.iframeId);
        if (iframe) iframe.remove();
        const tabDiv = document.getElementById(tabId);
        if (tabDiv) tabDiv.remove();
        
        tabs.splice(index, 1);
        
        if (tabs.length === 0) {
            criarNovaTab('https://www.google.com/webhp?igu=1');
        } else if (activeTabId === tabId) {
            const nextIndex = index > 0 ? index - 1 : 0;
            ativarAba(tabs[nextIndex].id);
        }
        mostrarToast('Aba fechada', '#5865F2');
    }

    function carregarUrlNaAbaAtiva(url) {
        if (!activeTabId) return;
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;
        
        let finalUrl = url;
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            if (finalUrl.includes('.')) {
                finalUrl = 'https://' + finalUrl;
            } else {
                finalUrl = 'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
            }
        }
        
        const iframe = document.getElementById(tab.iframeId);
        iframe.src = finalUrl;
        tab.url = finalUrl;
        
        const tabDiv = document.getElementById(tab.id);
        try {
            const host = new URL(finalUrl).hostname;
            tabDiv.querySelector('span').textContent = host;
        } catch(e) {
            tabDiv.querySelector('span').textContent = 'Carregando...';
        }
        
        document.getElementById('urlInput').value = finalUrl;
        mostrarToast('🔍 Carregando: ' + finalUrl, '#23a55a');
    }

    function navegar(dir) {
        if (!activeTabId) return;
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;
        const iframe = document.getElementById(tab.iframeId);
        try {
            if (dir === 'back') iframe.contentWindow.history.back();
            else iframe.contentWindow.history.forward();
        } catch(e) {
            mostrarToast('Não foi possível navegar', '#ed4245');
        }
    }

    function recarregar() {
        if (!activeTabId) return;
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;
        const iframe = document.getElementById(tab.iframeId);
        iframe.src = iframe.src;
        mostrarToast('🔄 Recarregando página', '#5865F2');
    }

    document.getElementById('goBtn').addEventListener('click', () => {
        const url = document.getElementById('urlInput').value;
        if (url.trim()) carregarUrlNaAbaAtiva(url);
    });
    
    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const url = document.getElementById('urlInput').value;
            if (url.trim()) carregarUrlNaAbaAtiva(url);
        }
    });
    
    document.getElementById('backBtn').addEventListener('click', () => navegar('back'));
    document.getElementById('forwardBtn').addEventListener('click', () => navegar('forward'));
    document.getElementById('reloadBtn').addEventListener('click', recarregar);
    document.getElementById('newTabBtn').addEventListener('click', () => criarNovaTab('https://www.google.com/webhp?igu=1'));
    
    document.getElementById('googleBtn').addEventListener('click', () => carregarUrlNaAbaAtiva('https://www.google.com'));
    document.getElementById('youtubeBtn').addEventListener('click', () => carregarUrlNaAbaAtiva('https://www.youtube.com'));
    document.getElementById('robloxBtn').addEventListener('click', () => carregarUrlNaAbaAtiva('https://www.roblox.com'));
    document.getElementById('discordBtn').addEventListener('click', () => carregarUrlNaAbaAtiva('https://discord.com/register'));
    document.getElementById('geradorBtn').addEventListener('click', () => carregarUrlNaAbaAtiva('https://biel99lol.github.io/pixel/web.html'));
    
    criarNovaTab('https://www.google.com/webhp?igu=1');
    mostrarToast('✅ Navegador completo! Várias abas, pesquisas e botões de atalho.', '#23a55a');
</script>
</body>
</html>
