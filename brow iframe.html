<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Navegador Chromium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#202124;--bar:#292a2d;--card:#35363a;--hover:#3c4043;--blue:#8ab4f8;--txt:#e8eaed;--dim:#9aa0a6}
body{background:var(--bg);font-family:system-ui;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#titlebar{background:var(--bar);height:38px;display:flex;align-items:center;padding:0 6px;gap:2px;overflow-x:auto}
#tabsContainer{display:flex;gap:2px;height:100%}
.tab{background:var(--card);color:var(--dim);padding:6px 12px;border-radius:10px 10px 0 0;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--bg);color:var(--txt)}
.tab-ttl{max-width:120px;overflow:hidden;text-overflow:ellipsis}
.tab-x{width:18px;text-align:center}
#newTab{background:var(--card);border:none;color:#fff;width:34px;border-radius:12px;font-size:20px}
#winctrls{display:flex;gap:8px;margin-left:auto;padding-left:8px}
.wc{width:14px;height:14px;border-radius:50%}
.wc.min{background:#f0c132}.wc.max{background:#34c749}.wc.cls{background:#ea4335}
#toolbar{background:var(--bar);padding:6px 10px;display:flex;gap:6px;border-bottom:1px solid #000}
.nb{background:transparent;border:none;color:var(--dim);width:34px;height:34px;border-radius:50%;font-size:16px}
.nb:active{background:var(--hover)}
#omnibox{flex:1;display:flex;background:#111;border:1px solid #3c4043;border-radius:24px;padding:0 12px;align-items:center;gap:8px}
#urlInput{flex:1;background:transparent;border:none;color:#fff;font-size:13px;outline:none}
#menubtn{background:transparent;border:none;color:var(--dim);font-size:22px;width:34px}
#viewport{flex:1;position:relative}
#mainFrame{width:100%;height:100%;border:none}
#cursor{position:fixed;width:16px;height:16px;border:2px solid #8ab4f8;border-radius:50%;background:rgba(138,180,248,0.3);pointer-events:none;z-index:999999;transition:all 0.05s ease}
#mpad{position:fixed;right:10px;bottom:250px;width:160px;background:#1e1e2e;border-radius:16px;border:1px solid #333;z-index:10000}
#mhead{padding:8px;text-align:center;font-size:10px;color:#888;cursor:move}
#tpad{height:90px;margin:0 8px;background:#0a0a10;border-radius:10px;border:1px solid #333}
#mbtns{display:flex;gap:8px;padding:8px}
#lbtn,#rbtn{flex:1;height:32px;border-radius:8px;border:none;font-weight:bold}
#lbtn{background:#1a5e35;color:#81c995}#rbtn{background:#5e1a1a;color:#f28b82}
#srow{display:flex;gap:8px;padding:0 8px 8px}
#sup,#sdn,#smid{flex:1;height:28px;background:#0f0f18;border:1px solid #333;color:#aaa;border-radius:6px}
#kbd{position:fixed;bottom:0;left:0;right:0;background:#111118;border-top:1px solid #333;padding:4px;z-index:10001}
#kbd.koff{display:none}
#kbar{display:flex;gap:4px;padding:4px;overflow-x:auto}
.qk{background:#1e1e2a;border:1px solid #333;color:#ccc;padding:6px 12px;border-radius:8px;font-size:11px}
.kr{display:flex;gap:3px;justify-content:center;margin-bottom:3px}
.k{background:#252532;border:1px solid #333;color:#ddd;border-radius:8px;height:38px;min-width:28px;display:flex;align-items:center;justify-content:center;font-size:11px;flex:1}
.k.space{flex:4}.k.back{min-width:48px}
.toast{position:fixed;bottom:100px;left:20px;right:20px;background:#333;color:#fff;padding:10px;border-radius:30px;text-align:center;z-index:99999}
</style>
</head>
<body>

<div id="titlebar">
  <div id="tabsContainer"></div>
  <button id="newTab">+</button>
  <div id="winctrls">
    <div class="wc min"></div>
    <div class="wc max"></div>
    <div class="wc cls"></div>
  </div>
</div>

<div id="toolbar">
  <button id="backBtn" class="nb">◀</button>
  <button id="forwardBtn" class="nb">▶</button>
  <button id="reloadBtn" class="nb">⟳</button>
  <div id="omnibox">
    <span>🔒</span>
    <input type="text" id="urlInput" placeholder="Digite URL ou pesquisa">
  </div>
  <button id="menubtn">⋮</button>
</div>

<div id="viewport">
  <iframe id="mainFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-popups-to-escape-sandbox"></iframe>
</div>

<div id="cursor"></div>

<div id="mpad">
  <div id="mhead">⋮⋮ TRACKPAD ⋮⋮</div>
  <div id="tpad"></div>
  <div id="mbtns"><button id="lbtn">LMB</button><button id="rbtn">RMB</button></div>
  <div id="srow"><button id="sup">▲</button><button id="smid">●</button><button id="sdn">▼</button></div>
</div>

<div id="kbd">
  <div id="kbar">
    <div class="qk" data-key="Tab">Tab</div><div class="qk" data-key="Enter">Enter</div>
    <div class="qk" data-key="Escape">Esc</div><div class="qk" data-key="ArrowUp">↑</div>
    <div class="qk" data-key="ArrowDown">↓</div><div class="qk" data-key="ArrowLeft">←</div>
    <div class="qk" data-key="ArrowRight">→</div><div class="qk" data-key="Delete">Del</div>
  </div>
  <div class="kr" data-row="1"></div>
  <div class="kr" data-row="2"></div>
  <div class="kr" data-row="3"></div>
</div>

<script>
const START_URL = "https://www.google.com";

let tabs = [{id:1, url:START_URL, title:"Google"}];
let activeTabId = 1;
let tabCounter = 1;
let cursorX = window.innerWidth/2, cursorY = window.innerHeight/2;

function getDoc(){ try{ return document.getElementById('mainFrame').contentDocument; }catch(e){ return null; } }
function getWin(){ try{ return document.getElementById('mainFrame').contentWindow; }catch(e){ return null; } }

function updateCursor(){
  let c = document.getElementById('cursor');
  c.style.left = (cursorX-8)+'px';
  c.style.top = (cursorY-8)+'px';
}
function setCursor(x,y){
  cursorX = Math.min(window.innerWidth-5, Math.max(5,x));
  cursorY = Math.min(window.innerHeight-20, Math.max(20,y));
  updateCursor();
}

function clickAt(btn){
  let iframe = document.getElementById('mainFrame');
  let doc = getDoc();
  if(!doc) return;
  let rect = iframe.getBoundingClientRect();
  let fx = cursorX - rect.left;
  let fy = cursorY - rect.top;
  if(fx<0 || fy<0 || fx>rect.width || fy>rect.height) return;
  let el = doc.elementFromPoint(fx, fy);
  if(!el) return;
  if(btn=='left'){
    el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,clientX:fx,clientY:fy,button:0}));
    el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true,clientX:fx,clientY:fy,button:0}));
    el.dispatchEvent(new MouseEvent('click',{bubbles:true,clientX:fx,clientY:fy,button:0}));
  }else{
    el.dispatchEvent(new MouseEvent('contextmenu',{bubbles:true,clientX:fx,clientY:fy,button:2}));
  }
  let c = document.getElementById('cursor');
  c.style.borderColor = btn=='left' ? '#81c995' : '#f28b82';
  setTimeout(()=>c.style.borderColor='#8ab4f8',150);
}

function sendKey(key,code,mods={}){
  let doc=getDoc();
  let act = doc?.activeElement || doc?.body;
  if(!act) return;
  act.dispatchEvent(new KeyboardEvent('keydown',{key,code,bubbles:true,ctrlKey:mods.ctrl,altKey:mods.alt,shiftKey:mods.shift}));
  if(key!='Control'&&key!='Alt'&&key!='Shift') act.dispatchEvent(new KeyboardEvent('keypress',{key,code,bubbles:true}));
  act.dispatchEvent(new KeyboardEvent('keyup',{key,code,bubbles:true}));
}

function sendText(t){
  let doc=getDoc();
  let act = doc?.activeElement || doc?.body;
  if(!act) return;
  if(act.tagName=='INPUT'||act.tagName=='TEXTAREA'||act.isContentEditable){
    let s=act.selectionStart||0, e=act.selectionEnd||0;
    let val=act.value||act.innerText||'';
    let nv=val.substring(0,s)+t+val.substring(e);
    if(act.value!==undefined) act.value=nv;
    else act.innerText=nv;
    if(act.selectionStart!==undefined){ act.selectionStart=s+t.length; act.selectionEnd=s+t.length; }
    act.dispatchEvent(new InputEvent('input',{bubbles:true,data:t}));
  }
}

function navigate(url){
  let u=url.trim();
  if(!u) u=START_URL;
  if(!u.startsWith('http')) u=u.includes('.')?'https://'+u:'https://www.google.com/search?q='+encodeURIComponent(u);
  let iframe=document.getElementById('mainFrame');
  iframe.src=u;
  document.getElementById('urlInput').value=u;
  let tab=tabs.find(t=>t.id===activeTabId);
  if(tab) tab.url=u;
}

function addTab(url=START_URL){
  let id=++tabCounter;
  tabs.push({id,url,title:'Nova aba'});
  activeTabId=id;
  document.getElementById('mainFrame').src=url;
  document.getElementById('urlInput').value=url;
  updateTabs();
}
function closeTab(id){
  let idx=tabs.findIndex(t=>t.id===id);
  if(idx==-1) return;
  tabs.splice(idx,1);
  if(tabs.length==0) addTab();
  else if(activeTabId===id){
    activeTabId=tabs[Math.min(idx,tabs.length-1)].id;
    let tab=tabs.find(t=>t.id===activeTabId);
    document.getElementById('mainFrame').src=tab.url;
    document.getElementById('urlInput').value=tab.url;
  }
  updateTabs();
}
function switchTab(id){
  activeTabId=id;
  let tab=tabs.find(t=>t.id===id);
  if(tab){
    document.getElementById('mainFrame').src=tab.url;
    document.getElementById('urlInput').value=tab.url;
  }
  updateTabs();
}
function updateTabs(){
  let cont=document.getElementById('tabsContainer');
  cont.innerHTML='';
  tabs.forEach(t=>{
    let div=document.createElement('div');
    div.className='tab'+(t.id===activeTabId?' active':'');
    div.innerHTML=`<div class="tab-ttl">${t.title.substring(0,25)}</div><div class="tab-x">✕</div>`;
    div.onclick=(e)=>{
      if(e.target.classList.contains('tab-x')){ e.stopPropagation(); closeTab(t.id); }
      else switchTab(t.id);
    };
    cont.appendChild(div);
  });
}

let iframe=document.getElementById('mainFrame');
iframe.onload=()=>{
  setTimeout(()=>{
    try{
      let title=iframe.contentDocument?.title||new URL(iframe.src).hostname||'Aba';
      let tab=tabs.find(t=>t.id===activeTabId);
      if(tab) tab.title=title;
      updateTabs();
      document.getElementById('urlInput').value=iframe.src;
    }catch(e){}
  },300);
};

// Trackpad
let tpad=document.getElementById('tpad');
let drag=false, lx=0, ly=0;
tpad.addEventListener('touchstart',(e)=>{
  e.preventDefault(); drag=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY;
});
tpad.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  if(drag){
    let dx=(e.touches[0].clientX-lx)*2;
    let dy=(e.touches[0].clientY-ly)*2;
    setCursor(cursorX+dx, cursorY+dy);
    lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  }
});
tpad.addEventListener('touchend',(e)=>{ e.preventDefault(); drag=false; });

document.getElementById('lbtn').onclick=()=>clickAt('left');
document.getElementById('rbtn').onclick=()=>clickAt('right');
document.getElementById('sup').onclick=()=>{ let w=getWin(); w?.scrollBy(0,-300); };
document.getElementById('sdn').onclick=()=>{ let w=getWin(); w?.scrollBy(0,300); };
document.getElementById('smid').onclick=()=>clickAt('left');

// Teclado virtual
let layout={row1:['q','w','e','r','t','y','u','i','o','p'],row2:['a','s','d','f','g','h','j','k','l'],row3:['z','x','c','v','b','n','m']};
for(let r=1;r<=3;r++){
  let row=document.querySelector(`.kr[data-row="${r}"]`);
  row.innerHTML='';
  layout[`row${r}`].forEach(k=>{
    let d=document.createElement('div');
    d.className='k';
    d.textContent=k;
    d.onclick=()=>sendKey(k,`Key${k.toUpperCase()}`);
    row.appendChild(d);
  });
}
let lastRow=document.querySelector('.kr[data-row="3"]');
let space=document.createElement('div'); space.className='k space'; space.textContent='Espaço'; space.onclick=()=>sendKey(' ','Space');
let back=document.createElement('div'); back.className='k back'; back.textContent='⌫'; back.onclick=()=>sendKey('Backspace','Backspace');
lastRow.appendChild(space); lastRow.appendChild(back);

document.querySelectorAll('.qk').forEach(b=>{
  b.onclick=()=>{
    let key=b.dataset.key;
    let sp={'Enter':'Enter','Tab':'Tab','Escape':'Escape','ArrowUp':'ArrowUp','ArrowDown':'ArrowDown','ArrowLeft':'ArrowLeft','ArrowRight':'ArrowRight','Delete':'Delete'};
    if(sp[key]) sendKey(key,sp[key]);
  };
});

// Navegação
document.getElementById('urlInput').addEventListener('keypress',(e)=>{ if(e.key=='Enter') navigate(e.target.value); });
document.getElementById('backBtn').onclick=()=>{ try{ getWin()?.history.back(); }catch(e){} };
document.getElementById('forwardBtn').onclick=()=>{ try{ getWin()?.history.forward(); }catch(e){} };
document.getElementById('reloadBtn').onclick=()=>{ let f=document.getElementById('mainFrame'); f.src=f.src; };
document.getElementById('newTab').onclick=()=>addTab();
document.getElementById('menubtn').onclick=()=>{ document.getElementById('kbd').classList.toggle('koff'); };

// Mover mousepad
let mpad=document.getElementById('mpad');
let mDrag=false, mSx=0, mSy=0, mL=0, mT=0;
document.getElementById('mhead').addEventListener('touchstart',(e)=>{
  e.preventDefault(); mDrag=true; mSx=e.touches[0].clientX; mSy=e.touches[0].clientY;
  mL=mpad.offsetLeft; mT=mpad.offsetTop;
});
document.addEventListener('touchmove',(e)=>{
  if(!mDrag) return;
  e.preventDefault();
  let nl=mL+(e.touches[0].clientX-mSx);
  let nt=mT+(e.touches[0].clientY-mSy);
  nl=Math.min(window.innerWidth-mpad.offsetWidth,Math.max(0,nl));
  nt=Math.min(window.innerHeight-200,Math.max(0,nt));
  mpad.style.left=nl+'px'; mpad.style.right='auto';
  mpad.style.top=nt+'px'; mpad.style.bottom='auto';
});
document.addEventListener('touchend',()=>{ mDrag=false; });

// Toque na tela move cursor + clique
document.getElementById('viewport').addEventListener('touchstart',(e)=>{
  e.preventDefault();
  let t=e.touches[0];
  setCursor(t.clientX, t.clientY);
  clickAt('left');
});

// Fechar janela demo
document.querySelector('.wc.min').onclick=()=>alert('Minimizar demo');
document.querySelector('.wc.cls').onclick=()=>alert('Fechar demo');
document.querySelector('.wc.max').onclick=()=>alert('Maximizar demo');

// Iniciar
addTab(START_URL);
setCursor(window.innerWidth/2, window.innerHeight/2);
</script>
</body>
</html>
