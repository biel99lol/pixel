<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Chromium Navegador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#202124;--bar:#292a2d;--card:#35363a;--hover:#3c4043;
  --blue:#8ab4f8;--green:#81c995;--red:#f28b82;--yellow:#fdd663;
  --txt:#e8eaed;--dim:#9aa0a6;--bdr:#3c4043;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}

#titlebar{background:var(--bar);height:38px;display:flex;align-items:center;
  padding:0 6px;gap:2px;flex-shrink:0;border-bottom:1px solid #000;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:thin}
#titlebar::-webkit-scrollbar{height:3px}
#tabsContainer{display:flex;align-items:flex-end;gap:2px;height:100%}
.tab{background:var(--card);color:var(--dim);padding:6px 12px 5px;
  border-radius:10px 10px 0 0;font-size:12px;display:inline-flex;align-items:center;
  gap:6px;min-width:90px;max-width:160px;cursor:pointer;
  border:1px solid #000;border-bottom:none;white-space:nowrap;flex-shrink:0;
  height:34px}
.tab.active{background:var(--bg);color:var(--txt)}
.tab-ttl{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-x{width:18px;height:18px;display:inline-flex;align-items:center;
  justify-content:center;border-radius:50%;font-size:12px}
.tab-x:active{background:rgba(255,255,255,0.2)}
#newTab{background:var(--card);border:none;color:var(--txt);width:34px;height:30px;
  font-size:20px;cursor:pointer;border-radius:12px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
#newTab:active{background:var(--hover)}
#winctrls{display:flex;gap:8px;align-items:center;margin-left:auto;padding-left:8px;flex-shrink:0}
.wc{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer}
.wc.min{background:#f0c132}.wc.max{background:#34c749}.wc.cls{background:#ea4335}

#toolbar{background:var(--bar);padding:6px 10px;display:flex;align-items:center;
  gap:6px;flex-shrink:0;border-bottom:1px solid #000;position:relative}
#loadbar{position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--blue),#a78bfa);width:0;pointer-events:none}
.nb{background:transparent;border:none;color:var(--dim);width:34px;height:34px;
  border-radius:50%;font-size:16px;cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.nb:active{background:var(--hover)}
.nb[disabled]{opacity:.3}
#omnibox{flex:1;display:flex;align-items:center;background:#111;
  border:1.5px solid var(--bdr);border-radius:24px;padding:0 12px;
  height:36px;gap:8px;cursor:text}
#omnibox:focus-within{border-color:var(--blue)}
#lockico{font-size:13px}
#urlInput{flex:1;background:transparent;border:none;color:var(--txt);
  font-size:13px;outline:none}
#menubtn{background:transparent;border:none;color:var(--dim);font-size:22px;
  cursor:pointer;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
#menubtn:active{background:var(--hover)}

#viewport{flex:1;position:relative;overflow:hidden;background:#1a1a1a}
#iframeContainer{position:absolute;inset:0;width:100%;height:100%}
.contentFrame{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}

#mpad{position:fixed;right:12px;bottom:280px;width:170px;
  background:#12121ae6;backdrop-filter:blur(12px);
  border:1px solid #2a2a3a;border-radius:16px;z-index:10000;
  box-shadow:0 10px 40px rgba(0,0,0,0.6)}
#mhead{padding:8px 12px 4px;display:flex;justify-content:space-between;
  align-items:center;cursor:move}
#mhead span:first-child{color:#8ab4f8;font-size:9px;letter-spacing:1.8px}
#mhead span:last-child{color:#5a5a7a;font-size:16px;cursor:pointer}
#tpad{margin:0 10px;height:100px;background:#0a0a10;border-radius:12px;
  border:1px solid #252535;position:relative;overflow:hidden}
#tpad::before{content:'TRACKPAD';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;color:#1a1a2a;font-size:9px}
#mbtns{display:flex;gap:8px;padding:8px 10px 6px}
#lbtn,#rbtn{flex:1;height:34px;border:none;border-radius:10px;
  font-size:11px;font-weight:bold;cursor:pointer}
#lbtn{background:#0d2e1c;color:#81c995;border:1px solid #2a5a3a}
#rbtn{background:#2e1a1a;color:#f28b82;border:1px solid #6a2a2a}
#lbtn:active{background:#81c995;color:#000}
#rbtn:active{background:#f28b82;color:#000}
#srow{display:flex;gap:6px;padding:0 10px 10px}
#sup,#sdn,#smid{flex:1;height:30px;background:#0d0d18;border:1px solid #252535;
  color:#aaa;border-radius:8px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
#sup:active,#sdn:active,#smid:active{background:var(--blue);color:#000}

#kbd{position:fixed;bottom:0;left:0;right:0;background:#111118ee;
  backdrop-filter:blur(10px);border-top:1px solid #2a2a35;
  padding:4px 4px 8px;z-index:10001}
#kbd.koff{display:none}
#kbar{display:flex;align-items:center;padding:4px 6px 6px;gap:4px;
  border-bottom:1px solid #22222a;overflow-x:auto;scrollbar-width:none}
#kbar::-webkit-scrollbar{display:none}
.qk{background:#1e1e2a;border:1px solid #353545;color:#ccc;
  border-radius:8px;padding:6px 12px;font-size:11px;white-space:nowrap;cursor:pointer}
.qk:active{background:var(--blue);color:#000}
.kr{display:flex;justify-content:center;gap:3px;margin-bottom:3px;padding:0 4px}
.k{background:#252532;border:1px solid #353545;color:#e0e0e0;
  border-radius:8px;height:40px;min-width:30px;display:flex;
  align-items:center;justify-content:center;font-size:12px;cursor:pointer;
  flex:1 0 auto}
.k:active{background:var(--blue);color:#000}
.k.space{flex:5}
.k.back{min-width:50px}
</style>
</head>
<body>

<div id="titlebar">
  <div id="tabsContainer"></div>
  <button id="newTab">+</button>
  <div id="winctrls">
    <div class="wc min"></div>
    <div class="wc max"></div>
    <div class="wc cls"></div>
  </div>
</div>

<div id="toolbar">
  <div id="loadbar"></div>
  <button id="backBtn" class="nb" disabled>◀</button>
  <button id="forwardBtn" class="nb" disabled>▶</button>
  <button id="reloadBtn" class="nb">⟳</button>
  <div id="omnibox">
    <span id="lockico">🔒</span>
    <input type="text" id="urlInput" placeholder="Digite URL ou pesquisa">
  </div>
  <button id="menubtn">⋮</button>
</div>

<div id="viewport">
  <div id="iframeContainer"></div>
</div>

<div id="mpad">
  <div id="mhead"><span>✦ TRACKPAD</span><span id="mpadClose">✕</span></div>
  <div id="tpad"></div>
  <div id="mbtns"><button id="lbtn">LMB</button><button id="rbtn">RMB</button></div>
  <div id="srow"><button id="sup">▲</button><button id="smid">●</button><button id="sdn">▼</button></div>
</div>

<div id="kbd">
  <div id="kbar">
    <div class="qk" data-key="Tab">Tab</div>
    <div class="qk" data-key="Enter">Enter</div>
    <div class="qk" data-key="Escape">Esc</div>
    <div class="qk" data-key="ArrowUp">↑</div>
    <div class="qk" data-key="ArrowDown">↓</div>
    <div class="qk" data-key="ArrowLeft">←</div>
    <div class="qk" data-key="ArrowRight">→</div>
    <div class="qk" data-key="Control">Ctrl</div>
    <div class="qk" data-key="Alt">Alt</div>
    <div class="qk" data-key="Shift">Shift</div>
    <div class="qk" data-key="Delete">Del</div>
  </div>
  <div class="kr" data-row="1"></div>
  <div class="kr" data-row="2"></div>
  <div class="kr" data-row="3"></div>
</div>

<script>
const START_URL = "https://web.cloudmoonapp.com/pt/";
let tabs = [];
let activeTabId = null;
let tabCounter = 0;
let activeFrame = null;
let cursorX = window.innerWidth / 2;
let cursorY = window.innerHeight / 2;

// Função principal: injeta controle COMPLETO dentro do iframe
function injectFullControl(iframe) {
  try {
    const doc = iframe.contentDocument;
    const win = iframe.contentWindow;
    if(!doc || !win) return false;
    if(win.__remoteInjected) return true;
    
    const injectCode = `
    (function() {
      if(window.__remoteInjected) return;
      window.__remoteInjected = true;
      
      // Cursor visual dentro do iframe
      let cursorX = window.innerWidth / 2;
      let cursorY = window.innerHeight / 2;
      
      const cursorDiv = document.createElement('div');
      cursorDiv.id = '__virtualCursor';
      cursorDiv.style.cssText = 'position:fixed;width:0;height:0;border-left:10px solid transparent;border-right:0 solid transparent;border-bottom:18px solid #8ab4f8;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.6));pointer-events:none;z-index:999999;transform-origin:top left;transition:left 0.02s linear, top 0.02s linear;';
      const style = document.createElement('style');
      style.textContent = '#__virtualCursor::after{content:"";position:absolute;top:12px;left:-5px;width:5px;height:12px;background:#8ab4f8;border-radius:0 0 4px 4px} #__virtualCursor.rc{border-bottom-color:#f28b82} #__virtualCursor.rc::after{background:#f28b82}';
      document.head.appendChild(style);
      document.body.appendChild(cursorDiv);
      
      function updateCursor() {
        cursorDiv.style.left = Math.max(2, Math.min(window.innerWidth - 12, cursorX - 3)) + 'px';
        cursorDiv.style.top = Math.max(2, Math.min(window.innerHeight - 20, cursorY - 14)) + 'px';
      }
      
      window.__setCursor = function(x, y) {
        cursorX = Math.min(window.innerWidth - 8, Math.max(6, x));
        cursorY = Math.min(window.innerHeight - 24, Math.max(24, y));
        updateCursor();
      };
      
      window.__click = function(button) {
        const elem = document.elementFromPoint(cursorX, cursorY);
        if(!elem) return;
        if(button === 'left') {
          elem.dispatchEvent(new MouseEvent('mousedown', {view:window,bubbles:true,clientX:cursorX,clientY:cursorY,button:0}));
          elem.dispatchEvent(new MouseEvent('mouseup', {view:window,bubbles:true,clientX:cursorX,clientY:cursorY,button:0}));
          elem.dispatchEvent(new MouseEvent('click', {view:window,bubbles:true,clientX:cursorX,clientY:cursorY,button:0}));
          cursorDiv.classList.remove('rc');
          cursorDiv.classList.add('lc');
          setTimeout(() => cursorDiv.classList.remove('lc'), 100);
        } else {
          elem.dispatchEvent(new MouseEvent('contextmenu', {view:window,bubbles:true,clientX:cursorX,clientY:cursorY,button:2}));
          cursorDiv.classList.remove('lc');
          cursorDiv.classList.add('rc');
          setTimeout(() => cursorDiv.classList.remove('rc'), 150);
        }
      };
      
      window.__sendKey = function(key, code, ctrl, alt, shift) {
        const active = document.activeElement || document.body;
        const opts = {key, code, bubbles:true, cancelable:true, ctrlKey:ctrl, altKey:alt, shiftKey:shift};
        active.dispatchEvent(new KeyboardEvent('keydown', opts));
        if(key !== 'Control' && key !== 'Alt' && key !== 'Shift') {
          active.dispatchEvent(new KeyboardEvent('keypress', {key, code, bubbles:true}));
        }
        active.dispatchEvent(new KeyboardEvent('keyup', {key, code, bubbles:true}));
        
        // Feedback visual no botão
        if(key === 'Enter') cursorDiv.style.transform = 'scale(0.95)';
        setTimeout(() => cursorDiv.style.transform = '', 100);
      };
      
      window.__sendText = function(text) {
        const active = document.activeElement || document.body;
        if(active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable) {
          const start = active.selectionStart || 0;
          const end = active.selectionEnd || 0;
          const val = active.value || active.innerText || '';
          const newVal = val.substring(0, start) + text + val.substring(end);
          if(active.value !== undefined) active.value = newVal;
          else active.innerText = newVal;
          if(active.selectionStart !== undefined) {
            active.selectionStart = start + text.length;
            active.selectionEnd = start + text.length;
          }
          active.dispatchEvent(new InputEvent('input', {bubbles:true, data:text}));
        }
      };
      
      window.__scrollDir = function(dir) {
        if(dir === 'up') window.scrollBy({top: -300, behavior: 'smooth'});
        else if(dir === 'down') window.scrollBy({top: 300, behavior: 'smooth'});
      };
      
      updateCursor();
      console.log('✅ Controle injetado no iframe');
    })();
    `;
    
    const script = doc.createElement('script');
    script.textContent = injectCode;
    doc.head.appendChild(script);
    return true;
  } catch(e) {
    console.log('❌ Injeção falhou (cross-origin):', e);
    return false;
  }
}

// Comunicação com iframe
function sendToIframe(cmd, data) {
  if(!activeFrame) return;
  try {
    const win = activeFrame.contentWindow;
    if(cmd === 'move' && win.__setCursor) win.__setCursor(data.x, data.y);
    else if(cmd === 'click' && win.__click) win.__click(data);
    else if(cmd === 'key' && win.__sendKey) win.__sendKey(data.key, data.code, data.ctrl, data.alt, data.shift);
    else if(cmd === 'text' && win.__sendText) win.__sendText(data);
    else if(cmd === 'scroll' && win.__scrollDir) win.__scrollDir(data);
  } catch(e) { console.log('Com erro:', e); }
}

// Atualiza cursor local (host)
function updateHostCursor() {
  // Não precisamos mais de cursor host, apenas enviamos para iframe
  sendToIframe('move', { x: cursorX, y: cursorY });
}

function setCursorPosition(x, y) {
  cursorX = Math.min(window.innerWidth - 8, Math.max(6, x));
  cursorY = Math.min(window.innerHeight - 24, Math.max(24, y));
  updateHostCursor();
}

function clickAtCursor(button) {
  sendToIframe('click', button);
}

function sendKeyToFrame(key, code, modifiers = {}) {
  sendToIframe('key', { key, code, ctrl: !!modifiers.ctrl, alt: !!modifiers.alt, shift: !!modifiers.shift });
}

function sendTextToFrame(text) {
  sendToIframe('text', text);
}

function createIframe(url, tabId) {
  const iframe = document.createElement('iframe');
  iframe.className = 'contentFrame';
  iframe.style.display = 'none';
  iframe.setAttribute('allow', 'fullscreen; autoplay; clipboard-write; accelerometer; camera; microphone; geolocation');
  iframe.src = url;
  
  iframe.onload = () => {
    setTimeout(() => {
      const tab = tabs.find(t => t.id === tabId);
      if(tab) {
        try {
          let title = iframe.contentDocument?.title || new URL(url).hostname || 'Nova aba';
          tab.title = title.substring(0, 35);
          updateTabsUI();
        } catch(e) {}
        
        // Injeta controle
        const injected = injectFullControl(iframe);
        
        if(activeTabId === tabId) {
          try {
            const finalUrl = iframe.contentWindow.location.href;
            if(finalUrl && finalUrl !== 'about:blank') tab.url = finalUrl;
            document.getElementById('urlInput').value = tab.url;
          } catch(e) {}
          // Sincroniza cursor
          setTimeout(() => updateHostCursor(), 100);
        }
      }
    }, 300);
  };
  return iframe;
}

function navigateTo(tabId, rawUrl) {
  const tab = tabs.find(t => t.id === tabId);
  if(!tab) return;
  let finalUrl = rawUrl.trim();
  if(!finalUrl) finalUrl = START_URL;
  if(!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
    if(finalUrl.includes('.') && !finalUrl.includes(' ') && finalUrl.length > 3) finalUrl = 'https://' + finalUrl;
    else finalUrl = 'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
  }
  tab.url = finalUrl;
  if(tab.frame) {
    const old = tab.frame;
    if(old.parentNode) old.remove();
  }
  const newFrame = createIframe(finalUrl, tabId);
  tab.frame = newFrame;
  document.getElementById('iframeContainer').appendChild(newFrame);
  if(activeTabId === tabId) {
    showTabFrame(tabId);
    document.getElementById('urlInput').value = finalUrl;
  }
  updateTabsUI();
}

function showTabFrame(tabId) {
  tabs.forEach(t => { if(t.frame) t.frame.style.display = 'none'; });
  const active = tabs.find(t => t.id === tabId);
  if(active && active.frame) {
    active.frame.style.display = 'block';
    activeFrame = active.frame;
    document.getElementById('urlInput').value = active.url;
    try {
      const curUrl = active.frame.contentWindow?.location?.href;
      if(curUrl && curUrl !== 'about:blank') active.url = curUrl;
    } catch(e) {}
    updateTabsUI();
    // Reinjeta e sincroniza cursor
    setTimeout(() => {
      injectFullControl(active.frame);
      updateHostCursor();
    }, 100);
  }
}

function addTab(url = START_URL) {
  const id = ++tabCounter;
  const newTab = { id, url, title: 'Nova aba', frame: null };
  tabs.push(newTab);
  const frame = createIframe(url, id);
  newTab.frame = frame;
  document.getElementById('iframeContainer').appendChild(frame);
  activeTabId = id;
  showTabFrame(id);
  updateTabsUI();
  setTimeout(() => {
    const container = document.getElementById('titlebar');
    container.scrollLeft = container.scrollWidth;
  }, 50);
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if(idx === -1) return;
  const tab = tabs[idx];
  if(tab.frame?.parentNode) tab.frame.remove();
  tabs.splice(idx, 1);
  if(tabs.length === 0) addTab(START_URL);
  else if(activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length-1)].id;
    showTabFrame(activeTabId);
  }
  updateTabsUI();
}

function updateTabsUI() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  tabs.forEach(tab => {
    const tabDiv = document.createElement('div');
    tabDiv.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    tabDiv.innerHTML = `<div class="tab-ttl">${escapeHtml(tab.title)}</div><div class="tab-x">✕</div>`;
    tabDiv.addEventListener('click', (e) => {
      if(e.target.classList.contains('tab-x')) {
        e.stopPropagation();
        closeTab(tab.id);
      } else {
        activeTabId = tab.id;
        showTabFrame(tab.id);
        updateTabsUI();
      }
    });
    container.appendChild(tabDiv);
  });
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

// Trackpad
const trackpad = document.getElementById('tpad');
let trackActive = false, lastX = 0, lastY = 0;

trackpad.addEventListener('touchstart', (e) => {
  e.preventDefault();
  trackActive = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});
trackpad.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if(trackActive) {
    const dx = (e.touches[0].clientX - lastX) * 2.2;
    const dy = (e.touches[0].clientY - lastY) * 2.2;
    setCursorPosition(cursorX + dx, cursorY + dy);
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});
trackpad.addEventListener('touchend', (e) => { e.preventDefault(); trackActive = false; });

document.getElementById('lbtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  clickAtCursor('left');
});
document.getElementById('rbtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  clickAtCursor('right');
});
document.getElementById('sup').addEventListener('touchstart', (e) => {
  e.preventDefault();
  sendToIframe('scroll', 'up');
});
document.getElementById('sdn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  sendToIframe('scroll', 'down');
});
document.getElementById('smid').addEventListener('touchstart', (e) => {
  e.preventDefault();
  clickAtCursor('left');
});

// Teclado virtual
const keyboardLayout = {
  row1: ['q','w','e','r','t','y','u','i','o','p','[',']'],
  row2: ['a','s','d','f','g','h','j','k','l',';',"'"],
  row3: ['z','x','c','v','b','n','m',',','.','/']
};

function buildKeyboard() {
  for(let r=1; r<=3; r++) {
    const rowDiv = document.querySelector(`.kr[data-row="${r}"]`);
    rowDiv.innerHTML = '';
    keyboardLayout[`row${r}`].forEach(k => {
      const keyDiv = document.createElement('div');
      keyDiv.className = 'k';
      keyDiv.textContent = k;
      keyDiv.addEventListener('touchstart', (e) => {
        e.preventDefault();
        sendKeyToFrame(k, `Key${k.toUpperCase()}`);
      });
      rowDiv.appendChild(keyDiv);
    });
  }
  const lastRow = document.querySelector('.kr[data-row="3"]');
  const spaceDiv = document.createElement('div');
  spaceDiv.className = 'k space';
  spaceDiv.textContent = 'Espaço';
  spaceDiv.addEventListener('touchstart', (e) => {
    e.preventDefault();
    sendKeyToFrame(' ', 'Space');
  });
  lastRow.appendChild(spaceDiv);
  const backDiv = document.createElement('div');
  backDiv.className = 'k back';
  backDiv.textContent = '⌫';
  backDiv.addEventListener('touchstart', (e) => {
    e.preventDefault();
    sendKeyToFrame('Backspace', 'Backspace');
  });
  lastRow.appendChild(backDiv);
}

document.querySelectorAll('.qk').forEach(btn => {
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const key = btn.dataset.key;
    const special = { 'Enter':'Enter','Tab':'Tab','Escape':'Escape','ArrowUp':'ArrowUp','ArrowDown':'ArrowDown','ArrowLeft':'ArrowLeft','ArrowRight':'ArrowRight','Delete':'Delete' };
    if(special[key]) sendKeyToFrame(key, special[key]);
    else if(key === 'Control') sendKeyToFrame('Control', 'ControlLeft', {ctrl:true});
    else if(key === 'Alt') sendKeyToFrame('Alt', 'AltLeft', {alt:true});
    else if(key === 'Shift') sendKeyToFrame('Shift', 'ShiftLeft', {shift:true});
  });
});

// Navegação
const urlInput = document.getElementById('urlInput');
urlInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') navigateTo(activeTabId, urlInput.value);
});
document.getElementById('backBtn').addEventListener('click', () => {
  if(activeFrame) try { activeFrame.contentWindow.history.back(); } catch(e) {}
});
document.getElementById('forwardBtn').addEventListener('click', () => {
  if(activeFrame) try { activeFrame.contentWindow.history.forward(); } catch(e) {}
});
document.getElementById('reloadBtn').addEventListener('click', () => {
  if(activeFrame) try { activeFrame.contentWindow.location.reload(); } catch(e) {}
});
document.getElementById('newTab').addEventListener('click', () => addTab(START_URL));
document.querySelector('.wc.min').addEventListener('click', () => alert('Minimizar (demo)'));
document.querySelector('.wc.cls').addEventListener('click', () => alert('Fechar (demo)'));
document.querySelector('.wc.max').addEventListener('click', () => alert('Maximizar (demo)'));

// Mover mousepad
const mpad = document.getElementById('mpad');
let mpadDrag = false, mpadStartX=0, mpadStartY=0, mpadLeft=0, mpadTop=0;
document.getElementById('mhead').addEventListener('touchstart', (e) => {
  e.preventDefault();
  mpadDrag = true;
  mpadStartX = e.touches[0].clientX;
  mpadStartY = e.touches[0].clientY;
  mpadLeft = mpad.offsetLeft;
  mpadTop = mpad.offsetTop;
});
document.addEventListener('touchmove', (e) => {
  if(mpadDrag) {
    e.preventDefault();
    let newL = mpadLeft + (e.touches[0].clientX - mpadStartX);
    let newT = mpadTop + (e.touches[0].clientY - mpadStartY);
    newL = Math.min(window.innerWidth - mpad.offsetWidth, Math.max(0, newL));
    newT = Math.min(window.innerHeight - 280, Math.max(0, newT));
    mpad.style.left = newL + 'px';
    mpad.style.right = 'auto';
    mpad.style.top = newT + 'px';
  }
});
document.addEventListener('touchend', () => { mpadDrag = false; });
document.getElementById('mpadClose').addEventListener('touchstart', (e) => {
  e.preventDefault();
  mpad.style.display = 'none';
});

let kbdVisible = true;
document.getElementById('menubtn').addEventListener('click', () => {
  kbdVisible = !kbdVisible;
  document.getElementById('kbd').classList.toggle('koff', !kbdVisible);
});

// Toque na tela = move cursor + clique
document.getElementById('viewport').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  setCursorPosition(touch.clientX, touch.clientY);
  clickAtCursor('left');
});

buildKeyboard();
addTab(START_URL);
setCursorPosition(window.innerWidth/2, window.innerHeight/2);
</script>
