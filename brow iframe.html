<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Chromium Navegador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#202124;--bar:#292a2d;--card:#35363a;--hover:#3c4043;
  --blue:#8ab4f8;--green:#81c995;--red:#f28b82;
  --txt:#e8eaed;--dim:#9aa0a6;--bdr:#3c4043;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}

#titlebar{background:var(--bar);height:40px;display:flex;align-items:center;padding:0 6px;gap:2px;flex-shrink:0;border-bottom:1px solid #000;overflow-x:auto;overflow-y:hidden}
#titlebar::-webkit-scrollbar{height:3px}
#tabsContainer{display:flex;align-items:flex-end;gap:2px;height:100%}
.tab{background:var(--card);color:var(--dim);padding:6px 12px 5px;border-radius:10px 10px 0 0;font-size:12px;display:inline-flex;align-items:center;gap:6px;min-width:100px;max-width:180px;cursor:pointer;border:1px solid #000;border-bottom:none;white-space:nowrap;flex-shrink:0;height:36px}
.tab.active{background:var(--bg);color:var(--txt)}
.tab-ttl{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-x{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px}
.tab-x:active{background:rgba(255,255,255,0.2)}
#newTab{background:var(--card);border:none;color:var(--txt);width:34px;height:30px;font-size:20px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#newTab:active{background:var(--hover)}
#winctrls{display:flex;gap:8px;align-items:center;margin-left:auto;padding-left:8px;flex-shrink:0}
.wc{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer}
.wc.min{background:#f0c132}.wc.max{background:#34c749}.wc.cls{background:#ea4335}

#toolbar{background:var(--bar);padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid #000}
.nb{background:transparent;border:none;color:var(--dim);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nb:active{background:var(--hover)}
.nb[disabled]{opacity:.3}
#omnibox{flex:1;display:flex;align-items:center;background:#111;border:1.5px solid var(--bdr);border-radius:24px;padding:0 12px;height:36px;gap:8px}
#omnibox:focus-within{border-color:var(--blue)}
#urlInput{flex:1;background:transparent;border:none;color:var(--txt);font-size:13px;outline:none}
#menubtn{background:transparent;border:none;color:var(--dim);font-size:22px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}

#viewport{flex:1;position:relative;overflow:hidden;background:#fff}
.contentFrame{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>

<div id="titlebar">
  <div id="tabsContainer"></div>
  <button id="newTab">+</button>
  <div id="winctrls">
    <div class="wc min"></div>
    <div class="wc max"></div>
    <div class="wc cls"></div>
  </div>
</div>

<div id="toolbar">
  <button id="backBtn" class="nb" disabled>◀</button>
  <button id="forwardBtn" class="nb" disabled>▶</button>
  <button id="reloadBtn" class="nb">⟳</button>
  <div id="omnibox">
    <span id="lockico">🔒</span>
    <input type="text" id="urlInput" placeholder="Digite URL ou pesquisa">
  </div>
  <button id="menubtn">⋮</button>
</div>

<div id="viewport">
  <iframe id="mainFrame" class="contentFrame" src="about:blank"></iframe>
</div>

<script>
const START_URL = "https://www.google.com";

// Cada aba guarda seu próprio iframe e estado
let tabs = [];
let activeTabId = null;
let tabCounter = 0;
let isInitialized = false;

// Container do viewport
const viewport = document.getElementById('viewport');

// Função para criar um iframe isolado
function createIsolatedIframe() {
  const iframe = document.createElement('iframe');
  iframe.className = 'contentFrame';
  iframe.style.display = 'none';
  iframe.src = 'about:blank';
  
  // Configurações para isolamento de sessão
  iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox');
  // Remove sandbox para permitir funcionalidade completa (ou mantenha conforme necessidade)
  iframe.removeAttribute('sandbox');
  
  return iframe;
}

// Adicionar nova aba
function addTab(url = START_URL, isNew = true) {
  const id = ++tabCounter;
  const iframe = createIsolatedIframe();
  
  tabs.push({
    id: id,
    url: url,
    title: 'Nova aba',
    iframe: iframe,
    historyIndex: 0,
    history: [url],
    canGoBack: false,
    canGoForward: false
  });
  
  viewport.appendChild(iframe);
  
  if (isNew || tabs.length === 1) {
    activeTabId = id;
    switchToTab(id);
  }
  
  updateTabsUI();
  return id;
}

// Mudar para aba específica
function switchToTab(id) {
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;
  
  activeTabId = id;
  
  // Esconder todos os iframes e mostrar o ativo
  tabs.forEach(t => {
    t.iframe.style.display = 'none';
  });
  tab.iframe.style.display = 'block';
  
  // Atualizar URL na barra
  document.getElementById('urlInput').value = tab.url;
  
  // Atualizar botões de navegação
  updateNavButtons(tab);
  
  // Atualizar título da aba ativa
  updateTabTitle(id, tab.title);
  
  updateTabsUI();
}

// Atualizar botões de navegação
function updateNavButtons(tab) {
  const backBtn = document.getElementById('backBtn');
  const forwardBtn = document.getElementById('forwardBtn');
  
  backBtn.disabled = !tab.canGoBack;
  forwardBtn.disabled = !tab.canGoForward;
}

// Navegar para URL
function navigateTo(url, tabId = activeTabId) {
  let finalUrl = url.trim();
  if (!finalUrl) finalUrl = START_URL;
  
  if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
    if (finalUrl.includes('.') && !finalUrl.includes(' ')) {
      finalUrl = 'https://' + finalUrl;
    } else {
      finalUrl = 'https://www.google.com/search?q=' + encodeURIComponent(finalUrl);
    }
  }
  
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  
  // Atualizar histórico
  if (tab.historyIndex < tab.history.length - 1) {
    tab.history = tab.history.slice(0, tab.historyIndex + 1);
  }
  tab.history.push(finalUrl);
  tab.historyIndex = tab.history.length - 1;
  tab.url = finalUrl;
  tab.canGoBack = tab.historyIndex > 0;
  tab.canGoForward = false;
  
  // Navegar no iframe
  tab.iframe.src = finalUrl;
  document.getElementById('urlInput').value = finalUrl;
  
  updateNavButtons(tab);
  updateTabsUI();
  
  // Atualizar título quando carregar
  tab.iframe.onload = () => {
    setTimeout(() => {
      try {
        let title = tab.iframe.contentDocument?.title;
        if (title && title.trim()) {
          tab.title = title.substring(0, 30);
        } else {
          try {
            const urlObj = new URL(tab.url);
            tab.title = urlObj.hostname || 'Nova aba';
          } catch(e) {
            tab.title = 'Nova aba';
          }
        }
        if (activeTabId === tab.id) {
          updateTabTitle(tab.id, tab.title);
        }
        updateTabsUI();
      } catch(e) {
        // Cross-origin, mantém título atual
      }
    }, 200);
  };
}

// Voltar página
function goBack() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab || !tab.canGoBack) return;
  
  tab.historyIndex--;
  const previousUrl = tab.history[tab.historyIndex];
  tab.url = previousUrl;
  tab.canGoBack = tab.historyIndex > 0;
  tab.canGoForward = true;
  
  tab.iframe.src = previousUrl;
  document.getElementById('urlInput').value = previousUrl;
  
  updateNavButtons(tab);
}

// Avançar página
function goForward() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab || !tab.canGoForward) return;
  
  tab.historyIndex++;
  const nextUrl = tab.history[tab.historyIndex];
  tab.url = nextUrl;
  tab.canGoForward = tab.historyIndex < tab.history.length - 1;
  tab.canGoBack = true;
  
  tab.iframe.src = nextUrl;
  document.getElementById('urlInput').value = nextUrl;
  
  updateNavButtons(tab);
}

// Recarregar página
function reloadPage() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.iframe.src = tab.iframe.src;
  }
}

// Fechar aba
function closeTab(id) {
  const index = tabs.findIndex(t => t.id === id);
  if (index === -1) return;
  
  const tab = tabs[index];
  tab.iframe.remove();
  tabs.splice(index, 1);
  
  if (tabs.length === 0) {
    addTab(START_URL, false);
  } else if (activeTabId === id) {
    const newIndex = Math.min(index, tabs.length - 1);
    switchToTab(tabs[newIndex].id);
  }
  
  updateTabsUI();
}

// Atualizar título da aba na interface
function updateTabTitle(tabId, title) {
  const tabElement = document.querySelector(`.tab[data-id='${tabId}']`);
  if (tabElement) {
    const titleSpan = tabElement.querySelector('.tab-ttl');
    if (titleSpan) titleSpan.textContent = title;
  }
}

// Atualizar UI das abas
function updateTabsUI() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  
  tabs.forEach(tab => {
    const tabDiv = document.createElement('div');
    tabDiv.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    tabDiv.setAttribute('data-id', tab.id);
    tabDiv.innerHTML = `
      <div class="tab-ttl">${escapeHtml(tab.title)}</div>
      <div class="tab-x">✕</div>
    `;
    
    tabDiv.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-x')) {
        e.stopPropagation();
        closeTab(tab.id);
      } else {
        switchToTab(tab.id);
      }
    });
    
    container.appendChild(tabDiv);
  });
  
  // Scroll para a aba ativa
  const activeTabElement = document.querySelector('.tab.active');
  if (activeTabElement) {
    activeTabElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function escapeHtml(str) { 
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
}

// Event listeners da toolbar
document.getElementById('urlInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    navigateTo(e.target.value);
  }
});

document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('forwardBtn').addEventListener('click', goForward);
document.getElementById('reloadBtn').addEventListener('click', reloadPage);
document.getElementById('newTab').addEventListener('click', () => addTab(START_URL));

// Menu de opções (simples)
document.getElementById('menubtn').addEventListener('click', () => {
  alert('Opções:\n- Abas independentes\n- Histórico por aba\n- Sessões isoladas');
});

// Controles da janela (simulados)
document.querySelector('.wc.min').addEventListener('click', () => alert('Minimizar (simulado)'));
document.querySelector('.wc.cls').addEventListener('click', () => alert('Fechar (simulado)'));
document.querySelector('.wc.max').addEventListener('click', () => alert('Maximizar (simulado)'));

// Inicialização
function init() {
  addTab(START_URL, false);
  isInitialized = true;
}

// Iniciar
init();
</script>
</body>
</html>
