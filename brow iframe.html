<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Chromium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#202124;--bar:#292a2d;--card:#35363a;--hover:#3c4043;
  --blue:#8ab4f8;--green:#81c995;--red:#f28b82;--yellow:#fdd663;
  --txt:#e8eaed;--dim:#9aa0a6;--bdr:#3c4043;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;
  touch-action:none;-webkit-user-select:none;user-select:none}

#titlebar{background:var(--bar);height:36px;display:flex;align-items:flex-end;
  padding:0 6px;gap:2px;flex-shrink:0;border-bottom:1px solid #000}
.tab{background:var(--card);color:var(--dim);padding:5px 10px 4px;
  border-radius:8px 8px 0 0;font-size:11px;display:flex;align-items:center;
  gap:5px;min-width:80px;max-width:160px;cursor:pointer;
  border:1px solid #000;border-bottom:none;white-space:nowrap;overflow:hidden;flex-shrink:0}
.tab.active{background:var(--bg);color:var(--txt)}
.tab-ttl{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-x{width:15px;height:15px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:11px}
.tab-x:active{background:var(--hover)}
#newTab{background:transparent;border:none;color:var(--dim);width:26px;height:26px;
  font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;
  justify-content:center;align-self:center;margin-bottom:2px;flex-shrink:0}
#winctrls{display:flex;gap:6px;align-items:center;margin-left:auto;margin-bottom:7px}
.wc{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0}
.wc.min{background:#f0c132}.wc.max{background:#34c749}.wc.cls{background:#ea4335}

#toolbar{background:var(--bar);padding:5px 8px;display:flex;align-items:center;
  gap:4px;flex-shrink:0;border-bottom:1px solid #000;position:relative}
#loadbar{position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--blue),#a78bfa);
  width:0;pointer-events:none;z-index:5}
.nb{background:transparent;border:none;color:var(--dim);width:30px;height:30px;
  border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.nb:active{background:var(--hover)}
.nb[disabled]{opacity:.3;pointer-events:none}
#omnibox{flex:1;display:flex;align-items:center;background:#111;
  border:1.5px solid var(--bdr);border-radius:20px;padding:0 10px;
  height:30px;gap:6px;cursor:pointer;min-width:0}
#omnibox:active{border-color:var(--blue)}
#lockico{font-size:12px;flex-shrink:0}
#urldisp{flex:1;color:var(--txt);font-size:12px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
#menubtn{background:transparent;border:none;color:var(--dim);font-size:20px;
  cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
#menubtn:active{background:var(--hover)}

#viewport{flex:1;position:relative;overflow:hidden;background:#fff}
#rawFrame{position:absolute;inset:0;width:100%;height:100%;border:none;
  display:block;background:#fff;z-index:1}
#touchOverlay{position:absolute;inset:0;z-index:10;touch-action:none;
  background:transparent}

#loadScreen{position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:20}
#loadScreen.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--card);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadMsg{color:var(--dim);font-size:12px;max-width:260px;text-align:center;line-height:1.5}

#errScreen{position:absolute;inset:0;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:28px;z-index:20}
#errScreen.show{display:flex}
#errScreen .eico{font-size:52px}
#errScreen h2{color:var(--txt);font-size:17px;font-weight:400;text-align:center}
#errScreen p{color:var(--dim);font-size:11.5px;max-width:280px;
  line-height:1.65;text-align:center}
.pbtns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pbtn{background:var(--card);border:1px solid var(--bdr);color:var(--txt);
  padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer}
.pbtn:active{background:var(--blue);color:#000;border-color:var(--blue)}

#cur{position:fixed;pointer-events:none;z-index:99999;
  width:0;height:0;
  border-left:9px solid transparent;
  border-right:0 solid transparent;
  border-bottom:15px solid rgba(255,255,255,.93);
  filter:drop-shadow(0 1px 4px rgba(0,0,0,.8));
  transform-origin:top left}
#cur::after{content:'';position:absolute;top:9px;left:-4px;
  width:4px;height:9px;background:rgba(255,255,255,.93);
  border-radius:0 0 3px 3px}
#cur.lc{border-bottom-color:rgba(138,180,248,.95)}
#cur.rc{border-bottom-color:rgba(242,139,130,.95)}

#mpad{position:fixed;right:8px;bottom:270px;width:162px;
  background:#12121a;border:1px solid #252535;border-radius:14px;
  z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.85);touch-action:none}
#mhead{padding:6px 10px 3px;display:flex;justify-content:space-between;
  align-items:center;cursor:move;touch-action:none}
#mhead span:first-child{color:#444;font-size:9px;letter-spacing:1.5px;font-weight:700}
#mhead span:last-child{color:#2a2a3a;font-size:14px}
#tpad{margin:0 8px;height:88px;background:#0a0a10;border-radius:8px;
  border:1px solid #1a1a28;position:relative;overflow:hidden;
  touch-action:none;cursor:crosshair}
#tpad::before{content:'TRACKPAD';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;color:#13131e;
  font-size:8px;letter-spacing:2px;pointer-events:none}
#mbtns{display:flex;gap:5px;padding:7px 8px 5px}
#lbtn,#rbtn{flex:1;height:28px;border:none;border-radius:7px;
  font-size:10px;font-weight:700;cursor:pointer}
#lbtn{background:#1a5e35;color:#81c995}#rbtn{background:#5e1a1a;color:#f28b82}
#lbtn:active{background:#81c995;color:#000}#rbtn:active{background:#f28b82;color:#000}
#srow{display:flex;gap:5px;padding:0 8px 8px}
#sup,#sdn,#smid{flex:1;height:24px;background:#0d0d18;border:1px solid #252535;
  color:#555;border-radius:6px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
#sup:active,#sdn:active,#smid:active{background:var(--blue);color:#000;border-color:var(--blue)}

#kbd{position:fixed;bottom:0;left:0;right:0;background:#111118;
  border-top:1px solid #252530;padding:3px 2px 6px;
  z-index:9998;touch-action:none;-webkit-user-select:none;user-select:none}
#kbd.koff{display:none}

#kbar{display:flex;align-items:center;padding:3px 5px 5px;gap:3px;
  border-bottom:1px solid #1e1e28;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
#kbar::-webkit-scrollbar{display:none}
.qk{background:#1e1e2a;border:1px solid #2e2e3e;color:#aaa;
  border-radius:6px;padding:4px 9px;font-size:10px;
  white-space:nowrap;cursor:pointer;flex-shrink:0}
.qk:active,.qk.on{background:var(--blue);color:#000;border-color:var(--blue)}

.kr{display:flex;justify-content:center;gap:2px;margin-bottom:2px;padding:0 2px}
.k{background:#252532;border:1px solid #2e2e3e;color:#ddd;
  border-radius:5px;height:36px;min-width:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;padding:0 3px}
.k:active{background:var(--blue);color:#000;border-color:var(--blue)}
.k.wide{min-width:42px}
.k.space{min-width:120px}
</style>
</head>
<body>

<div id="titlebar">
  <div class="tab active"><span class="tab-ttl">Nova aba</span><span class="tab-x">✕</span></div>
  <button id="newTab">+</button>
  <div id="winctrls"><div class="wc min"></div><div class="wc max"></div><div class="wc cls"></div></div>
</div>

<div id="toolbar">
  <button class="nb" id="backBtn">◀</button>
  <button class="nb" id="fwdBtn">▶</button>
  <button class="nb" id="refreshBtn">↻</button>
  <div id="omnibox"><span id="lockico">🔒</span><div id="urldisp">about:blank</div></div>
  <button id="menubtn">⋮</button>
  <div id="loadbar"></div>
</div>

<div id="viewport">
  <iframe id="rawFrame" src="https://example.com"></iframe>
  <div id="touchOverlay"></div>
  <div id="loadScreen"><div class="spinner"></div><div id="loadMsg">Carregando...</div></div>
  <div id="errScreen"><div class="eico">⚠️</div><h2>Falha ao carregar</h2><p>Verifique sua conexão ou tente novamente</p><div class="pbtns"><button class="pbtn" id="retryBtn">Tentar novamente</button></div></div>
</div>

<div id="cur"></div>

<div id="mpad">
  <div id="mhead"><span>TOUCHPAD</span><span>⣿</span></div>
  <div id="tpad"></div>
  <div id="mbtns"><button id="lbtn">LMB</button><button id="rbtn">RMB</button></div>
  <div id="srow"><button id="sup">▲</button><button id="smid">●</button><button id="sdn">▼</button></div>
</div>

<div id="kbd" class="koff">
  <div id="kbar"><button class="qk" data-kbd="hide">🔽</button><button class="qk on" data-lang="en">EN</button><button class="qk" data-lang="pt">PT</button><button class="qk" data-action="paste">📋 Colar</button><button class="qk" data-action="clear">⌫ Limpar</button></div>
  <div id="kbMain"></div>
</div>

<script>
const iframe = document.getElementById('rawFrame');
const loadScreen = document.getElementById('loadScreen');
const errScreen = document.getElementById('errScreen');
const loadMsg = document.getElementById('loadMsg');
const urlDisp = document.getElementById('urldisp');
const backBtn = document.getElementById('backBtn');
const fwdBtn = document.getElementById('fwdBtn');
const refreshBtn = document.getElementById('refreshBtn');
const retryBtn = document.getElementById('retryBtn');
const loadbar = document.getElementById('loadbar');
let loadStart = 0;
let loadInterval;

function updateNavButtons() {
  try {
    backBtn.disabled = !iframe.contentWindow?.history?.length;
    fwdBtn.disabled = !iframe.contentWindow?.history?.length;
  } catch(e) {}
}

function setLoading(isLoading) {
  if(isLoading) {
    loadStart = Date.now();
    loadScreen.classList.remove('hide');
    errScreen.classList.remove('show');
    loadbar.style.width = '0%';
    if(loadInterval) clearInterval(loadInterval);
    loadInterval = setInterval(() => {
      const elapsed = Date.now() - loadStart;
      const progress = Math.min(85, elapsed / 30);
      loadbar.style.width = progress + '%';
    }, 100);
  } else {
    if(loadInterval) clearInterval(loadInterval);
    loadbar.style.width = '100%';
    setTimeout(() => { loadbar.style.width = '0%'; }, 200);
    loadScreen.classList.add('hide');
  }
}

function loadUrl(url) {
  if(!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }
  setLoading(true);
  iframe.src = url;
  urlDisp.innerText = url;
}

iframe.onload = () => {
  setLoading(false);
  updateNavButtons();
  try {
    const frameUrl = iframe.contentWindow.location.href;
    if(frameUrl && frameUrl !== 'about:blank') urlDisp.innerText = frameUrl;
  } catch(e) {}
};

iframe.onerror = () => {
  setLoading(false);
  errScreen.classList.add('show');
};

refreshBtn.onclick = () => { iframe.src = iframe.src; setLoading(true); };
backBtn.onclick = () => { try { iframe.contentWindow.history.back(); setLoading(true); } catch(e){} };
fwdBtn.onclick = () => { try { iframe.contentWindow.history.forward(); setLoading(true); } catch(e){} };
retryBtn.onclick = () => { if(iframe.src) loadUrl(iframe.src); };

const cur = document.getElementById('cur');
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let targetX = mouseX, targetY = mouseY;

function sendClickToIframe(x, y, isRightClick = false) {
  if(!iframe || !iframe.contentDocument) return;
  const iframeRect = iframe.getBoundingClientRect();
  const iframeX = x - iframeRect.left;
  const iframeY = y - iframeRect.top;
  if(iframeX >= 0 && iframeX <= iframeRect.width && iframeY >= 0 && iframeY <= iframeRect.height) {
    const eventType = isRightClick ? 'contextmenu' : 'click';
    const event = new MouseEvent(eventType, {
      view: iframe.contentWindow,
      bubbles: true,
      cancelable: true,
      clientX: iframeX,
      clientY: iframeY,
      button: isRightClick ? 2 : 0,
      buttons: isRightClick ? 2 : 1
    });
    const targetElem = iframe.contentDocument.elementFromPoint(iframeX, iframeY);
    if(targetElem) targetElem.dispatchEvent(event);
  }
}

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  cur.style.display = 'block';
}, { passive: false });

document.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  cur.style.display = 'block';
});

function animateCursor() {
  mouseX += (targetX - mouseX) * 0.3;
  mouseY += (targetY - mouseY) * 0.3;
  cur.style.left = mouseX + 'px';
  cur.style.top = mouseY + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

let touchTimer;
document.getElementById('touchOverlay').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  touchTimer = setTimeout(() => {
    sendClickToIframe(touch.clientX, touch.clientY, true);
    cur.className = 'rc';
    setTimeout(() => cur.className = '', 150);
  }, 500);
});

document.getElementById('touchOverlay').addEventListener('touchmove', (e) => {
  if(touchTimer) clearTimeout(touchTimer);
});

document.getElementById('touchOverlay').addEventListener('touchend', (e) => {
  e.preventDefault();
  if(touchTimer) {
    clearTimeout(touchTimer);
    const changed = e.changedTouches[0];
    sendClickToIframe(changed.clientX, changed.clientY, false);
    cur.className = 'lc';
    setTimeout(() => cur.className = '', 150);
  }
});

const mpad = document.getElementById('mpad');
let mpadVisible = true;

let scrollAccum = 0;
const tpad = document.getElementById('tpad');
let tpadActive = false;
let lastY = 0;

tpad.addEventListener('touchstart', (e) => {
  e.preventDefault();
  tpadActive = true;
  lastY = e.touches[0].clientY;
});
tpad.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if(!tpadActive) return;
  const deltaY = lastY - e.touches[0].clientY;
  scrollAccum += deltaY;
  const scrollAmount = Math.floor(scrollAccum / 10);
  if(Math.abs(scrollAmount) > 0) {
    try {
      iframe.contentWindow.scrollBy(0, scrollAmount);
    } catch(e) {}
    scrollAccum = 0;
  }
  lastY = e.touches[0].clientY;
});
tpad.addEventListener('touchend', (e) => {
  e.preventDefault();
  tpadActive = false;
  scrollAccum = 0;
});

document.getElementById('lbtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const centerX = window.innerWidth/2;
  const centerY = window.innerHeight/2;
  sendClickToIframe(centerX, centerY, false);
  cur.className = 'lc';
  setTimeout(() => cur.className = '', 150);
});
document.getElementById('rbtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const centerX = window.innerWidth/2;
  const centerY = window.innerHeight/2;
  sendClickToIframe(centerX, centerY, true);
  cur.className = 'rc';
  setTimeout(() => cur.className = '', 150);
});
document.getElementById('sup').addEventListener('touchstart', (e) => {
  e.preventDefault();
  try { iframe.contentWindow.scrollBy(0, -200); } catch(e) {}
});
document.getElementById('sdn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  try { iframe.contentWindow.scrollBy(0, 200); } catch(e) {}
});
document.getElementById('smid').addEventListener('touchstart', (e) => {
  e.preventDefault();
  try { iframe.contentWindow.scrollTo(0, iframe.contentWindow.scrollY); } catch(e) {}
});

const kbd = document.getElementById('kbd');
const kbMain = document.getElementById('kbMain');
let currentLang = 'en';
let inputTarget = null;

const keyboards = {
  en: [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['Shift','z','x','c','v','b','n','m','⌫'],
    ['123',' ','Enter']
  ],
  pt: [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l','ç'],
    ['Shift','z','x','c','v','b','n','m','⌫'],
    ['123',' ','Enter']
  ]
};

function renderKeyboard() {
  const layout = keyboards[currentLang];
  kbMain.innerHTML = '';
  layout.forEach(row => {
    const kr = document.createElement('div');
    kr.className = 'kr';
    row.forEach(key => {
      const k = document.createElement('div');
      k.className = 'k';
      if(key === ' ') k.classList.add('space');
      if(key === 'Shift' || key === '123') k.classList.add('wide');
      k.innerText = key === ' ' ? 'espaço' : key;
      k.onclick = () => handleKey(key);
      kr.appendChild(k);
    });
    kbMain.appendChild(kr);
  });
}

function handleKey(key) {
  if(!inputTarget) return;
  if(key === '⌫') {
    const value = inputTarget.value;
    inputTarget.value = value.slice(0, -1);
    const event = new Event('input', { bubbles: true });
    inputTarget.dispatchEvent(event);
  } else if(key === 'Enter') {
    const event = new KeyboardEvent('keydown', { key: 'Enter', bubbles: true });
    inputTarget.dispatchEvent(event);
  } else if(key === 'Shift') {
    currentLang = currentLang === 'en' ? 'pt' : 'en';
    renderKeyboard();
    document.querySelectorAll('.qk[data-lang]').forEach(el => el.classList.remove('on'));
    document.querySelector(`.qk[data-lang="${currentLang}"]`).classList.add('on');
  } else if(key === '123') {
  } else {
    inputTarget.value += key;
    const event = new Event('input', { bubbles: true });
    inputTarget.dispatchEvent(event);
  }
}

function showKeyboard() {
  kbd.classList.remove('koff');
  if(!inputTarget) {
    inputTarget = document.createElement('input');
    inputTarget.style.position = 'fixed';
    inputTarget.style.opacity = '0';
    inputTarget.style.pointerEvents = 'none';
    document.body.appendChild(inputTarget);
    inputTarget.focus();
  } else {
    inputTarget.focus();
  }
}

function hideKeyboard() {
  kbd.classList.add('koff');
}

document.querySelectorAll('.qk[data-lang]').forEach(btn => {
  btn.onclick = () => {
    currentLang = btn.getAttribute('data-lang');
    renderKeyboard();
    document.querySelectorAll('.qk[data-lang]').forEach(el => el.classList.remove('on'));
    btn.classList.add('on');
  };
});
document.querySelector('.qk[data-action="paste"]').onclick = async () => {
  try {
    const text = await navigator.clipboard.readText();
    if(inputTarget) {
      inputTarget.value += text;
      const event = new Event('input', { bubbles: true });
      inputTarget.dispatchEvent(event);
    }
  } catch(e) {}
};
document.querySelector('.qk[data-action="clear"]').onclick = () => {
  if(inputTarget) {
    inputTarget.value = '';
    const event = new Event('input', { bubbles: true });
    inputTarget.dispatchEvent(event);
  }
};
document.querySelector('.qk[data-kbd="hide"]').onclick = () => hideKeyboard();

document.getElementById('omnibox').onclick = () => {
  const newUrl = prompt('Digite a URL:', urlDisp.innerText);
  if(newUrl) loadUrl(newUrl);
};

document.getElementById('menubtn').onclick = () => {
  mpadVisible = !mpadVisible;
  mpad.style.display = mpadVisible ? 'block' : 'none';
};

let dragStartX, dragStartY, mpadStartX, mpadStartY, draggingMpad = false;
const mhead = document.getElementById('mhead');
mhead.addEventListener('touchstart', (e) => {
  draggingMpad = true;
  dragStartX = e.touches[0].clientX;
  dragStartY = e.touches[0].clientY;
  mpadStartX = mpad.offsetLeft;
  mpadStartY = mpad.offsetTop;
  e.preventDefault();
});
document.addEventListener('touchmove', (e) => {
  if(draggingMpad) {
    const dx = e.touches[0].clientX - dragStartX;
    const dy = e.touches[0].clientY - dragStartY;
    let newLeft = mpadStartX + dx;
    let newTop = mpadStartY + dy;
    newLeft = Math.max(0, Math.min(window.innerWidth - mpad.offsetWidth, newLeft));
    newTop = Math.max(0, Math.min(window.innerHeight - mpad.offsetHeight, newTop));
    mpad.style.left = newLeft + 'px';
    mpad.style.right = 'auto';
    mpad.style.top = newTop + 'px';
    mpad.style.bottom = 'auto';
    e.preventDefault();
  }
});
document.addEventListener('touchend', () => { draggingMpad = false; });

document.querySelectorAll('.tab-x').forEach(el => {
  el.onclick = (e) => { e.stopPropagation(); };
});

loadUrl('https://example.com');
renderKeyboard();
setInterval(() => {
  try {
    if(iframe.contentDocument && iframe.contentDocument.activeElement) {
      inputTarget = iframe.contentDocument.activeElement;
      if(inputTarget && (inputTarget.tagName === 'INPUT' || inputTarget.tagName === 'TEXTAREA')) {
        showKeyboard();
      }
    }
  } catch(e) {}
}, 500);
</script>
</body>
</html>
