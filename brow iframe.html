<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Navegador Flutuante</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: transparent; overflow: hidden; }
        .floating-app {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            background: #1e1e2f;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 99999;
            transition: all 0.2s;
            border: 1px solid #5865F2;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: #5865F2;
            padding: 12px 16px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            color: white;
            font-weight: bold;
        }
        .app-header:active { cursor: grabbing; }
        .controls { display: flex; gap: 12px; }
        .controls button {
            background: none; border: none; color: white; font-size: 18px;
            cursor: pointer; font-weight: bold; padding: 0 6px;
        }
        .url-bar {
            display: flex;
            padding: 8px;
            gap: 8px;
            background: #2a2a3a;
        }
        .url-bar input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            background: #1e1e2f;
            color: white;
            font-size: 14px;
        }
        .url-bar button {
            width: auto;
            padding: 10px 16px;
            background: #23a55a;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
            padding: 8px;
            background: #2a2a3a;
            border-top: 1px solid #3a3a4a;
        }
        .nav-buttons button {
            flex: 1;
            padding: 8px;
            background: #1e1e2f;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .content {
            height: 500px;
            transition: 0.2s;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .minimized .content { display: none; }
        .minimized .url-bar { display: none; }
        .minimized .nav-buttons { display: none; }
        .minimized { width: auto; border-radius: 40px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e1e2f;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100000;
            animation: fadeUp 0.2s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="floatingApp" class="floating-app">
    <div class="app-header" id="appHeader">
        <h3>🌐 Navegador Flutuante</h3>
        <div class="controls">
            <button id="minimizeBtn">─</button>
        </div>
    </div>
    <div class="url-bar">
        <input type="text" id="urlInput" placeholder="Digite um site ou pesquise...">
        <button id="goBtn">IR</button>
    </div>
    <div class="nav-buttons">
        <button id="backBtn">◀ VOLTAR</button>
        <button id="forwardBtn">AVANÇAR ▶</button>
        <button id="reloadBtn">🔄 ATUALIZAR</button>
        <button id="discordBtn">🎮 DISCORD</button>
        <button id="geradorBtn">📧 GERADOR</button>
    </div>
    <div class="content">
        <iframe id="browserFrame" src="https://biel99lol.github.io/pixel/web.html"></iframe>
    </div>
</div>

<script>
    const appDiv = document.getElementById('floatingApp');
    const iframe = document.getElementById('browserFrame');
    const urlInput = document.getElementById('urlInput');
    let isMinimized = false;
    let canGoBack = false;
    let canGoForward = false;

    function mostrarToast(msg, cor = '#1e1e2f') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function carregarUrl(url) {
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            if (url.includes('.')) {
                url = 'https://' + url;
            } else {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }
        }
        iframe.src = url;
        urlInput.value = url;
        mostrarToast('🌐 Carregando: ' + url, '#5865F2');
    }

    function irParaDiscord() {
        iframe.src = 'https://discord.com/register';
        urlInput.value = 'https://discord.com/register';
        mostrarToast('🎮 Abrindo Discord (em nova aba se necessário)', '#23a55a');
    }

    function irParaGerador() {
        iframe.src = 'https://biel99lol.github.io/pixel/web.html';
        urlInput.value = 'https://biel99lol.github.io/pixel/web.html';
        mostrarToast('📧 Gerador de contas carregado', '#23a55a');
    }

    document.getElementById('goBtn').addEventListener('click', () => {
        carregarUrl(urlInput.value);
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        try {
            iframe.contentWindow.history.back();
        } catch(e) {
            mostrarToast('Não foi possível voltar', '#ed4245');
        }
    });

    document.getElementById('forwardBtn').addEventListener('click', () => {
        try {
            iframe.contentWindow.history.forward();
        } catch(e) {
            mostrarToast('Não foi possível avançar', '#ed4245');
        }
    });

    document.getElementById('reloadBtn').addEventListener('click', () => {
        iframe.src = iframe.src;
        mostrarToast('🔄 Recarregando página', '#5865F2');
    });

    document.getElementById('discordBtn').addEventListener('click', irParaDiscord);
    document.getElementById('geradorBtn').addEventListener('click', irParaGerador);

    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            carregarUrl(urlInput.value);
        }
    });

    const header = document.getElementById('appHeader');
    let isDragging = false;
    let offsetX, offsetY;

    header.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true;
        offsetX = e.clientX - appDiv.offsetLeft;
        offsetY = e.clientY - appDiv.offsetTop;
        appDiv.style.cursor = 'grabbing';
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let left = e.clientX - offsetX;
        let top = e.clientY - offsetY;
        left = Math.max(10, Math.min(window.innerWidth - appDiv.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - appDiv.offsetHeight - 10, top));
        appDiv.style.left = left + 'px';
        appDiv.style.right = 'auto';
        appDiv.style.bottom = 'auto';
        appDiv.style.top = top + 'px';
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        appDiv.style.cursor = 'grab';
    });

    header.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        const touch = e.touches[0];
        offsetX = touch.clientX - appDiv.offsetLeft;
        offsetY = touch.clientY - appDiv.offsetTop;
        isDragging = true;
        e.preventDefault();
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        let left = touch.clientX - offsetX;
        let top = touch.clientY - offsetY;
        left = Math.max(10, Math.min(window.innerWidth - appDiv.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - appDiv.offsetHeight - 10, top));
        appDiv.style.left = left + 'px';
        appDiv.style.right = 'auto';
        appDiv.style.bottom = 'auto';
        appDiv.style.top = top + 'px';
    });

    window.addEventListener('touchend', () => { isDragging = false; });

    document.getElementById('minimizeBtn').addEventListener('click', () => {
        if (isMinimized) {
            appDiv.classList.remove('minimized');
            document.getElementById('minimizeBtn').textContent = '─';
            appDiv.style.width = '380px';
        } else {
            appDiv.classList.add('minimized');
            document.getElementById('minimizeBtn').textContent = '□';
            appDiv.style.width = 'auto';
        }
        isMinimized = !isMinimized;
    });

    appDiv.style.left = 'auto';
    appDiv.style.right = '20px';
    appDiv.style.bottom = '20px';
    appDiv.style.top = 'auto';

    mostrarToast('✅ Navegador pronto! Clique em DISCORD para abrir', '#5865F2');
</script>
</body>
</html>
