<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Chromium CloudMoon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#202124;--bar:#292a2d;--card:#35363a;--hover:#3c4043;
  --blue:#8ab4f8;--green:#81c995;--red:#f28b82;--yellow:#fdd663;
  --txt:#e8eaed;--dim:#9aa0a6;--bdr:#3c4043;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;
  touch-action:none;-webkit-user-select:none;user-select:none}

#titlebar{background:var(--bar);height:36px;display:flex;align-items:flex-end;
  padding:0 6px;gap:2px;flex-shrink:0;border-bottom:1px solid #000;overflow-x:auto}
#tabsContainer{display:flex;gap:2px;flex:1;overflow-x:auto}
.tab{background:var(--card);color:var(--dim);padding:5px 10px 4px;
  border-radius:8px 8px 0 0;font-size:11px;display:flex;align-items:center;
  gap:5px;min-width:90px;max-width:140px;cursor:pointer;
  border:1px solid #000;border-bottom:none;white-space:nowrap;flex-shrink:0}
.tab.active{background:var(--bg);color:var(--txt)}
.tab-ttl{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-x{width:15px;height:15px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:11px}
.tab-x:active{background:var(--hover)}
#newTab{background:transparent;border:none;color:var(--dim);width:26px;height:26px;
  font-size:18px;cursor:pointer;border-radius:50%;display:flex;
  align-items:center;justify-content:center;align-self:center;margin-bottom:2px;flex-shrink:0}
#winctrls{display:flex;gap:6px;align-items:center;margin-left:auto;margin-bottom:7px;flex-shrink:0}
.wc{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0}
.wc.min{background:#f0c132}.wc.max{background:#34c749}.wc.cls{background:#ea4335}

#toolbar{background:var(--bar);padding:5px 8px;display:flex;align-items:center;
  gap:4px;flex-shrink:0;border-bottom:1px solid #000;position:relative}
#loadbar{position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--blue),#a78bfa);width:0;pointer-events:none;z-index:5}
.nb{background:transparent;border:none;color:var(--dim);width:30px;height:30px;
  border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.nb:active{background:var(--hover)}
#omnibox{flex:1;display:flex;align-items:center;background:#111;
  border:1.5px solid var(--bdr);border-radius:20px;padding:0 10px;
  height:30px;gap:6px;cursor:pointer;min-width:0}
#omnibox:active{border-color:var(--blue)}
#lockico{font-size:12px;flex-shrink:0}
#urldisp{flex:1;color:var(--txt);font-size:12px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
#menubtn{background:transparent;border:none;color:var(--dim);font-size:20px;
  cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
#menubtn:active{background:var(--hover)}

#viewport{flex:1;position:relative;overflow:hidden;background:#fff}
.frame-container{position:absolute;inset:0;width:100%;height:100%;display:none}
.frame-container.active{display:block}
.nav-frame{width:100%;height:100%;border:none;background:#fff}

#touchOverlay{position:absolute;inset:0;z-index:20;touch-action:none;background:transparent;pointer-events:auto}

#loadScreen{position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:15}
#loadScreen.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--card);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadMsg{color:var(--dim);font-size:12px}

#cur{position:fixed;pointer-events:none;z-index:99999;
  width:0;height:0;
  border-left:9px solid transparent;
  border-right:0 solid transparent;
  border-bottom:15px solid rgba(255,255,255,.93);
  filter:drop-shadow(0 1px 4px rgba(0,0,0,.8));
  transform-origin:top left}
#cur::after{content:'';position:absolute;top:9px;left:-4px;
  width:4px;height:9px;background:rgba(255,255,255,.93);
  border-radius:0 0 3px 3px}
#cur.lc{border-bottom-color:rgba(138,180,248,.95)}
#cur.rc{border-bottom-color:rgba(242,139,130,.95)}
</style>
</head>
<body>

<div id="titlebar">
  <div id="tabsContainer"></div>
  <button id="newTab">+</button>
  <div id="winctrls"><div class="wc min"></div><div class="wc max"></div><div class="wc cls"></div></div>
</div>

<div id="toolbar">
  <button class="nb" id="backBtn">◀</button>
  <button class="nb" id="fwdBtn">▶</button>
  <button class="nb" id="refreshBtn">↻</button>
  <div id="omnibox"><span id="lockico">🔒</span><div id="urldisp"></div></div>
  <button id="menubtn">⋮</button>
  <div id="loadbar"></div>
</div>

<div id="viewport">
  <div id="loadScreen"><div class="spinner"></div><div id="loadMsg">Carregando...</div></div>
</div>

<div id="cur"></div>
<div id="touchOverlay"></div>

<script>
let tabs = [];
let activeTabId = null;
let tabCounter = 0;

const viewport = document.getElementById('viewport');
const tabsContainer = document.getElementById('tabsContainer');
const loadScreen = document.getElementById('loadScreen');
const urlDisp = document.getElementById('urldisp');
const backBtn = document.getElementById('backBtn');
const fwdBtn = document.getElementById('fwdBtn');
const refreshBtn = document.getElementById('refreshBtn');
const omnibox = document.getElementById('omnibox');
const lockico = document.getElementById('lockico');
const touchOverlay = document.getElementById('touchOverlay');

function createTabContainer() {
  const container = document.createElement('div');
  container.className = 'frame-container';
  container.id = `frame-${Date.now()}-${tabCounter++}`;
  const iframe = document.createElement('iframe');
  iframe.className = 'nav-frame';
  iframe.setAttribute('allow', 'fullscreen; clipboard-read; clipboard-write');
  container.appendChild(iframe);
  viewport.appendChild(container);
  return { container, iframe };
}

function addTab(url, active = true) {
  const { container, iframe } = createTabContainer();
  const tabId = container.id;
  
  const tabDiv = document.createElement('div');
  tabDiv.className = 'tab';
  tabDiv.dataset.id = tabId;
  tabDiv.innerHTML = `<span class="tab-ttl">${url.includes('cloudmoon') ? 'CloudMoon' : 'Nova aba'}</span><span class="tab-x">✕</span>`;
  
  const tabX = tabDiv.querySelector('.tab-x');
  tabX.onclick = (e) => {
    e.stopPropagation();
    closeTab(tabId);
  };
  tabDiv.onclick = () => switchToTab(tabId);
  
  tabsContainer.appendChild(tabDiv);
  
  tabs.push({
    id: tabId,
    container: container,
    iframe: iframe,
    tabDiv: tabDiv,
    url: url
  });
  
  iframe.onload = () => {
    if(activeTabId === tabId) {
      loadScreen.classList.add('hide');
    }
    updateTabTitle(tabId);
    if(activeTabId === tabId) {
      updateUrlBar(tabId);
      updateNavButtons();
    }
  };
  
  iframe.onerror = () => {
    if(activeTabId === tabId) {
      loadScreen.classList.add('hide');
    }
  };
  
  iframe.src = url;
  
  if(active) {
    switchToTab(tabId);
  } else {
    container.classList.remove('active');
  }
  
  return tabId;
}

function switchToTab(tabId) {
  tabs.forEach(tab => {
    tab.container.classList.remove('active');
    tab.tabDiv.classList.remove('active');
  });
  
  const activeTab = tabs.find(t => t.id === tabId);
  if(activeTab) {
    activeTab.container.classList.add('active');
    activeTab.tabDiv.classList.add('active');
    activeTabId = tabId;
    updateUrlBar(tabId);
    updateNavButtons();
    loadScreen.classList.add('hide');
  }
}

function closeTab(tabId) {
  const index = tabs.findIndex(t => t.id === tabId);
  if(index === -1) return;
  
  const tab = tabs[index];
  tab.container.remove();
  tab.tabDiv.remove();
  tabs.splice(index, 1);
  
  if(tabs.length === 0) {
    addTab('https://web.cloudmoonapp.com/pt/', true);
  } else if(activeTabId === tabId) {
    const newActive = tabs[Math.min(index, tabs.length - 1)];
    if(newActive) switchToTab(newActive.id);
  }
}

function updateTabTitle(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  if(!tab) return;
  try {
    let title = tab.iframe.contentDocument?.title;
    if(title && title.length > 25) title = title.slice(0, 22) + '...';
    if(title) tab.tabDiv.querySelector('.tab-ttl').innerText = title;
  } catch(e) {}
}

function updateUrlBar(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  if(!tab) return;
  try {
    let frameUrl = tab.iframe.contentWindow?.location.href;
    if(frameUrl && frameUrl !== 'about:blank') {
      urlDisp.innerText = frameUrl;
      lockico.innerText = frameUrl.startsWith('https') ? '🔒' : '⚠️';
    } else {
      urlDisp.innerText = tab.url;
    }
  } catch(e) {
    urlDisp.innerText = tab.url;
  }
}

function updateNavButtons() {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(!activeTab) return;
  try {
    backBtn.disabled = !activeTab.iframe.contentWindow?.history?.length;
    fwdBtn.disabled = !activeTab.iframe.contentWindow?.history?.length;
  } catch(e) {
    backBtn.disabled = false;
    fwdBtn.disabled = false;
  }
}

function loadUrlInActiveTab(url) {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(!activeTab) return;
  if(!url.startsWith('http')) url = 'https://' + url;
  activeTab.url = url;
  loadScreen.classList.remove('hide');
  activeTab.iframe.src = url;
}

backBtn.onclick = () => {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(activeTab) try { activeTab.iframe.contentWindow.history.back(); loadScreen.classList.remove('hide'); } catch(e) {}
};
fwdBtn.onclick = () => {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(activeTab) try { activeTab.iframe.contentWindow.history.forward(); loadScreen.classList.remove('hide'); } catch(e) {}
};
refreshBtn.onclick = () => {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(activeTab) { loadScreen.classList.remove('hide'); activeTab.iframe.src = activeTab.iframe.src; }
};
omnibox.onclick = () => {
  const newUrl = prompt('Digite a URL ou pesquisa:', urlDisp.innerText);
  if(newUrl && newUrl.trim()) loadUrlInActiveTab(newUrl.trim());
};
document.getElementById('newTab').onclick = () => addTab('https://www.google.com', true);

document.querySelector('.wc.min').onclick = () => window.close();
document.querySelector('.wc.max').onclick = () => alert('Modo tela cheia');
document.querySelector('.wc.cls').onclick = () => window.close();

const cur = document.getElementById('cur');
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let targetX = mouseX, targetY = mouseY;

function getActiveIframe() {
  const activeTab = tabs.find(t => t.id === activeTabId);
  return activeTab?.iframe;
}

function sendClickToIframe(x, y, isRightClick = false) {
  const iframe = getActiveIframe();
  if(!iframe || !iframe.contentDocument) return;
  const iframeRect = iframe.getBoundingClientRect();
  const iframeX = x - iframeRect.left;
  const iframeY = y - iframeRect.top;
  if(iframeX >= 0 && iframeX <= iframeRect.width && iframeY >= 0 && iframeY <= iframeRect.height) {
    const eventType = isRightClick ? 'contextmenu' : 'click';
    const event = new MouseEvent(eventType, {
      view: iframe.contentWindow, bubbles: true, cancelable: true,
      clientX: iframeX, clientY: iframeY,
      button: isRightClick ? 2 : 0, buttons: isRightClick ? 2 : 1
    });
    const targetElem = iframe.contentDocument.elementFromPoint(iframeX, iframeY);
    if(targetElem) targetElem.dispatchEvent(event);
    
    setTimeout(() => {
      updateUrlBar(activeTabId);
      updateNavButtons();
    }, 100);
  }
}

document.body.addEventListener('touchmove', (e) => {
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  cur.style.display = 'block';
});

document.body.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  cur.style.display = 'block';
});

function animateCursor() {
  mouseX += (targetX - mouseX) * 0.25;
  mouseY += (targetY - mouseY) * 0.25;
  cur.style.left = mouseX + 'px';
  cur.style.top = mouseY + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

let touchTimer;

touchOverlay.addEventListener('touchstart', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  touchTimer = setTimeout(() => {
    sendClickToIframe(targetX, targetY, true);
    cur.className = 'rc';
    setTimeout(() => cur.className = '', 150);
  }, 500);
});

touchOverlay.addEventListener('touchmove', (e) => {
  if(touchTimer) clearTimeout(touchTimer);
  e.preventDefault();
});

touchOverlay.addEventListener('touchend', (e) => {
  e.preventDefault();
  if(touchTimer) {
    clearTimeout(touchTimer);
    sendClickToIframe(targetX, targetY, false);
    cur.className = 'lc';
    setTimeout(() => cur.className = '', 150);
  }
});

addTab('https://web.cloudmoonapp.com/pt/', true);
</script>
</body>
</html>
