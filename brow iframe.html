<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AutoClick AFK + Simulação Realista Cloud Phone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra superior */
        .toolbar {
            background: #1a1a2a;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a3a;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 6px;
            background: #0f0f1a;
            border-radius: 30px;
            padding: 4px 12px;
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 0;
            outline: none;
        }

        .url-bar button {
            background: #23a55a;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .afk-btn {
            background: #eb459e;
            color: white;
        }

        .virtual-btn {
            background: #faa61a;
            color: #1e1e2f;
        }

        /* Tabs */
        .tabs-container {
            background: #1a1a2a;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 5px 5px 0 5px;
        }

        .tab {
            background: #0f0f1a;
            color: white;
            padding: 8px 16px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 140px;
            justify-content: space-between;
            font-size: 12px;
        }

        .tab.active {
            background: #5865F2;
        }

        .tab button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }

        .new-tab {
            background: #23a55a;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }

        /* Área de conteúdo */
        .content-area {
            flex: 1;
            position: relative;
        }

        .browser-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: white;
        }

        .browser-window.active {
            display: flex;
        }

        .browser-toolbar {
            background: #2a2a3a;
            padding: 4px 8px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .browser-toolbar input {
            flex: 1;
            background: #1e1e2f;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .browser-toolbar button {
            background: #5865F2;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }

        .browser-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* Painel AFK */
        .afk-panel {
            position: fixed;
            right: -450px;
            top: 0;
            width: 450px;
            height: 100vh;
            background: #1e1e2f;
            z-index: 10001;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            color: white;
        }

        .afk-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 15px;
            background: #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a3a4a;
        }

        .panel-header h3 {
            color: #eb459e;
        }

        .close-panel {
            background: #ed4245;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .afk-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .afk-btn-control {
            flex: 1;
            background: #5865F2;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .afk-btn-control.active {
            background: #eb459e;
            box-shadow: 0 0 10px #eb459e;
        }

        .config-group {
            margin-bottom: 15px;
        }

        .config-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }

        .config-group input, .config-group select {
            width: 100%;
            padding: 8px;
            background: #0f0f1a;
            border: none;
            color: white;
            border-radius: 5px;
        }

        .stats {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 12px;
        }

        /* Mouse Virtual */
        .virtual-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #eb459e;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: all 0.05s;
            background: rgba(235, 69, 158, 0.2);
            display: none;
        }

        .virtual-cursor.active {
            display: block;
        }

        /* Teclado Virtual */
        .virtual-keyboard {
            position: fixed;
            bottom: -400px;
            left: 0;
            right: 0;
            background: #1a1a2a;
            padding: 10px;
            z-index: 10002;
            transition: bottom 0.3s;
            border-top: 2px solid #5865F2;
        }

        .virtual-keyboard.open {
            bottom: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .key {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 12px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            min-width: 40px;
            transition: all 0.05s;
        }

        .key:active {
            transform: scale(0.95);
            background: #5865F2;
        }

        .key.special {
            background: #eb459e;
            min-width: 60px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 9999;
            animation: fadeUp 0.3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<div id="virtualCursor" class="virtual-cursor"></div>

<script>
    // ==================== VARIÁVEIS GLOBAIS ====================
    let browsers = [];
    let activeBrowserId = null;
    let browserCounter = 0;
    
    // AFK System
    let afkInterval = null;
    let isAfkRunning = false;
    let actionCounter = 0;
    let afkStartTime = null;
    let afkTimerInterval = null;
    
    // ==================== SISTEMA DE SIMULAÇÃO REALISTA ====================
    
    function getCurrentIframe() {
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return null;
        return document.getElementById(browser.iframeId);
    }
    
    function getIframeDocument() {
        const iframe = getCurrentIframe();
        if (!iframe) return null;
        try {
            return iframe.contentDocument || iframe.contentWindow.document;
        } catch(e) {
            return null;
        }
    }
    
    // Movimento realista de mouse (curva de Bezier)
    async function realisticMouseMove(targetX, targetY, duration = 500) {
        const cursor = document.getElementById('virtualCursor');
        cursor.classList.add('active');
        
        const startX = parseInt(cursor.style.left) || window.innerWidth / 2;
        const startY = parseInt(cursor.style.top) || window.innerHeight / 2;
        
        // Pontos de controle para curva suave
        const cp1x = startX + (targetX - startX) * 0.3 + (Math.random() - 0.5) * 50;
        const cp1y = startY + (targetY - startY) * 0.3 + (Math.random() - 0.5) * 50;
        const cp2x = startX + (targetX - startX) * 0.7 + (Math.random() - 0.5) * 50;
        const cp2y = startY + (targetY - startY) * 0.7 + (Math.random() - 0.5) * 50;
        
        const startTime = performance.now();
        
        return new Promise((resolve) => {
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const t = Math.min(1, elapsed / duration);
                
                // Curva de Bezier cúbica
                const mt = 1 - t;
                const x = mt*mt*mt*startX + 3*mt*mt*t*cp1x + 3*mt*t*t*cp2x + t*t*t*targetX;
                const y = mt*mt*mt*startY + 3*mt*mt*t*cp1y + 3*mt*t*t*cp2y + t*t*t*targetY;
                
                cursor.style.left = x + 'px';
                cursor.style.top = y + 'px';
                
                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    cursor.style.left = targetX + 'px';
                    cursor.style.top = targetY + 'px';
                    resolve();
                }
            }
            
            requestAnimationFrame(animate);
        });
    }
    
    // Clique realista com delay humano
    async function realisticClick(element, x, y) {
        if (!element) return false;
        
        // Delay humano antes do clique (80-200ms)
        await new Promise(resolve => setTimeout(resolve, 80 + Math.random() * 120));
        
        // Evento de mouse down
        const mouseDownEvent = new MouseEvent('mousedown', {
            view: window,
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y,
            button: 0
        });
        element.dispatchEvent(mouseDownEvent);
        
        await new Promise(resolve => setTimeout(resolve, 50 + Math.random() * 70));
        
        // Mouse up e click
        const mouseUpEvent = new MouseEvent('mouseup', {
            view: window,
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y,
            button: 0
        });
        element.dispatchEvent(mouseUpEvent);
        
        const clickEvent = new MouseEvent('click', {
            view: window,
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y
        });
        element.dispatchEvent(clickEvent);
        
        // Evento de toque para mobile
        const touchStart = new TouchEvent('touchstart', {
            bubbles: true,
            touches: [new Touch({identifier: 0, target: element, clientX: x, clientY: y})]
        });
        element.dispatchEvent(touchStart);
        
        await new Promise(resolve => setTimeout(resolve, 50));
        
        const touchEnd = new TouchEvent('touchend', { bubbles: true });
        element.dispatchEvent(touchEnd);
        
        return true;
    }
    
    // Scroll suave
    async function realisticScroll(element, deltaY) {
        const scrollEvent = new WheelEvent('wheel', {
            deltaY: deltaY,
            deltaMode: 0,
            bubbles: true,
            cancelable: true
        });
        element.dispatchEvent(scrollEvent);
        
        // Scroll suave
        const targetScroll = element.scrollTop + deltaY;
        const startScroll = element.scrollTop;
        const duration = 300;
        const startTime = performance.now();
        
        return new Promise((resolve) => {
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const t = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - t, 3); // Cubic ease out
                element.scrollTop = startScroll + (targetScroll - startScroll) * ease;
                
                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    resolve();
                }
            }
            requestAnimationFrame(animate);
        });
    }
    
    // Digitação realista
    async function realisticType(element, text) {
        if (!element) return;
        
        element.focus();
        element.value = '';
        
        for (let char of text) {
            // Delay entre teclas (50-200ms)
            await new Promise(resolve => setTimeout(resolve, 50 + Math.random() * 150));
            
            const keyDownEvent = new KeyboardEvent('keydown', { key: char, bubbles: true });
            element.dispatchEvent(keyDownEvent);
            
            const keyPressEvent = new KeyboardEvent('keypress', { key: char, bubbles: true });
            element.dispatchEvent(keyPressEvent);
            
            element.value += char;
            
            const inputEvent = new Event('input', { bubbles: true });
            element.dispatchEvent(inputEvent);
            
            const keyUpEvent = new KeyboardEvent('keyup', { key: char, bubbles: true });
            element.dispatchEvent(keyUpEvent);
        }
        
        const changeEvent = new Event('change', { bubbles: true });
        element.dispatchEvent(changeEvent);
    }
    
    // Obter elementos clicáveis aleatórios
    function getRandomClickableElement(doc) {
        const selectors = [
            'button', 'a', 'input[type="submit"]', '.btn', '[role="button"]',
            'div[onclick]', 'span[onclick]', 'clickable', 'input', 'textarea',
            'select', '[contenteditable="true"]'
        ];
        
        const elements = doc.querySelectorAll(selectors.join(','));
        if (elements.length === 0) return null;
        
        return elements[Math.floor(Math.random() * elements.length)];
    }
    
    // Executar ação AFK
    async function executeAfkAction() {
        if (!isAfkRunning) return;
        
        const targetTab = document.getElementById('targetTabSelect').value;
        const browser = browsers.find(b => b.id === targetTab);
        if (!browser) return;
        
        const iframe = document.getElementById(browser.iframeId);
        const doc = getIframeDocument();
        if (!doc) return;
        
        const mode = document.getElementById('afkMode').value;
        const allowMove = document.getElementById('allowMove').checked;
        const allowClick = document.getElementById('allowClick').checked;
        const allowScroll = document.getElementById('allowScroll').checked;
        const allowType = document.getElementById('allowType').checked;
        
        let actionDone = false;
        
        // Modo misto: escolhe ação aleatória
        let availableActions = [];
        if (allowMove) availableActions.push('move');
        if (allowClick) availableActions.push('click');
        if (allowScroll) availableActions.push('scroll');
        if (allowType) availableActions.push('type');
        
        if (availableActions.length === 0) return;
        
        let action = availableActions[Math.floor(Math.random() * availableActions.length)];
        
        // Ajustar baseado no modo
        if (mode === 'realistic') {
            // Priorizar movimentos suaves
            if (Math.random() < 0.6) action = 'move';
        } else if (mode === 'aggressive') {
            if (allowClick && Math.random() < 0.7) action = 'click';
        } else if (mode === 'subtle') {
            action = 'move';
        }
        
        try {
            if (action === 'move') {
                // Mover mouse para posição aleatória
                const randomX = 100 + Math.random() * (iframe.offsetWidth - 200);
                const randomY = 100 + Math.random() * (iframe.offsetHeight - 200);
                await realisticMouseMove(randomX, randomY, 300 + Math.random() * 400);
                actionDone = true;
            }
            else if (action === 'click') {
                const element = getRandomClickableElement(doc);
                if (element) {
                    const rect = element.getBoundingClientRect();
                    const x = rect.left + rect.width/2 + (Math.random() - 0.5) * 10;
                    const y = rect.top + rect.height/2 + (Math.random() - 0.5) * 10;
                    await realisticMouseMove(x, y, 200 + Math.random() * 300);
                    await realisticClick(element, x, y);
                    actionDone = true;
                }
            }
            else if (action === 'scroll') {
                const scrollable = doc.querySelector('body, .scrollable, [overflow="auto"]');
                if (scrollable) {
                    const delta = (Math.random() - 0.5) * 200;
                    await realisticScroll(scrollable, delta);
                    actionDone = true;
                }
            }
            else if (action === 'type') {
                const input = doc.querySelector('input, textarea');
                if (input) {
                    const texts = ['test', 'hello', '123', 'click', 'afk', 'auto'];
                    const randomText = texts[Math.floor(Math.random() * texts.length)];
                    await realisticType(input, randomText);
                    actionDone = true;
                }
            }
        } catch(e) {
            console.log('AFK action error:', e);
        }
        
        if (actionDone) {
            actionCounter++;
            document.getElementById('actionCount').innerText = actionCounter;
        }
    }
    
    // Iniciar AFK
    function startAfk() {
        if (afkInterval) clearInterval(afkInterval);
        
        const interval = parseInt(document.getElementById('afkInterval').value);
        isAfkRunning = true;
        afkStartTime = Date.now();
        
        afkInterval = setInterval(() => {
            if (isAfkRunning) {
                executeAfkAction();
            }
        }, interval);
        
        afkTimerInterval = setInterval(() => {
            if (afkStartTime) {
                const elapsed = Math.floor((Date.now() - afkStartTime) / 1000);
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                document.getElementById('afkTime').innerText = 
                    `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }
        }, 1000);
        
        document.getElementById('afkStatus').innerText = 'Executando';
        document.getElementById('startAfkBtn').disabled = true;
        document.getElementById('stopAfkBtn').disabled = false;
        document.getElementById('startAfkBtn').classList.remove('active');
        document.getElementById('stopAfkBtn').classList.add('active');
        
        mostrarToast('✅ Modo AFK iniciado! Ações sendo executadas em segundo plano.', '#eb459e');
    }
    
    function stopAfk() {
        if (afkInterval) {
            clearInterval(afkInterval);
            afkInterval = null;
        }
        if (afkTimerInterval) {
            clearInterval(afkTimerInterval);
            afkTimerInterval = null;
        }
        
        isAfkRunning = false;
        document.getElementById('afkStatus').innerText = 'Parado';
        document.getElementById('startAfkBtn').disabled = false;
        document.getElementById('stopAfkBtn').disabled = true;
        document.getElementById('startAfkBtn').classList.add('active');
        document.getElementById('stopAfkBtn').classList.remove('active');
        
        // Esconder cursor virtual
        document.getElementById('virtualCursor').classList.remove('active');
        
        mostrarToast('⏹️ Modo AFK parado.', '#5865F2');
    }
    
    // ==================== FUNÇÕES DO BROWSER ====================
    
    function mostrarToast(msg, cor = '#23a55a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function updateTargetTabSelect() {
        const select = document.getElementById('targetTabSelect');
        select.innerHTML = '';
        browsers.forEach(browser => {
            const option = document.createElement('option');
            option.value = browser.id;
            const iframe = document.getElementById(browser.iframeId);
            try {
                const url = iframe.contentWindow.location.href;
                option.textContent = url.substring(0, 50);
            } catch(e) {
                option.textContent = browser.id;
            }
            select.appendChild(option);
        });
    }
    
    function criarNovaBrowser(url = null) {
        const browserId = 'browser_' + (++browserCounter);
        const iframeId = 'iframe_' + browserId;
        
        const browserDiv = document.createElement('div');
        browserDiv.className = 'browser-window';
        browserDiv.id = browserId;
        
        browserDiv.innerHTML = `
            <div class="browser-toolbar">
                <input type="text" class="browser-url" id="url_${iframeId}" placeholder="Digite URL...">
                <button class="browser-go" data-browser="${browserId}">IR</button>
                <button class="browser-back" data-browser="${browserId}">◀</button>
                <button class="browser-forward" data-browser="${browserId}">▶</button>
                <button class="browser-reload" data-browser="${browserId}">🔄</button>
            </div>
            <iframe id="${iframeId}" class="browser-frame" src="${url || 'https://www.google.com/webhp?igu=1'}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
        `;
        
        document.getElementById('contentArea').appendChild(browserDiv);
        
        const iframe = document.getElementById(iframeId);
        
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.id = 'tab_' + browserId;
        tabDiv.innerHTML = `
            <span>${url ? new URL(url).hostname : 'Nova aba'}</span>
            <button class="close-tab" data-browser="${browserId}">✕</button>
        `;
        document.getElementById('tabsContainer').appendChild(tabDiv);
        
        browsers.push({
            id: browserId,
            iframeId: iframeId,
            url: url || 'https://www.google.com/webhp?igu=1',
            tabId: 'tab_' + browserId
        });
        
        tabDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('close-tab')) return;
            ativarBrowser(browserId);
        });
        
        const closeBtn = tabDiv.querySelector('.close-tab');
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fecharBrowser(browserId);
        });
        
        const goBtn = browserDiv.querySelector('.browser-go');
        const urlInput = browserDiv.querySelector('.browser-url');
        const backBtn = browserDiv.querySelector('.browser-back');
        const forwardBtn = browserDiv.querySelector('.browser-forward');
        const reloadBtn = browserDiv.querySelector('.browser-reload');
        
        urlInput.value = url || 'https://www.google.com/webhp?igu=1';
        
        goBtn.addEventListener('click', () => {
            let newUrl = urlInput.value;
            if (!newUrl.startsWith('http')) {
                if (newUrl.includes('.')) newUrl = 'https://' + newUrl;
                else newUrl = 'https://www.google.com/search?q=' + encodeURIComponent(newUrl);
            }
            iframe.src = newUrl;
            urlInput.value = newUrl;
            const b = browsers.find(b => b.id === browserId);
            if (b) b.url = newUrl;
            try { tabDiv.querySelector('span').textContent = new URL(newUrl).hostname; } catch(e) {}
            setTimeout(() => updateTargetTabSelect(), 1000);
        });
        
        backBtn.addEventListener('click', () => { try { iframe.contentWindow.history.back(); } catch(e) {} });
        forwardBtn.addEventListener('click', () => { try { iframe.contentWindow.history.forward(); } catch(e) {} });
        reloadBtn.addEventListener('click', () => { iframe.src = iframe.src; });
        
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') goBtn.click(); });
        
        iframe.addEventListener('load', () => {
            try {
                const currentUrl = iframe.contentWindow.location.href;
                urlInput.value = currentUrl;
                const b = browsers.find(b => b.id === browserId);
                if (b) b.url = currentUrl;
                try { tabDiv.querySelector('span').textContent = new URL(currentUrl).hostname; } catch(e) {}
            } catch(e) {}
            setTimeout(() => updateTargetTabSelect(), 500);
        });
        
        ativarBrowser(browserId);
        updateTargetTabSelect();
        return browserId;
    }
    
    function ativarBrowser(browserId) {
        activeBrowserId = browserId;
        browsers.forEach(b => {
            const browser = document.getElementById(b.id);
            if (browser) browser.classList.remove('active');
            const tab = document.getElementById(b.tabId);
            if (tab) tab.classList.remove('active');
        });
        document.getElementById(browserId).classList.add('active');
        document.getElementById('tab_' + browserId).classList.add('active');
        
        const browser = browsers.find(b => b.id === browserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            try {
                const currentUrl = iframe.contentWindow.location.href;
                if (currentUrl && currentUrl !== 'about:blank') {
                    document.getElementById('globalUrlInput').value = currentUrl;
                }
            } catch(e) {
                document.getElementById('globalUrlInput').value = browser.url;
            }
        }
    }
    
    function fecharBrowser(browserId) {
        const index = browsers.findIndex(b => b.id === browserId);
        if (index === -1) return;
        const browser = browsers[index];
        const browserDiv = document.getElementById(browser.id);
        if (browserDiv) browserDiv.remove();
        const tabDiv = document.getElementById(browser.tabId);
        if (tabDiv) tabDiv.remove();
        
        browsers.splice(index, 1);
        
        if (browsers.length === 0) {
            criarNovaBrowser('https://www.google.com/webhp?igu=1');
        } else if (activeBrowserId === browserId) {
            const nextIndex = index > 0 ? index - 1 : 0;
            ativarBrowser(browsers[nextIndex].id);
        }
        updateTargetTabSelect();
        
        // Se a aba AFK foi fechada, parar automação
        if (isAfkRunning && document.getElementById('targetTabSelect').value === browserId) {
            stopAfk();
        }
    }
    
    function acaoGlobal(tipo) {
        if (!activeBrowserId) return;
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return;
        const iframe = document.getElementById(browser.iframeId);
        if (tipo === 'back') { try { iframe.contentWindow.history.back(); } catch(e) {} }
        else if (tipo === 'forward') { try { iframe.contentWindow.history.forward(); } catch(e) {} }
        else if (tipo === 'reload') { iframe.src = iframe.src; }
    }
    
    // ==================== INICIALIZAÇÃO ====================
    
    function openAfkPanel() {
        document.getElementById('afkPanel').classList.add('open');
        updateTargetTabSelect();
    }
    
    function closeAfkPanel() {
        document.getElementById('afkPanel').classList.remove('open');
    }
    
    // Teclado Virtual
    function toggleVirtualKeyboard() {
        const keyboard = document.getElementById('virtualKeyboard');
        keyboard.classList.toggle('open');
    }
    
    function sendKeyToActiveIframe(key) {
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return;
        
        const iframe = document.getElementById(browser.iframeId);
        const doc = getIframeDocument();
        if (!doc) return;
        
        // Enviar evento de tecla para o iframe
        const activeElement = doc.activeElement;
        if (activeElement) {
            const keyDownEvent = new KeyboardEvent('keydown', { key: key, bubbles: true });
            activeElement.dispatchEvent(keyDownEvent);
            
            if (key.length === 1) {
                const keyPressEvent = new KeyboardEvent('keypress', { key: key, bubbles: true });
                activeElement.dispatchEvent(keyPressEvent);
                
                if (activeElement.value !== undefined) {
                    activeElement.value += key;
                    const inputEvent = new Event('input', { bubbles: true });
                    activeElement.dispatchEvent(inputEvent);
                }
            }
            
            const keyUpEvent = new KeyboardEvent('keyup', { key: key, bubbles: true });
            activeElement.dispatchEvent(keyUpEvent);
        }
    }
    
    // Event Listeners
    document.getElementById('globalGoBtn').addEventListener('click', () => {
        if (!activeBrowserId) return;
        let url = document.getElementById('globalUrlInput').value;
        if (!url.startsWith('http')) {
            if (url.includes('.')) url = 'https://' + url;
            else url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            iframe.src = url;
            browser.url = url;
            const tab = document.getElementById(browser.tabId);
            try { tab.querySelector('span').textContent = new URL(url).hostname; } catch(e) {}
        }
    });
    
    document.getElementById('globalUrlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('globalGoBtn').click();
    });
    
    document.getElementById('globalBackBtn').addEventListener('click', () => acaoGlobal('back'));
    document.getElementById('globalForwardBtn').addEventListener('click', () => acaoGlobal('forward'));
    document.getElementById('globalReloadBtn').addEventListener('click', () => acaoGlobal('reload'));
    document.getElementById('newTabBtn').addEventListener('click', () => criarNovaBrowser('https://www.google.com/webhp?igu=1'));
    document.getElementById('afkPanelBtn').addEventListener('click', openAfkPanel);
    document.getElementById('virtualKeyboardBtn').addEventListener('click', toggleVirtualKeyboard);
    document.getElementById('startAfkBtn').addEventListener('click', startAfk);
    document.getElementById('stopAfkBtn').addEventListener('click', stopAfk);
    
    // Teclas do teclado virtual
    document.querySelectorAll('.key').forEach(keyBtn => {
        keyBtn.addEventListener('click', () => {
            const key = keyBtn.getAttribute('data-key');
            if (key === 'Space') {
                sendKeyToActiveIframe(' ');
            } else if (key === 'Enter') {
                sendKeyToActiveIframe('Enter');
            } else if (key === 'Backspace') {
                // Lógica especial para backspace
                const browser = browsers.find(b => b.id === activeBrowserId);
                if (browser) {
                    const doc = getIframeDocument();
                    const activeElement = doc.activeElement;
                    if (activeElement && activeElement.value) {
                        activeElement.value = activeElement.value.slice(0, -1);
                        const inputEvent = new Event('input', { bubbles: true });
                        activeElement.dispatchEvent(inputEvent);
                    }
                }
            } else {
                sendKeyToActiveIframe(key);
            }
        });
    });
    
    // Iniciar
    criarNovaBrowser('https://www.google.com/webhp?igu=1');
    mostrarToast('✅ Sistema AFK Avançado + Simulação Realista ativado!', '#eb459e');
</script>
