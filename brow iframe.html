<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mouse + Teclado Virtual - Cloud Phone Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* Barra superior */
        .toolbar {
            background: #1a1a2a;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a3a;
            z-index: 100;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 6px;
            background: #0f0f1a;
            border-radius: 30px;
            padding: 4px 12px;
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            padding: 6px 0;
            outline: none;
        }

        .url-bar button {
            background: #23a55a;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .nav-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        /* Tabs */
        .tabs-container {
            background: #1a1a2a;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 5px 5px 0 5px;
        }

        .tab {
            background: #0f0f1a;
            color: white;
            padding: 6px 12px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 120px;
            justify-content: space-between;
            font-size: 11px;
        }

        .tab.active {
            background: #5865F2;
        }

        .tab button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }

        .new-tab {
            background: #23a55a;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
            font-size: 11px;
        }

        .content-area {
            flex: 1;
            position: relative;
        }

        .browser-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: white;
        }

        .browser-window.active {
            display: flex;
        }

        .browser-toolbar {
            background: #2a2a3a;
            padding: 4px 8px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .browser-toolbar input {
            flex: 1;
            background: #1e1e2f;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 20px;
            font-size: 11px;
        }

        .browser-toolbar button {
            background: #5865F2;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
        }

        .browser-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* ========== MOUSE VIRTUAL FLUTUANTE ========== */
        .virtual-mouse-container {
            position: fixed;
            bottom: 120px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(26, 26, 42, 0.95);
            padding: 12px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid #5865F2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .virtual-cursor {
            width: 45px;
            height: 45px;
            background: #5865F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: move;
            touch-action: none;
            box-shadow: 0 0 10px #5865F2;
            transition: transform 0.05s;
        }

        .virtual-cursor:active {
            transform: scale(0.95);
        }

        .mouse-buttons {
            display: flex;
            gap: 10px;
        }

        .mouse-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.05s;
        }

        .mouse-btn:active {
            transform: scale(0.95);
            background: #eb459e;
        }

        .mouse-btn.left {
            background: #23a55a;
        }

        .mouse-btn.right {
            background: #ed4245;
        }

        .mouse-scroll {
            display: flex;
            gap: 5px;
        }

        .scroll-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 10px;
            cursor: pointer;
        }

        /* ========== TECLADO VIRTUAL FLUTUANTE ========== */
        .virtual-keyboard-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 42, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            z-index: 10001;
            border: 1px solid #5865F2;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            touch-action: manipulation;
            width: 95%;
            max-width: 700px;
        }

        .keyboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid #2a2a3a;
        }

        .keyboard-title {
            color: #eb459e;
            font-size: 12px;
            font-weight: bold;
        }

        .keyboard-controls {
            display: flex;
            gap: 8px;
        }

        .kbd-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 10px;
            cursor: pointer;
        }

        .keyboard-minimize {
            background: #faa61a;
        }

        .keyboard-close {
            background: #ed4245;
        }

        .keyboard-drag {
            cursor: move;
            padding: 5px;
            background: #2a2a3a;
            border-radius: 10px;
            font-size: 12px;
            touch-action: none;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .key {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            min-width: 35px;
            text-align: center;
            transition: all 0.03s;
            touch-action: manipulation;
        }

        .key:active {
            transform: scale(0.92);
            background: #5865F2;
        }

        .key.special {
            background: #eb459e;
            min-width: 50px;
        }

        .key.wide {
            min-width: 70px;
        }

        /* Minimizado */
        .virtual-keyboard-container.minimized {
            width: auto;
            padding: 8px 15px;
        }

        .virtual-keyboard-container.minimized .keyboard-rows {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 10px;
            border-radius: 25px;
            text-align: center;
            z-index: 10002;
            animation: fadeUp 0.3s;
            font-size: 12px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="url-bar">
        <input type="text" id="globalUrlInput" placeholder="Digite URL...">
        <button id="globalGoBtn">IR</button>
    </div>
    <button id="globalBackBtn" class="nav-btn">◀</button>
    <button id="globalForwardBtn" class="nav-btn">▶</button>
    <button id="globalReloadBtn" class="nav-btn">🔄</button>
</div>

<div class="tabs-container" id="tabsContainer"></div>
<button id="newTabBtn" class="new-tab">+ Nova Aba</button>
<div class="content-area" id="contentArea"></div>

<!-- MOUSE VIRTUAL FLUTUANTE -->
<div id="mouseContainer" class="virtual-mouse-container">
    <div id="virtualCursor" class="virtual-cursor">
        🖱️
    </div>
    <div class="mouse-buttons">
        <button id="mouseLeftBtn" class="mouse-btn left">LMB</button>
        <button id="mouseRightBtn" class="mouse-btn right">RMB</button>
    </div>
    <div class="mouse-scroll">
        <button id="scrollUpBtn" class="scroll-btn">⬆️ Scroll</button>
        <button id="scrollDownBtn" class="scroll-btn">⬇️ Scroll</button>
    </div>
</div>

<!-- TECLADO VIRTUAL FLUTUANTE -->
<div id="keyboardContainer" class="virtual-keyboard-container">
    <div class="keyboard-header">
        <div class="keyboard-drag" id="keyboardDragHandle">⋮⋮ Teclado Virtual ⋮⋮</div>
        <div class="keyboard-controls">
            <button id="keyboardMinimizeBtn" class="kbd-btn keyboard-minimize">─</button>
            <button id="keyboardCloseBtn" class="kbd-btn keyboard-close">✕</button>
        </div>
    </div>
    <div class="keyboard-rows">
        <div class="keyboard-row">
            <button class="key" data-key="`">`</button><button class="key" data-key="1">1</button><button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button><button class="key" data-key="4">4</button><button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button><button class="key" data-key="7">7</button><button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button><button class="key" data-key="0">0</button><button class="key" data-key="-">-</button>
            <button class="key" data-key="=">=</button><button class="key special" data-key="Backspace">⌫</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="Tab">Tab</button><button class="key" data-key="q">q</button><button class="key" data-key="w">w</button>
            <button class="key" data-key="e">e</button><button class="key" data-key="r">r</button><button class="key" data-key="t">t</button>
            <button class="key" data-key="y">y</button><button class="key" data-key="u">u</button><button class="key" data-key="i">i</button>
            <button class="key" data-key="o">o</button><button class="key" data-key="p">p</button><button class="key" data-key="[">[</button>
            <button class="key" data-key="]">]</button><button class="key special" data-key="\">\</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="CapsLock">Caps</button><button class="key" data-key="a">a</button><button class="key" data-key="s">s</button>
            <button class="key" data-key="d">d</button><button class="key" data-key="f">f</button><button class="key" data-key="g">g</button>
            <button class="key" data-key="h">h</button><button class="key" data-key="j">j</button><button class="key" data-key="k">k</button>
            <button class="key" data-key="l">l</button><button class="key" data-key=";">;</button><button class="key" data-key="'">'</button>
            <button class="key special wide" data-key="Enter">Enter</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="Shift">Shift</button><button class="key" data-key="z">z</button><button class="key" data-key="x">x</button>
            <button class="key" data-key="c">c</button><button class="key" data-key="v">v</button><button class="key" data-key="b">b</button>
            <button class="key" data-key="n">n</button><button class="key" data-key="m">m</button><button class="key" data-key=",">,</button>
            <button class="key" data-key=".">.</button><button class="key" data-key="/">/</button><button class="key special" data-key="Shift">Shift</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="Ctrl">Ctrl</button><button class="key special" data-key="Alt">Alt</button>
            <button class="key special wide" data-key="Space">Espaço</button>
            <button class="key special" data-key="ArrowLeft">←</button><button class="key special" data-key="ArrowUp">↑</button>
            <button class="key special" data-key="ArrowDown">↓</button><button class="key special" data-key="ArrowRight">→</button>
        </div>
    </div>
</div>

<script>
    // ==================== VARIÁVEIS ====================
    let browsers = [];
    let activeBrowserId = null;
    let browserCounter = 0;
    
    // Mouse virtual
    let mouseX = window.innerWidth - 80;
    let mouseY = window.innerHeight - 200;
    let isDraggingMouse = false;
    let dragStartX = 0, dragStartY = 0;
    
    // Teclado virtual flutuante
    let keyboardX = 0;
    let keyboardY = 0;
    let isDraggingKeyboard = false;
    let keyboardDragStartX = 0, keyboardDragStartY = 0;
    let keyboardMinimized = false;
    
    // ==================== FUNÇÕES ====================
    
    function getCurrentIframe() {
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return null;
        return document.getElementById(browser.iframeId);
    }
    
    function getIframeDocument() {
        const iframe = getCurrentIframe();
        if (!iframe) return null;
        try {
            return iframe.contentDocument || iframe.contentWindow.document;
        } catch(e) {
            return null;
        }
    }
    
    // Enviar clique para o iframe
    async function sendClickToIframe(x, y, isRightClick = false) {
        const iframe = getCurrentIframe();
        const doc = getIframeDocument();
        if (!doc) return;
        
        // Ajustar coordenadas relativas ao iframe
        const iframeRect = iframe.getBoundingClientRect();
        const targetX = x - iframeRect.left;
        const targetY = y - iframeRect.top;
        
        if (targetX < 0 || targetY < 0 || targetX > iframeRect.width || targetY > iframeRect.height) return;
        
        const element = doc.elementFromPoint(targetX, targetY);
        if (!element) return;
        
        const button = isRightClick ? 2 : 0;
        
        // Mouse down
        const downEvent = new MouseEvent('mousedown', {
            view: iframe.contentWindow,
            bubbles: true,
            cancelable: true,
            clientX: targetX,
            clientY: targetY,
            button: button,
            buttons: button === 0 ? 1 : 2
        });
        element.dispatchEvent(downEvent);
        
        await new Promise(r => setTimeout(r, 50));
        
        // Mouse up e click
        const upEvent = new MouseEvent('mouseup', {
            view: iframe.contentWindow,
            bubbles: true,
            cancelable: true,
            clientX: targetX,
            clientY: targetY,
            button: button
        });
        element.dispatchEvent(upEvent);
        
        const clickEvent = new MouseEvent('click', {
            view: iframe.contentWindow,
            bubbles: true,
            cancelable: true,
            clientX: targetX,
            clientY: targetY,
            button: button
        });
        element.dispatchEvent(clickEvent);
        
        // Evento de toque para compatibilidade mobile
        if (!isRightClick) {
            const touchStart = new TouchEvent('touchstart', {
                bubbles: true,
                touches: [new Touch({identifier: 0, target: element, clientX: targetX, clientY: targetY})]
            });
            element.dispatchEvent(touchStart);
            await new Promise(r => setTimeout(r, 50));
            const touchEnd = new TouchEvent('touchend', { bubbles: true });
            element.dispatchEvent(touchEnd);
        }
        
        mostrarToast(isRightClick ? '🖱️ Clique Direito' : '🖱️ Clique Esquerdo', '#5865F2');
    }
    
    // Enviar scroll
    function sendScrollToIframe(deltaY) {
        const iframe = getCurrentIframe();
        const doc = getIframeDocument();
        if (!doc) return;
        
        const scrollEvent = new WheelEvent('wheel', {
            deltaY: deltaY,
            deltaMode: 0,
            bubbles: true,
            cancelable: true
        });
        doc.body.dispatchEvent(scrollEvent);
        mostrarToast(`📜 Scroll ${deltaY > 0 ? 'para baixo' : 'para cima'}`, '#faa61a');
    }
    
    // Enviar tecla para o iframe
    function sendKeyToIframe(key) {
        const doc = getIframeDocument();
        if (!doc) return;
        
        let activeElement = doc.activeElement;
        
        // Se não tem foco, tenta focar em algum input
        if (!activeElement || activeElement === doc.body) {
            const input = doc.querySelector('input, textarea, [contenteditable="true"]');
            if (input) {
                input.focus();
                activeElement = input;
            }
        }
        
        if (activeElement && activeElement !== doc.body) {
            // Eventos de teclado
            const downEvent = new KeyboardEvent('keydown', { key: key, bubbles: true, cancelable: true });
            activeElement.dispatchEvent(downEvent);
            
            if (key.length === 1 && !downEvent.defaultPrevented) {
                const pressEvent = new KeyboardEvent('keypress', { key: key, bubbles: true });
                activeElement.dispatchEvent(pressEvent);
                
                if (activeElement.value !== undefined && !pressEvent.defaultPrevented) {
                    const start = activeElement.selectionStart || 0;
                    const end = activeElement.selectionEnd || 0;
                    activeElement.value = activeElement.value.slice(0, start) + key + activeElement.value.slice(end);
                    activeElement.selectionStart = activeElement.selectionEnd = start + 1;
                    const inputEvent = new Event('input', { bubbles: true });
                    activeElement.dispatchEvent(inputEvent);
                }
            }
            
            const upEvent = new KeyboardEvent('keyup', { key: key, bubbles: true });
            activeElement.dispatchEvent(upEvent);
        }
    }
    
    // Teclas especiais
    function sendSpecialKey(key) {
        const doc = getIframeDocument();
        if (!doc) return;
        
        let activeElement = doc.activeElement;
        if (!activeElement || activeElement === doc.body) {
            const input = doc.querySelector('input, textarea');
            if (input) {
                input.focus();
                activeElement = input;
            }
        }
        
        if (activeElement && activeElement !== doc.body) {
            const event = new KeyboardEvent('keydown', { key: key, bubbles: true, cancelable: true });
            activeElement.dispatchEvent(event);
            
            if (key === 'Backspace' && activeElement.value !== undefined && !event.defaultPrevented) {
                const start = activeElement.selectionStart || 0;
                const end = activeElement.selectionEnd || 0;
                if (start === end && start > 0) {
                    activeElement.value = activeElement.value.slice(0, start - 1) + activeElement.value.slice(end);
                    activeElement.selectionStart = activeElement.selectionEnd = start - 1;
                } else if (start !== end) {
                    activeElement.value = activeElement.value.slice(0, start) + activeElement.value.slice(end);
                    activeElement.selectionStart = activeElement.selectionEnd = start;
                }
                const inputEvent = new Event('input', { bubbles: true });
                activeElement.dispatchEvent(inputEvent);
            }
            
            if (key === 'Enter') {
                const submitEvent = new Event('submit', { bubbles: true });
                if (activeElement.form) activeElement.form.dispatchEvent(submitEvent);
            }
            
            const upEvent = new KeyboardEvent('keyup', { key: key, bubbles: true });
            activeElement.dispatchEvent(upEvent);
        }
    }
    
    // ==================== MOUSE VIRTUAL ====================
    function initMouseDrag() {
        const cursor = document.getElementById('virtualCursor');
        
        cursor.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDraggingMouse = true;
            const touch = e.touches[0];
            dragStartX = touch.clientX - mouseX;
            dragStartY = touch.clientY - mouseY;
        });
        
        cursor.addEventListener('touchmove', (e) => {
            if (!isDraggingMouse) return;
            e.preventDefault();
            const touch = e.touches[0];
            let newX = touch.clientX - dragStartX;
            let newY = touch.clientY - dragStartY;
            
            newX = Math.max(10, Math.min(window.innerWidth - 70, newX));
            newY = Math.max(10, Math.min(window.innerHeight - 150, newY));
            
            mouseX = newX;
            mouseY = newY;
            
            const container = document.getElementById('mouseContainer');
            container.style.right = 'auto';
            container.style.bottom = 'auto';
            container.style.left = mouseX + 'px';
            container.style.top = mouseY + 'px';
        });
        
        cursor.addEventListener('touchend', () => {
            isDraggingMouse = false;
        });
        
        // Posição inicial
        const container = document.getElementById('mouseContainer');
        container.style.right = 'auto';
        container.style.bottom = 'auto';
        container.style.left = mouseX + 'px';
        container.style.top = mouseY + 'px';
    }
    
    // ==================== TECLADO VIRTUAL FLUTUANTE ====================
    function initKeyboardDrag() {
        const container = document.getElementById('keyboardContainer');
        const handle = document.getElementById('keyboardDragHandle');
        
        handle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDraggingKeyboard = true;
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            keyboardDragStartX = touch.clientX - rect.left;
            keyboardDragStartY = touch.clientY - rect.top;
            container.style.transition = 'none';
        });
        
        handle.addEventListener('touchmove', (e) => {
            if (!isDraggingKeyboard) return;
            e.preventDefault();
            const touch = e.touches[0];
            let newLeft = touch.clientX - keyboardDragStartX;
            let newTop = touch.clientY - keyboardDragStartY;
            
            newLeft = Math.max(5, Math.min(window.innerWidth - container.offsetWidth - 5, newLeft));
            newTop = Math.max(50, Math.min(window.innerHeight - container.offsetHeight - 20, newTop));
            
            container.style.left = newLeft + 'px';
            container.style.top = newTop + 'px';
            container.style.bottom = 'auto';
            container.style.transform = 'none';
        });
        
        handle.addEventListener('touchend', () => {
            isDraggingKeyboard = false;
            container.style.transition = '';
        });
    }
    
    function minimizeKeyboard() {
        keyboardMinimized = !keyboardMinimized;
        const container = document.getElementById('keyboardContainer');
        const btn = document.getElementById('keyboardMinimizeBtn');
        
        if (keyboardMinimized) {
            container.classList.add('minimized');
            btn.textContent = '□';
        } else {
            container.classList.remove('minimized');
            btn.textContent = '─';
        }
    }
    
    function closeKeyboard() {
        document.getElementById('keyboardContainer').style.display = 'none';
        mostrarToast('⌨️ Teclado fechado (recarregue a página para reabrir)', '#ed4245');
    }
    
    // ==================== FUNÇÕES DO BROWSER ====================
    
    function mostrarToast(msg, cor = '#23a55a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function criarNovaBrowser(url = null) {
        const browserId = 'browser_' + (++browserCounter);
        const iframeId = 'iframe_' + browserId;
        
        const browserDiv = document.createElement('div');
        browserDiv.className = 'browser-window';
        browserDiv.id = browserId;
        
        browserDiv.innerHTML = `
            <div class="browser-toolbar">
                <input type="text" class="browser-url" id="url_${iframeId}" placeholder="URL...">
                <button class="browser-go" data-browser="${browserId}">IR</button>
                <button class="browser-back" data-browser="${browserId}">◀</button>
                <button class="browser-forward" data-browser="${browserId}">▶</button>
                <button class="browser-reload" data-browser="${browserId}">🔄</button>
            </div>
            <iframe id="${iframeId}" class="browser-frame" src="${url || 'https://www.google.com/webhp?igu=1'}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
        `;
        
        document.getElementById('contentArea').appendChild(browserDiv);
        
        const iframe = document.getElementById(iframeId);
        
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.id = 'tab_' + browserId;
        tabDiv.innerHTML = `<span>${url ? new URL(url).hostname : 'Nova'}</span><button class="close-tab" data-browser="${browserId}">✕</button>`;
        document.getElementById('tabsContainer').appendChild(tabDiv);
        
        browsers.push({ id: browserId, iframeId: iframeId, url: url || 'https://www.google.com/webhp?igu=1', tabId: 'tab_' + browserId });
        
        tabDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('close-tab')) return;
            ativarBrowser(browserId);
        });
        
        tabDiv.querySelector('.close-tab').addEventListener('click', (e) => {
            e.stopPropagation();
            fecharBrowser(browserId);
        });
        
        const goBtn = browserDiv.querySelector('.browser-go');
        const urlInput = browserDiv.querySelector('.browser-url');
        urlInput.value = url || 'https://www.google.com/webhp?igu=1';
        
        goBtn.addEventListener('click', () => {
            let newUrl = urlInput.value;
            if (!newUrl.startsWith('http')) {
                if (newUrl.includes('.')) newUrl = 'https://' + newUrl;
                else newUrl = 'https://www.google.com/search?q=' + encodeURIComponent(newUrl);
            }
            iframe.src = newUrl;
            try { tabDiv.querySelector('span').textContent = new URL(newUrl).hostname; } catch(e) {}
        });
        
        browserDiv.querySelector('.browser-back').addEventListener('click', () => { try { iframe.contentWindow.history.back(); } catch(e) {} });
        browserDiv.querySelector('.browser-forward').addEventListener('click', () => { try { iframe.contentWindow.history.forward(); } catch(e) {} });
        browserDiv.querySelector('.browser-reload').addEventListener('click', () => { iframe.src = iframe.src; });
        
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') goBtn.click(); });
        
        ativarBrowser(browserId);
        return browserId;
    }
    
    function ativarBrowser(browserId) {
        activeBrowserId = browserId;
        browsers.forEach(b => {
            document.getElementById(b.id)?.classList.remove('active');
            document.getElementById(b.tabId)?.classList.remove('active');
        });
        document.getElementById(browserId).classList.add('active');
        document.getElementById('tab_' + browserId).classList.add('active');
        
        const browser = browsers.find(b => b.id === browserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            try {
                document.getElementById('globalUrlInput').value = iframe.contentWindow.location.href;
            } catch(e) {
                document.getElementById('globalUrlInput').value = browser.url;
            }
        }
    }
    
    function fecharBrowser(browserId) {
        const index = browsers.findIndex(b => b.id === browserId);
        if (index === -1) return;
        const browser = browsers[index];
        document.getElementById(browser.id)?.remove();
        document.getElementById(browser.tabId)?.remove();
        browsers.splice(index, 1);
        
        if (browsers.length === 0) {
            criarNovaBrowser('https://www.google.com/webhp?igu=1');
        } else if (activeBrowserId === browserId) {
            ativarBrowser(browsers[Math.max(0, index - 1)].id);
        }
    }
    
    function acaoGlobal(tipo) {
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return;
        const iframe = document.getElementById(browser.iframeId);
        if (tipo === 'back') { try { iframe.contentWindow.history.back(); } catch(e) {} }
        else if (tipo === 'forward') { try { iframe.contentWindow.history.forward(); } catch(e) {} }
        else if (tipo === 'reload') { iframe.src = iframe.src; }
    }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('globalGoBtn').addEventListener('click', () => {
        let url = document.getElementById('globalUrlInput').value;
        if (!url.startsWith('http')) {
            if (url.includes('.')) url = 'https://' + url;
            else url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (browser) {
            document.getElementById(browser.iframeId).src = url;
            try { document.getElementById('tab_' + browser.id).querySelector('span').textContent = new URL(url).hostname; } catch(e) {}
        }
    });
    
    document.getElementById('globalBackBtn').addEventListener('click', () => acaoGlobal('back'));
    document.getElementById('globalForwardBtn').addEventListener('click', () => acaoGlobal('forward'));
    document.getElementById('globalReloadBtn').addEventListener('click', () => acaoGlobal('reload'));
    document.getElementById('newTabBtn').addEventListener('click', () => criarNovaBrowser('https://www.google.com/webhp?igu=1'));
    
    // Mouse buttons
    document.getElementById('mouseLeftBtn').addEventListener('click', () => {
        const cursor = document.getElementById('mouseContainer');
        const rect = cursor.getBoundingClientRect();
        sendClickToIframe(rect.left + 25, rect.top + 25, false);
    });
    
    document.getElementById('mouseRightBtn').addEventListener('click', () => {
        const cursor = document.getElementById('mouseContainer');
        const rect = cursor.getBoundingClientRect();
        sendClickToIframe(rect.left + 25, rect.top + 25, true);
    });
    
    document.getElementById('scrollUpBtn').addEventListener('click', () => sendScrollToIframe(-200));
    document.getElementById('scrollDownBtn').addEventListener('click', () => sendScrollToIframe(200));
    
    // Keyboard keys
    document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('click', () => {
            const keyVal = key.getAttribute('data-key');
            if (keyVal === 'Backspace' || keyVal === 'Enter' || keyVal === 'Tab' || 
                keyVal === 'Shift' || keyVal === 'Ctrl' || keyVal === 'Alt' ||
                keyVal.startsWith('Arrow')) {
                sendSpecialKey(keyVal);
            } else {
                sendKeyToIframe(keyVal);
            }
        });
    });
    
    document.getElementById('keyboardMinimizeBtn').addEventListener('click', minimizeKeyboard);
    document.getElementById('keyboardCloseBtn').addEventListener('click', closeKeyboard);
    
    // Inicializar
    initMouseDrag();
    initKeyboardDrag();
    criarNovaBrowser('https://www.google.com/webhp?igu=1');
    
    mostrarToast('✅ Mouse + Teclado Virtual ativados! Arraste o mouse e use os botões.', '#23a55a');
</script>
</body>
</html>
