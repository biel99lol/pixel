<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navegador Mobile com Controles Virtuais</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: Arial, sans-serif;
        }

        /* Barra de Navegação Superior */
        .nav-bar {
            width: 100%;
            height: 50px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            padding: 5px 10px;
            gap: 10px;
            z-index: 100;
            position: relative;
        }

        .nav-bar input {
            flex: 1;
            height: 35px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 0 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .nav-bar button {
            height: 35px;
            padding: 0 15px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Container do Iframe */
        .iframe-container {
            width: 100%;
            height: calc(100% - 50px);
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* Cursor Customizado */
        #virtual-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="2"><path d="M4.5 2.5v14l3.75-3.75 3 7.5 1.88-.75-3-7.5h5.37z"/></svg>') no-repeat;
            pointer-events: none;
            z-index: 99999;
            top: 50%;
            left: 50%;
            transition: transform 0.1s ease;
        }

        #virtual-cursor.clicking {
            transform: scale(0.8);
        }

        /* Widgets Flutuantes (Mousepad e Teclado) */
        .widget {
            position: fixed;
            background: rgba(30, 30, 30, 0.85);
            border: 2px solid #444;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .widget-header {
            background: #2a2a2a;
            padding: 5px 10px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            font-weight: bold;
        }

        /* MOUSEPAD (Touchpad) */
        #mousepad-widget {
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 140px;
        }

        .trackpad-area {
            width: 100%;
            height: calc(100% - 22px);
            background: rgba(50, 50, 50, 0.4);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            touch-action: none; /* Impede scroll nativo do celular */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 11px;
        }

        /* TECLADO VIRTUAL */
        #keyboard-widget {
            bottom: 20px;
            left: 20px;
            width: 280px;
            padding-bottom: 5px;
        }

        .keyboard-modes {
            display: flex;
            justify-content: space-around;
            padding: 5px;
            background: #252525;
        }

        .mode-btn {
            background: #444;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 3px;
        }

        .mode-btn.active {
            background: #007bff;
        }

        .keys-container {
            padding: 5px;
            display: grid;
            gap: 4px;
        }

        /* Modo Gamer Layout (WASD + Setas) */
        .mode-layout {
            display: none;
        }

        .mode-layout.active {
            display: block;
        }

        .gamer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        /* Teclas Individuais */
        .key {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 10px 0;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            touch-action: none;
        }

        .key:active {
            background: #007bff;
            transform: scale(0.95);
        }

        .key.wide {
            grid-column: span 2;
        }

        /* Layout de Letras Básicas */
        .typing-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <input type="text" id="url-input" value="https://biel99lol.github.io/pixel/seu-jogo-local.html" placeholder="Digite a URL do site/jogo">
        <button onclick="loadUrl()">Carregar</button>
    </div>

    <div class="iframe-container">
        <iframe id="web-iframe" src=""></iframe>
    </div>

    <div id="virtual-cursor"></div>

    <div class="widget" id="mousepad-widget">
        <div class="widget-header">MOUSEPAD</div>
        <div class="trackpad-area" id="trackpad">Arraste aqui / Toque p/ Clicar</div>
    </div>

    <div class="widget" id="keyboard-widget">
        <div class="widget-header">TECLADO VIRTUAL</div>
        <div class="keyboard-modes">
            <button class="mode-btn active" onclick="switchMode('gamer')">Modo Jogo</button>
            <button class="mode-btn" onclick="switchMode('typing')">Modo Digitar</button>
        </div>

        <div class="keys-container">
            <div id="layout-gamer" class="mode-layout active">
                <div class="gamer-grid">
                    <div class="key" data-key="w">W</div>
                    <div class="key" data-key="a">A</div>
                    <div class="key" data-key="s">S</div>
                    <div class="key" data-key="d">D</div>
                    <div class="key" data-key="ArrowUp">↑</div>
                    <div class="key" data-key="ArrowLeft">←</div>
                    <div class="key" data-key="ArrowDown">↓</div>
                    <div class="key" data-key="ArrowRight">→</div>
                    <div class="key wide" data-key=" ">Espaço</div>
                    <div class="key wide" data-key="Enter">Enter</div>
                </div>
            </div>

            <div id="layout-typing" class="mode-layout">
                <div class="typing-grid">
                    <div class="key" data-key="q">Q</div><div class="key" data-key="w">W</div><div class="key" data-key="e">E</div><div class="key" data-key="r">R</div><div class="key" data-key="t">T</div><div class="key" data-key="y">Y</div>
                    <div class="key" data-key="a">A</div><div class="key" data-key="s">S</div><div class="key" data-key="d">D</div><div class="key" data-key="f">F</div><div class="key" data-key="g">G</div><div class="key" data-key="h">H</div>
                    <div class="key" data-key="z">Z</div><div class="key" data-key="x">X</div><div class="key" data-key="c">C</div><div class="key" data-key="v">V</div><div class="key" data-key="b">B</div><div class="key" data-key="Backspace">⌫</div>
                    <div class="key wide" style="grid-column: span 6;" data-key=" ">Espaço</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configurações do Cursor
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        const cursor = document.getElementById('virtual-cursor');
        const trackpad = document.getElementById('trackpad');
        const iframe = document.getElementById('web-iframe');

        // Atualiza posição inicial do cursor gráfico
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';

        // Lógica do Mousepad (Arrastar para mover a seta)
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isMoving = false;

        trackpad.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            isMoving = false;
        });

        trackpad.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Impede a tela de rolar
            const touch = e.touches[0];
            
            // Calcula o quanto o dedo se moveu
            const deltaX = touch.clientX - lastTouchX;
            const deltaY = touch.clientY - lastTouchY;

            // Sensibilidade do mouse (1.5)
            cursorX += deltaX * 1.5;
            cursorY += deltaY * 1.5;

            // Limita o cursor dentro dos cantos da tela
            cursorX = Math.max(0, Math.min(window.innerWidth - 10, cursorX));
            cursorY = Math.max(0, Math.min(window.innerHeight - 10, cursorY));

            // Aplica o movimento na seta
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';

            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            isMoving = true;
        });

        trackpad.addEventListener('touchend', () => {
            // Se o usuário apenas deu um toque rápido sem arrastar, simula um Clique!
            if (!isMoving) {
                executeVirtualClick(cursorX, cursorY);
            }
        });

        // Executar Clique Virtual no ponto ordenado
        function executeVirtualClick(x, y) {
            cursor.classList.add('clicking');
            setTimeout(() => cursor.classList.remove('clicking'), 120);

            // Tenta clicar no elemento sob a seta
            const element = document.elementFromPoint(x, y);
            if (element) {
                element.click();
                
                // Se for o iframe e estiver no mesmo domínio, tenta clicar internamente
                if (element.tagName === 'IFRAME') {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        // Ajusta a posição relativa ao iframe
                        const rect = iframe.getBoundingClientRect();
                        const innerEl = iframeDoc.elementFromPoint(x - rect.left, y - rect.top);
                        if (innerEl) {
                            innerEl.click();
                            innerEl.focus();
                        }
                    } catch (err) {
                        console.log("Aviso CORS: O jogo é externo. Para jogos externos clique tocando diretamente na tela.");
                    }
                }
            }
        }

        // Lógica do Teclado Virtual (Gamer e Digitação)
        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.mode-layout').forEach(l => l.classList.remove('active'));
            
            if(mode === 'gamer') {
                document.querySelector('[onclick="switchMode(\'gamer\')"]').classList.add('active');
                document.getElementById('layout-gamer').classList.add('active');
            } else {
                document.querySelector('[onclick="switchMode(\'typing\')"]').classList.add('active');
                document.getElementById('layout-typing').classList.add('active');
            }
        }

        // Capturar cliques nas teclas e disparar os eventos (Keydown/Keyup)
        document.querySelectorAll('.key').forEach(keyBtn => {
            const keyValue = keyBtn.getAttribute('data-key');

            // Evento ao apertar o botão do teclado virtual
            keyBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerKeyEvent('keydown', keyValue);
            });

            // Evento ao soltar o botão do teclado virtual
            keyBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                triggerKeyEvent('keyup', keyValue);
            });
        });

        function triggerKeyEvent(type, keyName) {
            // Cria o evento de teclado padrão do navegador
            const event = new KeyboardEvent(type, {
                key: keyName,
                bubbles: true,
                cancelable: true
            });

            // Dispara na página principal
            document.dispatchEvent(event);

            // Tenta injetar dentro do iframe (Só funciona em sites do mesmo domínio)
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.document.dispatchEvent(event);
                }
            } catch (e) {
                // Bloqueado por restrição de segurança externa (CORS)
            }
        }

        // Carregar nova URL no Iframe
        function loadUrl() {
            let url = document.getElementById('url-input').value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            iframe.src = url;
        }

        // Inicializa carregando um exemplo
        window.onload = () => {
            loadUrl();
        };
    </script>
</body>
</html>
