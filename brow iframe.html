<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mouse + Teclado Virtual - Funcional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Barra superior */
        .toolbar {
            background: #1a1a2a;
            padding: 6px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a3a;
            z-index: 100;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 5px;
            background: #0f0f1a;
            border-radius: 25px;
            padding: 3px 10px;
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 11px;
            padding: 5px 0;
            outline: none;
        }

        .url-bar button {
            background: #23a55a;
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
        }

        .nav-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
        }

        /* Tabs */
        .tabs-container {
            background: #1a1a2a;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 4px 4px 0 4px;
        }

        .tab {
            background: #0f0f1a;
            color: white;
            padding: 4px 10px;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 100px;
            justify-content: space-between;
            font-size: 10px;
        }

        .tab.active {
            background: #5865F2;
        }

        .tab button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
            padding: 0 3px;
        }

        .new-tab {
            background: #23a55a;
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            cursor: pointer;
            margin: 4px;
            font-size: 10px;
        }

        .content-area {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .browser-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: white;
        }

        .browser-window.active {
            display: flex;
        }

        .browser-toolbar {
            background: #2a2a3a;
            padding: 3px 6px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .browser-toolbar input {
            flex: 1;
            background: #1e1e2f;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 10px;
        }

        .browser-toolbar button {
            background: #5865F2;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 9px;
        }

        .browser-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* Página interna para teste */
        .local-page {
            flex: 1;
            background: white;
            padding: 20px;
            overflow-y: auto;
            font-family: Arial;
        }
        
        .local-page textarea, .local-page input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .local-page button {
            padding: 10px 20px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 5px;
        }

        /* ========== MOUSE VIRTUAL ========== */
        .virtual-mouse-container {
            position: fixed;
            bottom: 180px;
            right: 10px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: rgba(26, 26, 42, 0.95);
            padding: 10px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid #5865F2;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            touch-action: none;
        }

        .virtual-cursor {
            width: 50px;
            height: 50px;
            background: #5865F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: move;
            touch-action: none;
            box-shadow: 0 0 10px #5865F2;
        }

        .virtual-cursor:active {
            transform: scale(0.95);
        }

        .mouse-buttons {
            display: flex;
            gap: 8px;
        }

        .mouse-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        .mouse-btn:active {
            transform: scale(0.95);
            background: #eb459e;
        }

        .mouse-btn.left {
            background: #23a55a;
        }

        .mouse-btn.right {
            background: #ed4245;
        }

        .mouse-scroll {
            display: flex;
            gap: 5px;
        }

        .scroll-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 9px;
            cursor: pointer;
        }

        /* ========== TECLADO VIRTUAL ========== */
        .virtual-keyboard-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 42, 0.98);
            backdrop-filter: blur(10px);
            border-top: 2px solid #5865F2;
            padding: 8px;
            z-index: 10001;
            touch-action: manipulation;
        }

        .keyboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            margin-bottom: 6px;
            border-bottom: 1px solid #2a2a3a;
        }

        .keyboard-title {
            color: #eb459e;
            font-size: 11px;
            font-weight: bold;
        }

        .kbd-btn {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .key {
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 8px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            min-width: 32px;
            text-align: center;
        }

        .key:active {
            transform: scale(0.92);
            background: #5865F2;
        }

        .key.special {
            background: #eb459e;
            min-width: 45px;
        }

        .key.wide {
            min-width: 65px;
        }

        .toast {
            position: fixed;
            bottom: 170px;
            left: 10px;
            right: 10px;
            background: #1e1e2f;
            color: white;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            z-index: 10002;
            animation: fadeUp 0.3s;
            font-size: 11px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="url-bar">
        <input type="text" id="globalUrlInput" placeholder="URL (ex: https://google.com)">
        <button id="globalGoBtn">IR</button>
    </div>
    <button id="globalBackBtn" class="nav-btn">◀</button>
    <button id="globalForwardBtn" class="nav-btn">▶</button>
    <button id="globalReloadBtn" class="nav-btn">🔄</button>
</div>

<div class="tabs-container" id="tabsContainer"></div>
<button id="newTabBtn" class="new-tab">+ Nova Aba</button>
<div class="content-area" id="contentArea"></div>

<!-- MOUSE VIRTUAL -->
<div id="mouseContainer" class="virtual-mouse-container">
    <div id="virtualCursor" class="virtual-cursor">🖱️</div>
    <div class="mouse-buttons">
        <button id="mouseLeftBtn" class="mouse-btn left">CLIQUE</button>
        <button id="mouseRightBtn" class="mouse-btn right">DIREITO</button>
    </div>
    <div class="mouse-scroll">
        <button id="scrollUpBtn" class="scroll-btn">▲</button>
        <button id="scrollDownBtn" class="scroll-btn">▼</button>
    </div>
</div>

<!-- TECLADO VIRTUAL -->
<div id="keyboardContainer" class="virtual-keyboard-container">
    <div class="keyboard-header">
        <span class="keyboard-title">⌨️ TECLADO VIRTUAL</span>
        <button id="keyboardMinimizeBtn" class="kbd-btn">─</button>
    </div>
    <div id="keyboardRows">
        <div class="keyboard-row">
            <button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button>
            <button class="key" data-key="0">0</button><button class="key special" data-key="Backspace">⌫</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="q">q</button><button class="key" data-key="w">w</button><button class="key" data-key="e">e</button>
            <button class="key" data-key="r">r</button><button class="key" data-key="t">t</button><button class="key" data-key="y">y</button>
            <button class="key" data-key="u">u</button><button class="key" data-key="i">i</button><button class="key" data-key="o">o</button>
            <button class="key" data-key="p">p</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button><button class="key" data-key="d">d</button>
            <button class="key" data-key="f">f</button><button class="key" data-key="g">g</button><button class="key" data-key="h">h</button>
            <button class="key" data-key="j">j</button><button class="key" data-key="k">k</button><button class="key" data-key="l">l</button>
        </div>
        <div class="keyboard-row">
            <button class="key special" data-key="Shift">⇧</button><button class="key" data-key="z">z</button><button class="key" data-key="x">x</button>
            <button class="key" data-key="c">c</button><button class="key" data-key="v">v</button><button class="key" data-key="b">b</button>
            <button class="key" data-key="n">n</button><button class="key" data-key="m">m</button><button class="key special" data-key="Enter">↵</button>
        </div>
        <div class="keyboard-row">
            <button class="key special wide" data-key="Space">ESPAÇO</button>
            <button class="key special" data-key="ArrowLeft">←</button>
            <button class="key special" data-key="ArrowRight">→</button>
        </div>
    </div>
</div>

<script>
    // ==================== VARIÁVEIS ====================
    let browsers = [];
    let activeBrowserId = null;
    let browserCounter = 0;
    let currentDoc = null; // Guarda referência ao documento atual
    
    // Mouse
    let isDraggingMouse = false;
    let dragStartX = 0, dragStartY = 0;
    let shiftPressed = false;
    
    // ==================== PÁGINA LOCAL PARA TESTE ====================
    function criarPaginaLocal() {
        return `
            <div class="local-page">
                <h2>📱 Teste Mouse + Teclado Virtual</h2>
                <p>Clique aqui e digite com o teclado virtual:</p>
                <input type="text" id="campo1" placeholder="Campo de texto 1" style="width:100%; padding:10px; margin:5px 0">
                <textarea id="campo2" placeholder="Área de texto maior..." rows="4" style="width:100%; padding:10px; margin:5px 0"></textarea>
                <button onclick="alert('Botão clicado!')">Clique em mim</button>
                <p style="margin-top:20px; color:#666; font-size:12px">✅ Mouse: arraste o ícone 🖱️ e clique nos botões</p>
                <p style="color:#666; font-size:12px">⌨️ Teclado: toque nas teclas para digitar</p>
            </div>
        `;
    }
    
    // ==================== FUNÇÕES PRINCIPAIS ====================
    
    function getCurrentDocument() {
        // Primeiro tenta pegar do iframe
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (browser && browser.iframeId) {
            const iframe = document.getElementById(browser.iframeId);
            if (iframe) {
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc && doc.body) {
                        currentDoc = doc;
                        return doc;
                    }
                } catch(e) {
                    console.log('Erro acesso iframe:', e);
                }
            }
        }
        // Fallback: usa o documento local da página
        if (!currentDoc) currentDoc = document;
        return currentDoc;
    }
    
    // ENVIAR CLIQUE
    async function sendClick(x, y, isRightClick = false) {
        const doc = getCurrentDocument();
        if (!doc) {
            mostrarToast('❌ Nenhuma página disponível', '#ed4245');
            return;
        }
        
        // Se for o documento local, ajusta coordenadas
        let targetX = x, targetY = y;
        let element = null;
        
        if (doc === document) {
            // Documento local
            element = document.elementFromPoint(x, y);
        } else {
            // Iframe remoto
            const iframe = document.getElementById(browsers.find(b => b.id === activeBrowserId)?.iframeId);
            if (iframe) {
                const iframeRect = iframe.getBoundingClientRect();
                targetX = x - iframeRect.left;
                targetY = y - iframeRect.top;
                if (targetX >= 0 && targetY >= 0 && targetX <= iframeRect.width && targetY <= iframeRect.height) {
                    element = doc.elementFromPoint(targetX, targetY);
                }
            }
        }
        
        if (!element) {
            mostrarToast('⚠️ Nenhum elemento encontrado', '#faa61a');
            return;
        }
        
        const button = isRightClick ? 2 : 0;
        
        const downEvent = new MouseEvent('mousedown', {
            bubbles: true, cancelable: true, clientX: targetX, clientY: targetY, button: button
        });
        element.dispatchEvent(downEvent);
        
        await new Promise(r => setTimeout(r, 50));
        
        const upEvent = new MouseEvent('mouseup', {
            bubbles: true, cancelable: true, clientX: targetX, clientY: targetY, button: button
        });
        element.dispatchEvent(upEvent);
        
        const clickEvent = new MouseEvent('click', {
            bubbles: true, cancelable: true, clientX: targetX, clientY: targetY, button: button
        });
        element.dispatchEvent(clickEvent);
        
        mostrarToast(isRightClick ? '🖱️ Clique Direito' : '🖱️ Clique', '#23a55a');
    }
    
    // ENVIAR TECLA
    function sendKey(key) {
        const doc = getCurrentDocument();
        if (!doc) { mostrarToast('❌ Erro', '#ed4245'); return; }
        
        let activeElement = doc.activeElement;
        
        if (!activeElement || activeElement === doc.body) {
            const input = doc.querySelector('input, textarea, [contenteditable="true"]');
            if (input) {
                input.focus();
                activeElement = input;
            } else {
                mostrarToast('⚠️ Clique em um campo de texto primeiro', '#faa61a');
                return;
            }
        }
        
        let finalKey = key;
        if (shiftPressed && key.length === 1 && /[a-z]/.test(key)) {
            finalKey = key.toUpperCase();
        }
        
        const downEvent = new KeyboardEvent('keydown', { key: finalKey, bubbles: true, cancelable: true, shiftKey: shiftPressed });
        activeElement.dispatchEvent(downEvent);
        
        if (finalKey.length === 1 && !downEvent.defaultPrevented) {
            const pressEvent = new KeyboardEvent('keypress', { key: finalKey, bubbles: true });
            activeElement.dispatchEvent(pressEvent);
            
            if (activeElement.value !== undefined && !pressEvent.defaultPrevented) {
                const start = activeElement.selectionStart || 0;
                const end = activeElement.selectionEnd || 0;
                const newValue = activeElement.value.slice(0, start) + finalKey + activeElement.value.slice(end);
                activeElement.value = newValue;
                activeElement.selectionStart = activeElement.selectionEnd = start + 1;
                
                const inputEvent = new Event('input', { bubbles: true });
                activeElement.dispatchEvent(inputEvent);
            }
        }
        
        const upEvent = new KeyboardEvent('keyup', { key: finalKey, bubbles: true });
        activeElement.dispatchEvent(upEvent);
        
        mostrarToast(`⌨️ ${finalKey}`, '#5865F2');
    }
    
    function sendSpecialKey(key) {
        const doc = getCurrentDocument();
        if (!doc) return;
        
        let activeElement = doc.activeElement;
        if (!activeElement || activeElement === doc.body) {
            const input = doc.querySelector('input, textarea');
            if (input) {
                input.focus();
                activeElement = input;
            } else return;
        }
        
        const event = new KeyboardEvent('keydown', { key: key, bubbles: true, cancelable: true });
        activeElement.dispatchEvent(event);
        
        if (key === 'Backspace' && activeElement.value !== undefined && !event.defaultPrevented) {
            const start = activeElement.selectionStart || 0;
            const end = activeElement.selectionEnd || 0;
            if (start === end && start > 0) {
                activeElement.value = activeElement.value.slice(0, start - 1) + activeElement.value.slice(end);
                activeElement.selectionStart = activeElement.selectionEnd = start - 1;
            } else if (start !== end) {
                activeElement.value = activeElement.value.slice(0, start) + activeElement.value.slice(end);
                activeElement.selectionStart = activeElement.selectionEnd = start;
            }
            const inputEvent = new Event('input', { bubbles: true });
            activeElement.dispatchEvent(inputEvent);
        }
        
        if (key === 'Shift') {
            shiftPressed = !shiftPressed;
            mostrarToast(shiftPressed ? '🔠 MAIÚSCULAS' : '🔡 minúsculas', '#faa61a');
        }
        
        const upEvent = new KeyboardEvent('keyup', { key: key, bubbles: true });
        activeElement.dispatchEvent(upEvent);
        
        if (key !== 'Shift') mostrarToast(`⌨️ ${key === 'Space' ? 'Espaço' : key}`, '#5865F2');
    }
    
    function sendScroll(deltaY) {
        const doc = getCurrentDocument();
        if (!doc) return;
        
        const scrollEvent = new WheelEvent('wheel', { deltaY: deltaY, deltaMode: 0, bubbles: true });
        doc.body.dispatchEvent(scrollEvent);
        mostrarToast(`📜 ${deltaY > 0 ? 'Scroll ↓' : 'Scroll ↑'}`, '#faa61a');
    }
    
    // ==================== MOUSE ====================
    function initMouseDrag() {
        const cursor = document.getElementById('virtualCursor');
        const container = document.getElementById('mouseContainer');
        
        cursor.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDraggingMouse = true;
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            dragStartX = touch.clientX - rect.left;
            dragStartY = touch.clientY - rect.top;
        });
        
        cursor.addEventListener('touchmove', (e) => {
            if (!isDraggingMouse) return;
            e.preventDefault();
            const touch = e.touches[0];
            let newLeft = touch.clientX - dragStartX;
            let newTop = touch.clientY - dragStartY;
            
            newLeft = Math.max(5, Math.min(window.innerWidth - container.offsetWidth - 5, newLeft));
            newTop = Math.max(50, Math.min(window.innerHeight - container.offsetHeight - 180, newTop));
            
            container.style.right = 'auto';
            container.style.bottom = 'auto';
            container.style.left = newLeft + 'px';
            container.style.top = newTop + 'px';
        });
        
        cursor.addEventListener('touchend', () => { isDraggingMouse = false; });
        
        container.style.right = 'auto';
        container.style.left = window.innerWidth - 80 + 'px';
        container.style.top = window.innerHeight - 280 + 'px';
    }
    
    // ==================== BROWSER ====================
    function criarNovaBrowser(url = null) {
        const browserId = 'browser_' + (++browserCounter);
        const iframeId = 'iframe_' + browserId;
        
        const browserDiv = document.createElement('div');
        browserDiv.className = 'browser-window';
        browserDiv.id = browserId;
        
        // Se for URL do Google ou externa, usa iframe. Senão, usa página local
        const isExternal = url && (url.includes('google') || url.includes('http'));
        
        if (isExternal) {
            browserDiv.innerHTML = `
                <div class="browser-toolbar">
                    <input type="text" class="browser-url" id="url_${iframeId}" value="${url || 'https://www.google.com'}">
                    <button class="browser-go" data-browser="${browserId}">IR</button>
                    <button class="browser-back" data-browser="${browserId}">◀</button>
                    <button class="browser-forward" data-browser="${browserId}">▶</button>
                    <button class="browser-reload" data-browser="${browserId}">🔄</button>
                </div>
                <iframe id="${iframeId}" class="browser-frame" src="${url || 'https://www.google.com'}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
            `;
        } else {
            // Página local para teste
            browserDiv.innerHTML = `
                <div class="browser-toolbar">
                    <input type="text" class="browser-url" id="url_${iframeId}" value="Página Local">
                    <button class="browser-go" data-browser="${browserId}">IR</button>
                </div>
                <div id="${iframeId}" class="local-page">${criarPaginaLocal()}</div>
            `;
        }
        
        document.getElementById('contentArea').appendChild(browserDiv);
        
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.id = 'tab_' + browserId;
        tabDiv.innerHTML = `<span>${isExternal ? (url ? new URL(url).hostname : 'Google') : 'Teste'}</span><button class="close-tab" data-browser="${browserId}">✕</button>`;
        document.getElementById('tabsContainer').appendChild(tabDiv);
        
        browsers.push({ id: browserId, iframeId: iframeId, isExternal: isExternal, url: url, tabId: 'tab_' + browserId });
        
        tabDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('close-tab')) return;
            ativarBrowser(browserId);
        });
        
        tabDiv.querySelector('.close-tab').addEventListener('click', (e) => {
            e.stopPropagation();
            fecharBrowser(browserId);
        });
        
        if (isExternal) {
            const iframe = document.getElementById(iframeId);
            const goBtn = browserDiv.querySelector('.browser-go');
            const urlInput = browserDiv.querySelector('.browser-url');
            
            goBtn.addEventListener('click', () => {
                let newUrl = urlInput.value;
                if (!newUrl.startsWith('http')) newUrl = 'https://' + newUrl;
                iframe.src = newUrl;
                try { tabDiv.querySelector('span').textContent = new URL(newUrl).hostname; } catch(e) {}
            });
            
            browserDiv.querySelector('.browser-back')?.addEventListener('click', () => { try { iframe.contentWindow.history.back(); } catch(e) {} });
            browserDiv.querySelector('.browser-forward')?.addEventListener('click', () => { try { iframe.contentWindow.history.forward(); } catch(e) {} });
            browserDiv.querySelector('.browser-reload')?.addEventListener('click', () => { iframe.src = iframe.src; });
        }
        
        ativarBrowser(browserId);
        return browserId;
    }
    
    function ativarBrowser(browserId) {
        activeBrowserId = browserId;
        browsers.forEach(b => {
            document.getElementById(b.id)?.classList.remove('active');
            document.getElementById(b.tabId)?.classList.remove('active');
        });
        document.getElementById(browserId).classList.add('active');
        document.getElementById('tab_' + browserId).classList.add('active');
        
        // Atualizar documento atual
        const browser = browsers.find(b => b.id === browserId);
        if (browser && !browser.isExternal) {
            currentDoc = document;
        } else {
            currentDoc = null;
        }
    }
    
    function fecharBrowser(browserId) {
        const index = browsers.findIndex(b => b.id === browserId);
        if (index === -1) return;
        const browser = browsers[index];
        document.getElementById(browser.id)?.remove();
        document.getElementById(browser.tabId)?.remove();
        browsers.splice(index, 1);
        
        if (browsers.length === 0) {
            criarNovaBrowser(null);
        } else if (activeBrowserId === browserId) {
            ativarBrowser(browsers[Math.max(0, index - 1)].id);
        }
    }
    
    function irParaUrl() {
        let url = document.getElementById('globalUrlInput').value;
        if (!url) return;
        if (!url.startsWith('http')) {
            if (url.includes('.')) url = 'https://' + url;
            else url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        criarNovaBrowser(url);
    }
    
    // ==================== EVENTOS ====================
    function mostrarToast(msg, cor) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }
    
    document.getElementById('globalGoBtn').addEventListener('click', irParaUrl);
    document.getElementById('globalUrlInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') irParaUrl(); });
    document.getElementById('newTabBtn').addEventListener('click', () => criarNovaBrowser(null));
    document.getElementById('keyboardMinimizeBtn').addEventListener('click', () => {
        const rows = document.getElementById('keyboardRows');
        rows.style.display = rows.style.display === 'none' ? 'flex' : 'none';
    });
    
    // Mouse
    document.getElementById('mouseLeftBtn').addEventListener('click', () => {
        const container = document.getElementById('mouseContainer');
        const rect = container.getBoundingClientRect();
        sendClick(rect.left + 25, rect.top + 25, false);
    });
    
    document.getElementById('mouseRightBtn').addEventListener('click', () => {
        const container = document.getElementById('mouseContainer');
        const rect = container.getBoundingClientRect();
        sendClick(rect.left + 25, rect.top + 25, true);
    });
    
    document.getElementById('scrollUpBtn').addEventListener('click', () => sendScroll(-300));
    document.getElementById('scrollDownBtn').addEventListener('click', () => sendScroll(300));
    
    // Teclado
    document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('click', () => {
            const keyVal = key.getAttribute('data-key');
            if (keyVal === 'Backspace' || keyVal === 'Enter' || keyVal === 'Shift') {
                sendSpecialKey(keyVal);
            } else if (keyVal === 'Space') {
                sendSpecialKey(' ');
            } else {
                sendKey(keyVal);
            }
        });
    });
    
    // INICIAR
    initMouseDrag();
    criarNovaBrowser(null); // Abre página local de teste
    
    mostrarToast('✅ Mouse + Teclado Virtual FUNCIONANDO!', '#23a55a');
    mostrarToast('🖱️ Clique no campo de texto e use o teclado', '#5865F2');
</script>
</body>
</html>
