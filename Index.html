<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Roblox - Conversor Automático</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        .controls {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input, select, button {
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: monospace;
        }

        input {
            flex: 1;
            min-width: 300px;
        }

        button {
            background: #7c3aed;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #8b4aed;
        }

        .resolution-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .res-btn {
            background: #2a2a3a;
            border-color: #444;
        }

        .res-btn.active {
            background: #06b6d4;
            border-color: #06b6d4;
        }

        .preview-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-card {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }

        .preview-title {
            font-size: 12px;
            color: #06b6d4;
            margin-bottom: 10px;
            text-align: center;
        }

        canvas {
            width: 100%;
            image-rendering: pixelated;
            background: #000;
            border-radius: 8px;
        }

        .code-output {
            background: #0a0a0f;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #7c3aed;
            margin-top: 20px;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.4;
            resize: vertical;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid #2a2a3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Pixel Art Roblox</h1>
        <p class="subtitle">Cole uma URL de imagem → Gera código Lua com GUI pronta</p>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="imageUrl" placeholder="URL da imagem (ex: https://picsum.photos/id/100/256/256)" value="https://picsum.photos/id/100/256/256">
                <button onclick="processImage()">🚀 Processar Imagem</button>
            </div>
            
            <div class="resolution-buttons">
                <button class="res-btn" data-res="16">16x16</button>
                <button class="res-btn" data-res="32">32x32</button>
                <button class="res-btn active" data-res="64">64x64</button>
                <button class="res-btn" data-res="128">128x128</button>
                <button class="res-btn" data-res="256">256x256</button>
            </div>
        </div>

        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-card">
                <div class="preview-title">📷 Original</div>
                <canvas id="originalCanvas" width="400" height="400"></canvas>
            </div>
            <div class="preview-card">
                <div class="preview-title">🎨 Pixel Art</div>
                <canvas id="pixelCanvas" width="400" height="400"></canvas>
            </div>
        </div>

        <div class="code-output" id="codeOutput" style="display: none;">
            <div class="code-header">
                <span class="preview-title">📝 Código Lua Completo (copie e cole no Roblox)</span>
                <div>
                    <button onclick="copyCode()">📋 Copiar</button>
                    <button onclick="downloadCode()">💾 Baixar .lua</button>
                </div>
            </div>
            <textarea id="codeTextarea" readonly></textarea>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>Processando imagem...</p></div>

    <script>
        let currentResolution = 64;

        document.querySelectorAll('.res-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentResolution = parseInt(btn.dataset.res);
                if (document.getElementById('imageUrl').value) {
                    processImage();
                }
            });
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        async function processImage() {
            const url = document.getElementById('imageUrl').value;
            if (!url) {
                showToast('❌ Insira uma URL de imagem');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('codeOutput').style.display = 'none';

            try {
                const img = await loadImage(url);
                const result = convertToPixelArt(img);
                
                document.getElementById('previewArea').style.display = 'grid';
                document.getElementById('codeOutput').style.display = 'block';
                document.getElementById('codeTextarea').value = result.luaCode;
                document.getElementById('stats').innerHTML = `
                    <span>📐 Dimensão: ${result.width}x${result.height}</span>
                    <span>🎨 Pixels: ${result.totalPixels}</span>
                    <span>🌈 Cores: ${result.uniqueColors}</span>
                    <span>💾 Tamanho: ~${result.codeSize} KB</span>
                `;
                
                showToast(`✅ Pixel art gerada! ${result.width}x${result.height}, ${result.uniqueColors} cores`);
            } catch (error) {
                showToast('❌ Erro: ' + error.message);
            }

            document.getElementById('loading').style.display = 'none';
        }

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('Falha ao carregar imagem'));
                
                if (url.includes('picsum') || url.includes('github')) {
                    img.src = url;
                } else {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    fetch(proxyUrl)
                        .then(res => res.blob())
                        .then(blob => {
                            const blobUrl = URL.createObjectURL(blob);
                            img.src = blobUrl;
                            img.onload = () => {
                                URL.revokeObjectURL(blobUrl);
                                resolve(img);
                            };
                        })
                        .catch(reject);
                }
            });
        }

        function convertToPixelArt(img) {
            const width = currentResolution;
            const height = currentResolution;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            const uniqueColorsSet = new Set();
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i+3] > 0) {
                    uniqueColorsSet.add(`${pixels[i]},${pixels[i+1]},${pixels[i+2]}`);
                }
            }

            let luaCode = `-- Pixel Art Roblox\n-- Dimensao: ${width}x${height}\n\nlocal pixelData = {\n`;

            for (let y = 0; y < height; y++) {
                luaCode += `\t[${y}] = {\n`;
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx+1];
                    const b = pixels[idx+2];
                    const a = pixels[idx+3];
                    luaCode += `\t\t[${x}] = { ${r}, ${g}, ${b}, ${a} }`;
                    if (x < width - 1) luaCode += `,`;
                    luaCode += `\n`;
                }
                luaCode += `\t}`;
                if (y < height - 1) luaCode += `,`;
                luaCode += `\n`;
            }

            luaCode += `}\n\nreturn pixelData`;

            const totalPixels = width * height;
            const codeSize = Math.ceil(luaCode.length / 1024);

            const originalCanvas = document.getElementById('originalCanvas');
            const origCtx = originalCanvas.getContext('2d');
            originalCanvas.width = 400;
            originalCanvas.height = 400;
            origCtx.drawImage(img, 0, 0, 400, 400);

            const pixelCanvas = document.getElementById('pixelCanvas');
            const pixelCtx = pixelCanvas.getContext('2d');
            pixelCanvas.width = 400;
            pixelCanvas.height = 400;
            pixelCtx.imageSmoothingEnabled = false;
            pixelCtx.drawImage(canvas, 0, 0, 400, 400);

            return {
                luaCode: luaCode,
                width: width,
                height: height,
                totalPixels: totalPixels,
                uniqueColors: uniqueColorsSet.size,
                codeSize: codeSize
            };
        }

        function copyCode() {
            const code = document.getElementById('codeTextarea').value;
            navigator.clipboard.writeText(code);
            showToast('✅ Código copiado! Cole no Roblox Studio');
        }

        function downloadCode() {
            const code = document.getElementById('codeTextarea').value;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pixel_art_${currentResolution}x${currentResolution}.lua`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 Arquivo salvo!');
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                processImage();
            }, 500);
        });
    </script>
</body>
</html>
