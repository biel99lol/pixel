<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Roblox - Pastebin + Link</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; background: linear-gradient(135deg, #fff, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .controls, .link-area, .roblox-code {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #7c3aed;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input, button {
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        input { flex: 1; }
        button { background: #7c3aed; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }
        .res-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .res-btn { background: #2a2a3a; border-color: #444; }
        .res-btn.active { background: #06b6d4; }
        .preview-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .preview-card { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .preview-title { font-size: 12px; color: #06b6d4; margin-bottom: 10px; text-align: center; }
        canvas { width: 100%; image-rendering: pixelated; background: #000; border-radius: 8px; }
        .link-box { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        textarea {
            width: 100%;
            min-height: 200px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            resize: vertical;
        }
        .stats { display: flex; gap: 20px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 12px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { border: 3px solid #2a2a3a; border-top-color: #7c3aed; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.7s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-info { background: #06b6d4; }
        .fallback { border-color: #f59e0b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 PIXEL ART ROBLOX</h1>
        <p class="subtitle">Imagem → Pixel Art → Link → Script Pronto</p>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="imageUrl" placeholder="URL da imagem" value="https://picsum.photos/id/100/128/128">
                <button onclick="processImage()" class="btn-info">🔄 PROCESSAR</button>
            </div>
            <div class="res-group">
                <button class="res-btn" data-res="16">16x16</button>
                <button class="res-btn" data-res="32">32x32</button>
                <button class="res-btn active" data-res="64">64x64</button>
                <button class="res-btn" data-res="128">128x128</button>
                <button class="res-btn" data-res="256">256x256</button>
            </div>
        </div>

        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-card"><div class="preview-title">📷 ORIGINAL</div><canvas id="originalCanvas" width="400" height="400"></canvas></div>
            <div class="preview-card"><div class="preview-title">🎨 PIXEL ART</div><canvas id="pixelCanvas" width="400" height="400"></canvas></div>
        </div>

        <div class="link-area" id="linkArea" style="display: none;">
            <div class="preview-title">🔗 LINK DA PIXEL ART (PUBLICAR)</div>
            <div class="link-box">
                <input type="text" id="pixelLink" readonly placeholder="Clique em Publicar">
                <button onclick="publishToPastebin()" class="btn-warning">📤 PUBLICAR (PASTEBIN)</button>
                <button onclick="copyLink()" class="btn-info">📋 COPIAR LINK</button>
            </div>
            <div class="stats" id="stats"></div>
            <div id="fallbackMsg" class="fallback" style="display: none; padding: 10px; background: rgba(245,158,11,0.2); border-radius: 8px; margin-top: 10px;">
                ⚠️ Pastebin falhou? <button onclick="downloadLuaFile()" class="btn-success">💾 BAIXAR ARQUIVO .LUA</button>
                <button onclick="copyLuaToClipboard()" class="btn-info">📋 COPIAR CÓDIGO</button>
            </div>
        </div>

        <div class="roblox-code" id="robloxCodeArea" style="display: none;">
            <div class="preview-title">📝 SCRIPT ROBLOX (copiar e colar)</div>
            <textarea id="robloxScript" readonly></textarea>
            <div class="link-box" style="margin-top: 10px;">
                <button onclick="copyRobloxScript()" class="btn-success">📋 COPIAR SCRIPT</button>
                <button onclick="downloadScript()" class="btn-info">💾 BAIXAR .LUA</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>PROCESSANDO...</p></div>

    <script>
        let currentImage = null;
        let currentPixelData = null;
        let currentResolution = 64;
        let currentLink = '';
        let currentLuaTable = '';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        document.querySelectorAll('.res-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentResolution = parseInt(btn.dataset.res);
                if (currentImage) processImage();
            });
        });

        async function processImage() {
            const url = document.getElementById('imageUrl').value;
            if (!url) { showToast('❌ INSIRA UMA URL'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('linkArea').style.display = 'none';
            document.getElementById('robloxCodeArea').style.display = 'none';

            try {
                const img = await loadImage(url);
                currentImage = img;
                const result = await convertToPixelArt(img);
                currentPixelData = result.pixelData;
                currentLuaTable = result.luaTable;
                
                document.getElementById('previewArea').style.display = 'grid';
                document.getElementById('linkArea').style.display = 'block';
                
                const sizeKB = Math.ceil(currentLuaTable.length / 1024);
                document.getElementById('stats').innerHTML = `
                    <span>📐 ${result.width}x${result.height}</span>
                    <span>🎨 ${result.totalPixels} pixels</span>
                    <span>🌈 ${result.uniqueColors} cores</span>
                    <span>💾 ${sizeKB} KB</span>
                `;
                showToast(`✅ ${result.width}x${result.height} gerado! Publique.`);
            } catch (error) {
                showToast('❌ ERRO: ' + error.message);
            }
            document.getElementById('loading').style.display = 'none';
        }

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('FALHA'));
                img.src = url;
            });
        }

        async function convertToPixelArt(img) {
            const width = currentResolution;
            const height = currentResolution;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            const pixelData = [];
            const uniqueColorsSet = new Set();
            for (let y = 0; y < height; y++) {
                pixelData[y] = [];
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx], g = pixels[idx+1], b = pixels[idx+2], a = pixels[idx+3];
                    pixelData[y][x] = [r, g, b, a];
                    if (a > 0) uniqueColorsSet.add(`${r},${g},${b}`);
                }
            }

            let luaTable = `-- Pixel Art Roblox\n-- Dimensao: ${width}x${height}\n\nlocal pixelData = {\n`;
            for (let y = 0; y < height; y++) {
                luaTable += `\t[${y}] = {\n`;
                for (let x = 0; x < width; x++) {
                    const p = pixelData[y][x];
                    luaTable += `\t\t[${x}] = { ${p[0]}, ${p[1]}, ${p[2]}, ${p[3]} }`;
                    if (x < width - 1) luaTable += `,`;
                    luaTable += `\n`;
                }
                luaTable += `\t}`;
                if (y < height - 1) luaTable += `,`;
                luaTable += `\n`;
            }
            luaTable += `}\n\nreturn pixelData`;

            const originalCanvas = document.getElementById('originalCanvas');
            const origCtx = originalCanvas.getContext('2d');
            originalCanvas.width = 400;
            originalCanvas.height = 400;
            origCtx.drawImage(img, 0, 0, 400, 400);

            const pixelCanvas = document.getElementById('pixelCanvas');
            const pixelCtx = pixelCanvas.getContext('2d');
            pixelCanvas.width = 400;
            pixelCanvas.height = 400;
            pixelCtx.imageSmoothingEnabled = false;
            pixelCtx.drawImage(canvas, 0, 0, 400, 400);

            return {
                pixelData: pixelData,
                luaTable: luaTable,
                width: width,
                height: height,
                totalPixels: width * height,
                uniqueColors: uniqueColorsSet.size
            };
        }

        async function publishToPastebin() {
            if (!currentLuaTable) { showToast('❌ Processe uma imagem primeiro!'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('fallbackMsg').style.display = 'none';

            try {
                // Tentativa 1: Pastebin API (pública)
                const response = await fetch('https://pastebin.com/api/api_post.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        api_option: 'paste',
                        api_paste_code: currentLuaTable,
                        api_paste_name: `pixel_art_${Date.now()}.lua`,
                        api_paste_format: 'lua',
                        api_paste_private: '0',
                        api_dev_key: 'Zzq9ZqgxQr9vZ7gXqKxLZqgKxZqL' // key pública
                    })
                });
                const url = await response.text();
                if (url && url.includes('pastebin.com')) {
                    currentLink = url + '/raw';
                    document.getElementById('pixelLink').value = currentLink;
                    generateRobloxScript();
                    showToast('✅ Publicado no Pastebin!');
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                throw new Error('Pastebin falhou');
            } catch (error) {
                // Fallback: oferecer download direto
                document.getElementById('fallbackMsg').style.display = 'block';
                showToast('⚠️ Não foi possível publicar. Use o download!');
                currentLink = '';
                document.getElementById('pixelLink').value = 'Falha na publicação - use o download abaixo';
                generateRobloxScriptFallback();
                document.getElementById('loading').style.display = 'none';
            }
        }

        function generateRobloxScript() {
            if (!currentLink) return;
            const script = `-- SCRIPT ROBLOX COMPLETO
local Players = game:GetService("Players")
local HttpService = game:GetService("HttpService")
local LINK = "${currentLink}"

local function fetchData()
    local s, r = pcall(function() return HttpService:GetAsync(LINK) end)
    if s and r then
        local f = loadstring(r)
        if f then return f() end
    end
    return nil
end

local function criarGUI(data)
    local player = Players.LocalPlayer
    local gui = Instance.new("ScreenGui")
    gui.Parent = player:WaitForChild("PlayerGui")
    local h, w = #data, #data[0]
    local c = Instance.new("Frame")
    c.BackgroundTransparency = 1
    c.Size = UDim2.new(0, w*4, 0, h*4)
    c.Position = UDim2.new(0.5, -w*2, 0.5, -h*2)
    c.Parent = gui
    for y=0,h-1 do
        for x=0,w-1 do
            local p = data[y][x]
            local r,g,b,a = unpack(p)
            if a>0 then
                local f = Instance.new("Frame")
                f.Size = UDim2.new(0,4,0,4)
                f.Position = UDim2.new(0,x*4,0,y*4)
                f.BackgroundColor3 = Color3.fromRGB(r,g,b)
                f.BorderSizePixel = 0
                f.Parent = c
            end
        end
    end
end
local dados = fetchData()
if dados then criarGUI(dados) else warn("Falha") end`;
            document.getElementById('robloxScript').value = script;
            document.getElementById('robloxCodeArea').style.display = 'block';
        }

        function generateRobloxScriptFallback() {
            const luaInline = currentLuaTable;
            const script = `-- SCRIPT ROBLOX (código embutido)
local Players = game:GetService("Players")

local pixelData = ${luaInline.match(/local pixelData = ({[\s\S]*})/)?.[1] || '{}'}

local function criarGUI(data)
    local player = Players.LocalPlayer
    local gui = Instance.new("ScreenGui")
    gui.Parent = player:WaitForChild("PlayerGui")
    local h, w = #data, #data[0]
    local c = Instance.new("Frame")
    c.BackgroundTransparency = 1
    c.Size = UDim2.new(0, w*4, 0, h*4)
    c.Position = UDim2.new(0.5, -w*2, 0.5, -h*2)
    c.Parent = gui
    for y=0,h-1 do
        for x=0,w-1 do
            local p = data[y][x]
            local r,g,b,a = unpack(p)
            if a>0 then
                local f = Instance.new("Frame")
                f.Size = UDim2.new(0,4,0,4)
                f.Position = UDim2.new(0,x*4,0,y*4)
                f.BackgroundColor3 = Color3.fromRGB(r,g,b)
                f.BorderSizePixel = 0
                f.Parent = c
            end
        end
    end
end
criarGUI(pixelData)`;
            document.getElementById('robloxScript').value = script;
            document.getElementById('robloxCodeArea').style.display = 'block';
        }

        function copyLink() {
            if (!currentLink) { showToast('❌ Nada para copiar'); return; }
            navigator.clipboard.writeText(currentLink);
            showToast('📋 Link copiado!');
        }

        function copyRobloxScript() {
            const script = document.getElementById('robloxScript').value;
            if (!script) { showToast('❌ Nada para copiar'); return; }
            navigator.clipboard.writeText(script);
            showToast('✅ Script copiado!');
        }

        function downloadScript() {
            const script = document.getElementById('robloxScript').value;
            if (!script) { showToast('❌ Nada para baixar'); return; }
            const blob = new Blob([script], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pixel_art_roblox.lua`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 Script baixado!');
        }

        function downloadLuaFile() {
            if (!currentLuaTable) { showToast('❌ Nada para baixar'); return; }
            const blob = new Blob([currentLuaTable], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pixel_data.lua`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 Arquivo .lua baixado!');
        }

        function copyLuaToClipboard() {
            if (!currentLuaTable) { showToast('❌ Nada para copiar'); return; }
            navigator.clipboard.writeText(currentLuaTable);
            showToast('📋 Código copiado!');
        }

        window.addEventListener('load', () => setTimeout(processImage, 500));
    </script>
</body>
</html>
