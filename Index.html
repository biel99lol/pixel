<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ART COMPLETO - GitHub to Roblox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; color: #7c3aed; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .controls {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #7c3aed;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        input, select, button {
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        
        input { flex: 1; }
        button { background: #7c3aed; cursor: pointer; }
        button:hover { opacity: 0.8; transform: scale(0.98); }
        
        .res-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .res-btn {
            background: #2a2a3a;
            border-color: #444;
        }
        .res-btn.active { background: #06b6d4; border-color: #06b6d4; }
        
        .preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .preview-card {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }
        
        canvas {
            width: 100%;
            image-rendering: pixelated;
            background: #000;
            border-radius: 8px;
        }
        
        .code-area {
            background: #0a0a0f;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #7c3aed;
            margin-top: 20px;
        }
        
        textarea {
            width: 100%;
            min-height: 400px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            resize: vertical;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid #2a2a3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 PIXEL ART COMPLETO - Roblox + GitHub</h1>
        <p class="subtitle">Upload imagem → Processar pixel art → GitHub → Código Roblox pronto</p>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="imageUrl" placeholder="URL da imagem (ex: https://picsum.photos/id/100/256/256)" value="https://picsum.photos/id/100/256/256">
                <button onclick="processImage()">🔄 PROCESSAR IMAGEM</button>
                <button onclick="uploadToGitHub()">📤 UPLOAD PARA GITHUB</button>
            </div>
            
            <div class="res-group">
                <button class="res-btn" data-res="16">16x16</button>
                <button class="res-btn" data-res="32">32x32</button>
                <button class="res-btn active" data-res="64">64x64</button>
                <button class="res-btn" data-res="128">128x128</button>
                <button class="res-btn" data-res="256">256x256</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="githubUrl" placeholder="URL do GitHub (será preenchida automaticamente)" readonly>
                <button onclick="copyGithubUrl()">📋 Copiar URL</button>
                <button onclick="generateRobloxScript()">⚡ GERAR SCRIPT ROBLOX</button>
            </div>
        </div>

        <div class="preview" id="previewArea" style="display: none;">
            <div class="preview-card">
                <div class="preview-title">📷 ORIGINAL</div>
                <canvas id="originalCanvas" width="400" height="400"></canvas>
            </div>
            <div class="preview-card">
                <div class="preview-title">🎨 PIXEL ART</div>
                <canvas id="pixelCanvas" width="400" height="400"></canvas>
            </div>
        </div>

        <div class="code-area" id="codeArea" style="display: none;">
            <div class="stats" id="stats"></div>
            <textarea id="luaCode" readonly></textarea>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>PROCESSANDO...</p></div>

    <script>
        let currentImage = null;
        let currentPixelData = null;
        let currentResolution = 64;
        let currentGithubRawUrl = '';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        document.querySelectorAll('.res-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentResolution = parseInt(btn.dataset.res);
                if (currentImage) {
                    processImage();
                }
            });
        });

        async function processImage() {
            const url = document.getElementById('imageUrl').value;
            if (!url) {
                showToast('❌ INSIRA UMA URL DE IMAGEM');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('codeArea').style.display = 'none';

            try {
                const img = await loadImage(url);
                currentImage = img;
                const result = await convertToPixelArt(img);
                currentPixelData = result.pixelData;
                
                document.getElementById('previewArea').style.display = 'grid';
                document.getElementById('codeArea').style.display = 'block';
                
                document.getElementById('stats').innerHTML = `
                    <span>📐 DIMENSÃO: ${result.width}x${result.height}</span>
                    <span>🎨 PIXELS: ${result.totalPixels}</span>
                    <span>🌈 CORES: ${result.uniqueColors}</span>
                    <span>💾 TAMANHO: ${result.codeSize} KB</span>
                `;
                
                document.getElementById('luaCode').value = result.luaCode;
                showToast(`✅ PIXEL ART GERADA! ${result.width}x${result.height}`);
                
            } catch (error) {
                showToast('❌ ERRO: ' + error.message);
            }
            
            document.getElementById('loading').style.display = 'none';
        }

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('FALHA AO CARREGAR IMAGEM'));
                
                if (url.includes('picsum') || url.includes('github')) {
                    img.src = url;
                } else {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    fetch(proxyUrl)
                        .then(res => res.blob())
                        .then(blob => {
                            const blobUrl = URL.createObjectURL(blob);
                            img.src = blobUrl;
                            img.onload = () => {
                                URL.revokeObjectURL(blobUrl);
                                resolve(img);
                            };
                        })
                        .catch(reject);
                }
            });
        }

        async function convertToPixelArt(img) {
            const width = currentResolution;
            const height = currentResolution;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            const pixelData = [];
            const uniqueColorsSet = new Set();
            
            for (let y = 0; y < height; y++) {
                pixelData[y] = [];
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx+1];
                    const b = pixels[idx+2];
                    const a = pixels[idx+3];
                    pixelData[y][x] = [r, g, b, a];
                    if (a > 0) uniqueColorsSet.add(`${r},${g},${b}`);
                }
            }

            let luaCode = `-- PIXEL ART PARA ROBLOX\n`;
            luaCode += `-- DIMENSAO: ${width}x${height}\n`;
            luaCode += `-- CORES UNICAS: ${uniqueColorsSet.size}\n\n`;
            luaCode += `local pixelData = {\n`;
            
            for (let y = 0; y < height; y++) {
                luaCode += `\t[${y}] = {\n`;
                for (let x = 0; x < width; x++) {
                    const p = pixelData[y][x];
                    luaCode += `\t\t[${x}] = { ${p[0]}, ${p[1]}, ${p[2]}, ${p[3]} }`;
                    if (x < width - 1) luaCode += `,`;
                    luaCode += `\n`;
                }
                luaCode += `\t}`;
                if (y < height - 1) luaCode += `,`;
                luaCode += `\n`;
            }
            
            luaCode += `}\n\nreturn pixelData`;

            const originalCanvas = document.getElementById('originalCanvas');
            const origCtx = originalCanvas.getContext('2d');
            originalCanvas.width = 400;
            originalCanvas.height = 400;
            origCtx.drawImage(img, 0, 0, 400, 400);

            const pixelCanvas = document.getElementById('pixelCanvas');
            const pixelCtx = pixelCanvas.getContext('2d');
            pixelCanvas.width = 400;
            pixelCanvas.height = 400;
            pixelCtx.imageSmoothingEnabled = false;
            pixelCtx.drawImage(canvas, 0, 0, 400, 400);

            return {
                pixelData: pixelData,
                luaCode: luaCode,
                width: width,
                height: height,
                totalPixels: width * height,
                uniqueColors: uniqueColorsSet.size,
                codeSize: Math.ceil(luaCode.length / 1024)
            };
        }

        async function uploadToGitHub() {
            if (!currentPixelData) {
                showToast('❌ PROCESSEM UMA IMAGEM PRIMEIRO!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            
            const luaCode = document.getElementById('luaCode').value;
            const filename = `pixel_art_${Date.now()}.lua`;
            
            try {
                const response = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description: 'Pixel Art para Roblox',
                        public: true,
                        files: {
                            [filename]: { content: luaCode }
                        }
                    })
                });
                
                const data = await response.json();
                currentGithubRawUrl = data.files[filename].raw_url;
                document.getElementById('githubUrl').value = currentGithubRawUrl;
                showToast('✅ UPLOAD CONCLUÍDO! URL SALVA.');
                
            } catch (error) {
                showToast('❌ ERRO NO UPLOAD: ' + error.message);
            }
            
            document.getElementById('loading').style.display = 'none';
        }

        function generateRobloxScript() {
            if (!currentGithubRawUrl && !document.getElementById('githubUrl').value) {
                showToast('❌ FAÇA UPLOAD PARA O GITHUB PRIMEIRO!');
                return;
            }
            
            const githubUrl = document.getElementById('githubUrl').value;
            
            const robloxScript = `-- SCRIPT COMPLETO PARA ROBLOX
-- COLE EM StarterPlayerScripts OU ScreenGui

local Players = game:GetService("Players")
local HttpService = game:GetService("HttpService")

local GITHUB_URL = "${githubUrl}"

local function fetchPixelArt()
    local success, result = pcall(function()
        return HttpService:GetAsync(GITHUB_URL)
    end)
    
    if success and result then
        local func = loadstring(result)
        if func then
            return func()
        end
    end
    return nil
end

local function createGUI(pixelData)
    local player = Players.LocalPlayer
    local screenGui = Instance.new("ScreenGui")
    screenGui.Name = "PixelArtGUI"
    screenGui.Parent = player:WaitForChild("PlayerGui")
    
    local height = #pixelData
    local width = #pixelData[0]
    
    local container = Instance.new("Frame")
    container.BackgroundTransparency = 1
    container.Size = UDim2.new(0, width * 4, 0, height * 4)
    container.Position = UDim2.new(0.5, -(width * 2), 0.5, -(height * 2))
    container.Parent = screenGui
    
    for y = 0, height - 1 do
        for x = 0, width - 1 do
            local pixel = pixelData[y][x]
            local r, g, b, a = unpack(pixel)
            
            if a > 0 then
                local frame = Instance.new("Frame")
                frame.Size = UDim2.new(0, 4, 0, 4)
                frame.Position = UDim2.new(0, x * 4, 0, y * 4)
                frame.BackgroundColor3 = Color3.fromRGB(r, g, b)
                frame.BorderSizePixel = 0
                frame.Parent = container
            end
        end
    end
    
    print("✅ PIXEL ART CARREGADA! Dimensao: " .. width .. "x" .. height)
    return screenGui
end

local pixelData = fetchPixelArt()
if pixelData then
    createGUI(pixelData)
else
    warn("❌ FALHA AO CARREGAR PIXEL ART")
end`;

            document.getElementById('luaCode').value = robloxScript;
            showToast('✅ SCRIPT ROBLOX GERADO! COLE NO STUDIO');
        }

        function copyGithubUrl() {
            const url = document.getElementById('githubUrl').value;
            if (url) {
                navigator.clipboard.writeText(url);
                showToast('✅ URL COPIADA!');
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                processImage();
            }, 500);
        });
    </script>
</body>
</html>
