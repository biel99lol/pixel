<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Roblox - EXECUTOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .controls {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #7c3aed;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        input, select, button {
            background: #1a1a2e;
            border: 1px solid #7c3aed;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        input {
            flex: 1;
            min-width: 200px;
        }
        button {
            background: #7c3aed;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.8;
            transform: scale(0.98);
        }
        .res-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .res-btn {
            background: #2a2a3a;
            border-color: #444;
        }
        .res-btn.active {
            background: #06b6d4;
            border-color: #06b6d4;
        }
        .preview-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .preview-card {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }
        .preview-title {
            font-size: 12px;
            color: #06b6d4;
            margin-bottom: 10px;
            text-align: center;
        }
        canvas {
            width: 100%;
            image-rendering: pixelated;
            background: #000;
            border-radius: 8px;
        }
        .code-area {
            background: #0a0a0f;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #7c3aed;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            background: #000;
            color: #0f0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            resize: vertical;
        }
        .roblox-simulator {
            background: rgba(0,0,0,0.8);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #06b6d4;
        }
        .simulator-title {
            font-size: 18px;
            color: #06b6d4;
            margin-bottom: 15px;
            text-align: center;
        }
        .pixel-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            background: #000;
            border-radius: 8px;
            overflow: auto;
            padding: 20px;
        }
        .pixel-row {
            display: flex;
        }
        .pixel {
            width: 4px;
            height: 4px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 3px solid #2a2a3a;
            border-top-color: #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-info { background: #06b6d4; }
        .btn-danger { background: #ef4444; }
        .hastebin-link {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 PIXEL ART ROBLOX - EXECUTOR</h1>
        <p class="subtitle">Imagem → JSON → Hastebin → Script com syn.request</p>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="imageUrl" placeholder="URL da imagem" value="https://picsum.photos/id/100/256/256">
                <button onclick="processImage()" class="btn-info">🔄 PROCESSAR</button>
                <button onclick="uploadToHastebin()" class="btn-warning">📤 PUBLISH NO HASTEBIN</button>
                <button onclick="copyFinalScript()" class="btn-success">🎮 COPIAR SCRIPT FINAL</button>
            </div>
            
            <div class="res-group">
                <button class="res-btn" data-res="16">16x16</button>
                <button class="res-btn" data-res="32">32x32</button>
                <button class="res-btn active" data-res="64">64x64</button>
                <button class="res-btn" data-res="128">128x128</button>
                <button class="res-btn" data-res="256">256x256</button>
            </div>
            
            <div id="hastebinInfo" class="hastebin-link" style="display: none;">
                📦 JSON PUBLICADO: <span id="hastebinUrl"></span>
            </div>
        </div>

        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-card">
                <div class="preview-title">📷 ORIGINAL</div>
                <canvas id="originalCanvas" width="400" height="400"></canvas>
            </div>
            <div class="preview-card">
                <div class="preview-title">🎨 PIXEL ART</div>
                <canvas id="pixelCanvas" width="400" height="400"></canvas>
            </div>
        </div>

        <div class="roblox-simulator" id="simulatorArea" style="display: none;">
            <div class="simulator-title">🎮 PRÉVIA ROBLOX</div>
            <div id="pixelGrid" class="pixel-grid"></div>
        </div>

        <div class="code-area" id="codeArea" style="display: none;">
            <div class="stats" id="stats"></div>
            <textarea id="jsonData" readonly placeholder="JSON gerado..."></textarea>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p>PROCESSANDO...</p></div>

    <script>
        let currentPixelData = null;
        let currentResolution = 64;
        let currentHastebinUrl = '';
        let currentWidth = 0;
        let currentHeight = 0;
        let currentJSON = '';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        document.querySelectorAll('.res-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentResolution = parseInt(btn.dataset.res);
                if (currentPixelData) processImage();
            });
        });

        async function processImage() {
            const url = document.getElementById('imageUrl').value;
            if (!url) { showToast('❌ INSIRA UMA URL'); return; }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('codeArea').style.display = 'none';
            document.getElementById('simulatorArea').style.display = 'none';
            document.getElementById('hastebinInfo').style.display = 'none';

            try {
                const img = await loadImage(url);
                const result = await convertToPixelArt(img);
                currentPixelData = result.pixelData;
                currentWidth = result.width;
                currentHeight = result.height;
                currentJSON = result.jsonData;
                
                document.getElementById('previewArea').style.display = 'grid';
                document.getElementById('codeArea').style.display = 'block';
                document.getElementById('simulatorArea').style.display = 'block';
                
                const sizeKB = Math.ceil(currentJSON.length / 1024);
                
                document.getElementById('stats').innerHTML = `
                    <span>📐 DIMENSÃO: ${result.width}x${result.height}</span>
                    <span>🎨 PIXELS: ${result.totalPixels}</span>
                    <span>🌈 CORES: ${result.uniqueColors}</span>
                    <span>💾 JSON: ${sizeKB} KB</span>
                `;
                
                document.getElementById('jsonData').value = currentJSON;
                renderPixelGrid(currentPixelData);
                
                showToast(`✅ PIXEL ART GERADA! ${result.width}x${result.height}`);
            } catch (error) {
                showToast('❌ ERRO: ' + error.message);
            }
            document.getElementById('loading').style.display = 'none';
        }

        function renderPixelGrid(pixelData) {
            const container = document.getElementById('pixelGrid');
            container.innerHTML = '';
            
            const height = pixelData.length;
            const width = pixelData[0].length;
            const pixelSize = Math.max(2, Math.min(8, Math.floor(400 / Math.max(width, height))));
            
            for (let y = 0; y < height; y++) {
                const row = document.createElement('div');
                row.className = 'pixel-row';
                for (let x = 0; x < width; x++) {
                    const pixel = pixelData[y][x];
                    const div = document.createElement('div');
                    div.className = 'pixel';
                    div.style.width = pixelSize + 'px';
                    div.style.height = pixelSize + 'px';
                    if (pixel[3] > 0) {
                        div.style.backgroundColor = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
                    } else {
                        div.style.backgroundColor = 'transparent';
                    }
                    row.appendChild(div);
                }
                container.appendChild(row);
            }
        }

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('FALHA AO CARREGAR'));
                img.src = url;
            });
        }

        async function convertToPixelArt(img) {
            const width = currentResolution;
            const height = currentResolution;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            const pixelData = [];
            const uniqueColorsSet = new Set();
            
            for (let y = 0; y < height; y++) {
                pixelData[y] = [];
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx+1];
                    const b = pixels[idx+2];
                    const a = pixels[idx+3];
                    pixelData[y][x] = [r, g, b, a];
                    if (a > 0) uniqueColorsSet.add(`${r},${g},${b}`);
                }
            }

            const jsonData = JSON.stringify(pixelData);

            const originalCanvas = document.getElementById('originalCanvas');
            const origCtx = originalCanvas.getContext('2d');
            originalCanvas.width = 400;
            originalCanvas.height = 400;
            origCtx.drawImage(img, 0, 0, 400, 400);

            const pixelCanvas = document.getElementById('pixelCanvas');
            const pixelCtx = pixelCanvas.getContext('2d');
            pixelCanvas.width = 400;
            pixelCanvas.height = 400;
            pixelCtx.imageSmoothingEnabled = false;
            pixelCtx.drawImage(canvas, 0, 0, 400, 400);

            return {
                pixelData: pixelData,
                jsonData: jsonData,
                width: width,
                height: height,
                totalPixels: width * height,
                uniqueColors: uniqueColorsSet.size
            };
        }

        async function uploadToHastebin() {
            if (!currentJSON) {
                showToast('❌ PROCESSE UMA IMAGEM PRIMEIRO');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch('https://hastebin.com/documents', {
                    method: 'POST',
                    body: currentJSON
                });
                const data = await response.json();
                const hasteKey = data.key;
                currentHastebinUrl = `https://hastebin.com/raw/${hasteKey}`;
                
                document.getElementById('hastebinUrl').innerHTML = `<a href="${currentHastebinUrl}" target="_blank" style="color:#06b6d4">${currentHastebinUrl}</a>`;
                document.getElementById('hastebinInfo').style.display = 'block';
                
                showToast('✅ JSON PUBLICADO NO HASTEBIN!');
            } catch (error) {
                showToast('❌ FALHA NO UPLOAD: ' + error.message);
            }
            
            document.getElementById('loading').style.display = 'none';
        }

        function copyFinalScript() {
            if (!currentHastebinUrl) {
                showToast('❌ PUBLIQUE NO HASTEBIN PRIMEIRO');
                return;
            }

            const finalScript = `local Players = game:GetService("Players")

local request = syn and syn.request or http_request or request
local response = request({
    Url = "${currentHastebinUrl}",
    Method = "GET"
})
local pixelData = game:GetService("HttpService"):JSONDecode(response.Body)

local function createPixelArtGUI()
    local player = Players.LocalPlayer
    local sg = Instance.new("ScreenGui")
    sg.Name = "PixelArtGUI"
    sg.ResetOnSpawn = false
    sg.Parent = player:WaitForChild("PlayerGui")

    local W, H, PS = ${currentWidth}, ${currentHeight}, 4

    local container = Instance.new("Frame")
    container.BackgroundTransparency = 1
    container.Size = UDim2.new(0, W * PS, 0, H * PS)
    container.Position = UDim2.new(0.5, -(W * PS / 2), 0.5, -(H * PS / 2))
    container.Parent = sg

    local count = 0
    for y = 0, H - 1 do
        for x = 0, W - 1 do
            local p = pixelData[y + 1][x + 1]
            if p[4] > 0 then
                local f = Instance.new("Frame")
                f.Size = UDim2.new(0, PS, 0, PS)
                f.Position = UDim2.new(0, x * PS, 0, y * PS)
                f.BackgroundColor3 = Color3.fromRGB(p[1], p[2], p[3])
                f.BorderSizePixel = 0
                f.Parent = container
                count = count + 1
            end
        end
    end
    print("PixelArt: " .. W .. "x" .. H .. " " .. count .. " frames")
    return sg
end

createPixelArtGUI()`;

            navigator.clipboard.writeText(finalScript);
            showToast('✅ SCRIPT FINAL COPIADO! (syn.request)');
        }

        window.addEventListener('load', () => {
            setTimeout(processImage, 500);
        });
    </script>
</body>
  </html>
