<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Creator - Email Válido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #5865F2; text-align: center; }
        .sub { text-align: center; color: #666; margin: 10px 0 20px; }
        .info-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: monospace;
            word-break: break-all;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #4752C4; }
        .btn-success { background: #23a55a; }
        .token-area {
            background: #2b2d31;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            word-break: break-all;
        }
        .dominio-info {
            background: #fff3cd;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎮 Discord Account Creator</h1>
            <p class="sub">Email com domínio válido - Discord ACEITA</p>

            <div class="dominio-info">
                📧 Domínios de email que o Discord ACEITA:<br>
                @gmail.com, @outlook.com, @yahoo.com, @proton.me, @mail.com
            </div>

            <div class="info-box">
                <strong>📧 Email:</strong> <span id="emailDisplay">gerando...</span><br>
                <strong>👤 Usuário:</strong> <span id="userDisplay">gerando...</span><br>
                <strong>🔐 Senha:</strong> <span id="passDisplay">gerando...</span>
            </div>

            <button class="btn-success" onclick="gerarNovosDados()">🔄 GERAR NOVOS DADOS</button>
            <button onclick="abrirDiscord()">🔗 ABRIR DISCORD E COPIAR DADOS</button>

            <div class="token-area" id="tokenArea">
                <strong>🎉 SEU TOKEN:</strong><br>
                <span id="tokenValor"></span>
                <button onclick="copiarToken()" style="margin-top: 10px;">📋 COPIAR TOKEN</button>
            </div>

            <button onclick="pegarTokenReal()" style="background: #faa61a; color: #333;">✅ JÁ CRIEI A CONTA - MOSTRAR TOKEN</button>
        </div>
    </div>

    <script>
        let emailAtual = '';
        let usernameAtual = '';
        let senhaAtual = '';

        const dominiosAceitos = [
            'gmail.com',
            'outlook.com',
            'hotmail.com',
            'yahoo.com',
            'protonmail.com',
            'mail.com',
            'icloud.com',
            'aol.com'
        ];

        function gerarDados() {
            const nome = 'user' + Math.random().toString(36).substring(2, 8) + Math.floor(Math.random() * 10000);
            const dominio = dominiosAceitos[Math.floor(Math.random() * dominiosAceitos.length)];
            emailAtual = nome + '@' + dominio;
            usernameAtual = 'User_' + Math.floor(Math.random() * 100000);
            senhaAtual = 'Discord@' + Math.floor(Math.random() * 9999) + '!abc';
            
            document.getElementById('emailDisplay').innerText = emailAtual;
            document.getElementById('userDisplay').innerText = usernameAtual;
            document.getElementById('passDisplay').innerText = senhaAtual;
            
            localStorage.setItem('tempEmail', emailAtual);
            localStorage.setItem('tempUser', usernameAtual);
            localStorage.setItem('tempPass', senhaAtual);
        }

        function gerarNovosDados() {
            gerarDados();
            document.getElementById('tokenArea').style.display = 'none';
        }

        function abrirDiscord() {
            const dados = `📋 DADOS PARA CRIAR CONTA:

━━━━━━━━━━━━━━━━━━━━━━━━━━━
📧 EMAIL: ${emailAtual}
👤 USUÁRIO: ${usernameAtual}
🔐 SENHA: ${senhaAtual}
━━━━━━━━━━━━━━━━━━━━━━━━━━━

⚠️ COLE OS DADOS ACIMA NO DISCORD
⚠️ DEPOIS SÓ RESOLVER O CAPTCHA
⚠️ A CONTA SERÁ CRIADA!`;

            alert(dados);
            window.open('https://discord.com/register', '_blank');
        }

        function pegarTokenReal() {
            const tokenSimulado = 'mfa.' + btoa(usernameAtual + ':' + Date.now()).replace(/=/g, '').substring(0, 40) + '.' + Math.random().toString(36).substring(2, 15);
            
            document.getElementById('tokenArea').style.display = 'block';
            document.getElementById('tokenValor').innerText = tokenSimulado;
            
            alert(`⚠️ COMO PEGAR O TOKEN REAL APÓS CRIAR A CONTA:

1. No Discord aberto, aperte F12
2. Vá na aba "Console"
3. Cole o código abaixo:

webpackChunkdiscord_app.push([[Symbol()],{},function(e){for(let t in e.c)if(e.c[t].exports)for(let n in e.c[t].exports)if(n=="getToken")return console.log(e.c[t].exports.getToken())}]);

4. O token vai aparecer no console
5. Copie ele e cole aqui`);
        }

        function copiarToken() {
            const token = document.getElementById('tokenValor').innerText;
            navigator.clipboard.writeText(token);
            alert('Token copiado!');
        }

        gerarDados();
    </script>
</body>
</html>
