<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Discord Creator - Com Iframe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: transparent; overflow: hidden; }
        .floating-app {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            background: rgba(30, 30, 47, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 99999;
            transition: all 0.2s;
            border: 1px solid #5865F2;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: #5865F2;
            padding: 10px 16px;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            color: white;
            font-weight: bold;
        }
        .app-header:active { cursor: grabbing; }
        .controls { display: flex; gap: 12px; }
        .controls button {
            background: none; border: none; color: white; font-size: 18px;
            cursor: pointer; font-weight: bold; padding: 0 6px;
        }
        .content {
            padding: 16px;
            transition: 0.2s;
            max-height: 500px;
            overflow-y: auto;
        }
        /* Modo iframe: Discord ocupa todo o conteúdo */
        .iframe-mode .content {
            padding: 0;
        }
        .iframe-mode .discord-iframe {
            display: block;
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 0 0 28px 28px;
        }
        .normal-mode .discord-iframe {
            display: none;
        }
        .normal-mode .normal-content {
            display: block;
        }
        .iframe-mode .normal-content {
            display: none;
        }
        .dados-box {
            background: #1e1e2f;
            color: #00ff88;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-family: monospace;
            font-size: 11px;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 40px;
            font-weight: bold; margin: 6px 0; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .btn-primary { background: #23a55a; color: white; }
        .btn-secondary { background: #1e1e2f; color: #00ff88; border: 1px solid #2a2a3a; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-back { background: #faa61a; color: #1e1e2f; margin-top: 8px; }
        .flex-buttons { display: flex; gap: 8px; margin: 6px 0; }
        .flex-buttons button { flex: 1; margin: 0; }
        .toast {
            position: fixed; bottom: 20px; left: 20px; background: #1e1e2f;
            color: white; padding: 10px 16px; border-radius: 40px; font-size: 12px;
            z-index: 100000; animation: fadeUp 0.2s;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="floatingApp" class="floating-app normal-mode">
    <div class="app-header" id="appHeader">
        <h3>🎮 Discord Creator</h3>
        <div class="controls">
            <button id="minimizeBtn">─</button>
        </div>
    </div>
    <div class="content">
        <!-- Conteúdo normal (gerador de dados) -->
        <div class="normal-content">
            <div class="dados-box">
                📧 <span id="email">---</span><br>
                👤 <span id="username">---</span><br>
                🔐 <span id="password">---</span>
            </div>
            <button id="btnGerar" class="btn-primary">✨ GERAR CONTA</button>
            <div class="flex-buttons">
                <button id="btnCopiar" class="btn-secondary">📋 COPIAR</button>
                <button id="btnDiscordInternal" class="btn-discord">🔗 ABRIR DISCORD (IFRAME)</button>
            </div>
            <div style="font-size: 10px; text-align: center; margin-top: 8px; color: #aaa;">
                ↕️ Arraste pela barra azul
            </div>
        </div>
        <!-- Iframe do Discord (inicialmente oculto) -->
        <iframe id="discordIframe" class="discord-iframe" src="about:blank" allow="clipboard-write; clipboard-read;"></iframe>
        <!-- Botão para voltar ao modo normal (aparece quando no modo iframe) -->
        <button id="btnVoltar" class="btn-back" style="display: none;">⬅ VOLTAR AO GERADOR</button>
    </div>
</div>

<script>
    // Dados do app
    let dadosAtuais = { email: '', username: '', password: '' };
    let isIframeMode = false;
    const appDiv = document.getElementById('floatingApp');
    const iframe = document.getElementById('discordIframe');
    const btnVoltar = document.getElementById('btnVoltar');
    const btnDiscordInternal = document.getElementById('btnDiscordInternal');

    function mostrarToast(msg, cor = '#1e1e2f') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function gerarDados() {
        const timestamp = Date.now();
        const random = Math.floor(Math.random() * 99999);
        const dominios = ['gmail.com', 'outlook.com', 'protonmail.com', 'yahoo.com', 'hotmail.com'];
        const dominio = dominios[Math.floor(Math.random() * dominios.length)];
        dadosAtuais.email = `user${timestamp}${random}@${dominio}`;
        dadosAtuais.username = `User_${Math.floor(Math.random() * 99999)}`;
        dadosAtuais.password = `Disc@${Math.random().toString(36).substring(2, 10)}!${Math.floor(Math.random() * 999)}`;
        document.getElementById('email').innerText = dadosAtuais.email;
        document.getElementById('username').innerText = dadosAtuais.username;
        document.getElementById('password').innerText = dadosAtuais.password;
        mostrarToast('✅ Conta gerada!', '#23a55a');
        localStorage.setItem('discord_dados', JSON.stringify(dadosAtuais));
    }

    async function copiarDados() {
        if (!dadosAtuais.email || dadosAtuais.email === '---') {
            mostrarToast('⚠️ Gere uma conta primeiro', '#faa61a');
            return;
        }
        const texto = `${dadosAtuais.email}\n${dadosAtuais.username}\n${dadosAtuais.password}`;
        await navigator.clipboard.writeText(texto);
        mostrarToast('📋 Dados copiados!', '#1e1e2f');
    }

    // Abrir Discord no iframe (dentro do app)
    function abrirDiscordNoIframe() {
        if (!dadosAtuais.email) {
            mostrarToast('⚠️ Gere uma conta primeiro', '#faa61a');
            return;
        }
        // Troca para modo iframe
        appDiv.classList.remove('normal-mode');
        appDiv.classList.add('iframe-mode');
        iframe.src = 'https://discord.com/register';
        btnVoltar.style.display = 'block';
        isIframeMode = true;
        mostrarToast('🔗 Discord carregado dentro do app! Cole os dados no iframe.', '#5865F2');
    }

    // Voltar para o modo normal (gerador)
    function voltarParaGerador() {
        appDiv.classList.remove('iframe-mode');
        appDiv.classList.add('normal-mode');
        iframe.src = 'about:blank';
        btnVoltar.style.display = 'none';
        isIframeMode = false;
        mostrarToast('✅ Voltei ao gerador de contas.', '#1e1e2f');
    }

    // Carregar dados salvos
    function carregarDados() {
        const salvos = localStorage.getItem('discord_dados');
        if (salvos) {
            try {
                dadosAtuais = JSON.parse(salvos);
                document.getElementById('email').innerText = dadosAtuais.email;
                document.getElementById('username').innerText = dadosAtuais.username;
                document.getElementById('password').innerText = dadosAtuais.password;
            } catch(e) {}
        } else {
            gerarDados();
        }
    }

    // ========== ARRASTAR E MINIMIZAR (igual antes) ==========
    const header = document.getElementById('appHeader');
    let isDragging = false;
    let offsetX, offsetY;
    let isMinimized = false;
    const minimizeBtn = document.getElementById('minimizeBtn');

    header.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true;
        offsetX = e.clientX - appDiv.offsetLeft;
        offsetY = e.clientY - appDiv.offsetTop;
        appDiv.style.cursor = 'grabbing';
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let left = e.clientX - offsetX;
        let top = e.clientY - offsetY;
        left = Math.max(10, Math.min(window.innerWidth - appDiv.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - appDiv.offsetHeight - 10, top));
        appDiv.style.left = left + 'px';
        appDiv.style.right = 'auto';
        appDiv.style.bottom = 'auto';
        appDiv.style.top = top + 'px';
    });
    window.addEventListener('mouseup', () => {
        isDragging = false;
        appDiv.style.cursor = 'grab';
    });
    // Toque
    header.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        const touch = e.touches[0];
        offsetX = touch.clientX - appDiv.offsetLeft;
        offsetY = touch.clientY - appDiv.offsetTop;
        isDragging = true;
        e.preventDefault();
    });
    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        let left = touch.clientX - offsetX;
        let top = touch.clientY - offsetY;
        left = Math.max(10, Math.min(window.innerWidth - appDiv.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - appDiv.offsetHeight - 10, top));
        appDiv.style.left = left + 'px';
        appDiv.style.right = 'auto';
        appDiv.style.bottom = 'auto';
        appDiv.style.top = top + 'px';
    });
    window.addEventListener('touchend', () => { isDragging = false; });

    minimizeBtn.addEventListener('click', () => {
        if (isMinimized) {
            appDiv.classList.remove('minimized');
            minimizeBtn.textContent = '─';
            appDiv.style.width = '360px';
        } else {
            appDiv.classList.add('minimized');
            minimizeBtn.textContent = '□';
            appDiv.style.width = 'auto';
        }
        isMinimized = !isMinimized;
    });

    // Inicialização
    carregarDados();
    document.getElementById('btnGerar').addEventListener('click', gerarDados);
    document.getElementById('btnCopiar').addEventListener('click', copiarDados);
    btnDiscordInternal.addEventListener('click', abrirDiscordNoIframe);
    btnVoltar.addEventListener('click', voltarParaGerador);

    appDiv.style.left = 'auto';
    appDiv.style.right = '20px';
    appDiv.style.bottom = '20px';
    appDiv.style.top = 'auto';
</script>
</body>
</html>
