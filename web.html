<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Navegador Multi-Telas - DPI e Configurações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra superior */
        .toolbar {
            background: #1a1a2a;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a3a;
        }

        .url-bar {
            flex: 1;
            display: flex;
            gap: 6px;
            background: #0f0f1a;
            border-radius: 30px;
            padding: 4px 12px;
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 0;
            outline: none;
        }

        .url-bar button {
            background: #23a55a;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn {
            background: #5865F2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .settings-btn {
            background: #faa61a;
            color: #1e1e2f;
        }

        /* Botões de atalho */
        .shortcuts {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            background: #1a1a2a;
            overflow-x: auto;
        }

        .shortcuts button {
            background: #0f0f1a;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Container de abas (browsers) */
        .tabs-container {
            background: #1a1a2a;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            padding: 5px 5px 0 5px;
        }

        .tab {
            background: #0f0f1a;
            color: white;
            padding: 8px 16px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 140px;
            justify-content: space-between;
            font-size: 12px;
        }

        .tab.active {
            background: #5865F2;
        }

        .tab button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }

        .new-tab {
            background: #23a55a;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }

        /* Área de conteúdo (browsers) */
        .content-area {
            flex: 1;
            position: relative;
        }

        .browser-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: white;
        }

        .browser-window.active {
            display: flex;
        }

        .browser-toolbar {
            background: #2a2a3a;
            padding: 4px 8px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .browser-toolbar input {
            flex: 1;
            background: #1e1e2f;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .browser-toolbar button {
            background: #5865F2;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }

        .browser-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* Modal de configurações */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            color: white;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #5865F2;
        }

        .modal-content label {
            display: block;
            margin: 10px 0 5px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #0f0f1a;
            color: white;
        }

        .modal-content button {
            margin-top: 15px;
            background: #23a55a;
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 9999;
            animation: fadeUp 0.3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="url-bar">
        <input type="text" id="globalUrlInput" placeholder="Digite URL ou pesquise...">
        <button id="globalGoBtn">IR</button>
    </div>
    <button id="globalBackBtn" class="nav-btn">◀</button>
    <button id="globalForwardBtn" class="nav-btn">▶</button>
    <button id="globalReloadBtn" class="nav-btn">🔄</button>
    <button id="settingsBtn" class="nav-btn settings-btn">⚙️ DPI</button>
</div>

<div class="shortcuts">
    <button data-url="https://cloud.vsphone.com/activation-code/shop/agent-apply">☁️ VSPhone</button>
    <button data-url="https://temp-mail.org/pt/">📧 Temp Mail</button>
    <button data-url="https://www.google.com">🔍 Google</button>
    <button data-url="https://www.youtube.com">📺 YouTube</button>
    <button data-url="https://www.roblox.com">🎮 Roblox</button>
    <button data-url="https://discord.com/register">🎙️ Discord</button>
    <button data-url="https://biel99lol.github.io/pixel/web.html">📧 Gerador</button>
</div>

<div class="tabs-container" id="tabsContainer"></div>
<button id="newTabBtn" class="new-tab">+ NOVA ABA (Browser)</button>
<div class="content-area" id="contentArea"></div>

<!-- Modal Configurações DPI -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ Configurações de DPI / Zoom</h3>
        <label>DPI (50% a 200%):</label>
        <input type="range" id="dpiSlider" min="50" max="200" value="100" step="5">
        <span id="dpiValue">100%</span>
        
        <label>Zoom da Página (%):</label>
        <input type="range" id="zoomSlider" min="30" max="200" value="100" step="5">
        <span id="zoomValue">100%</span>
        
        <label>Modo Noturno:</label>
        <select id="nightMode">
            <option value="off">Desligado</option>
            <option value="on">Ligado</option>
        </select>
        
        <button id="saveSettingsBtn">Salvar e Aplicar</button>
        <button id="closeModalBtn" style="background:#ed4245; margin-top:10px;">Fechar</button>
    </div>
</div>

<script>
    let browsers = [];
    let activeBrowserId = null;
    let browserCounter = 0;
    let settings = {
        dpi: 100,
        zoom: 100,
        nightMode: 'off'
    };

    function mostrarToast(msg, cor = '#23a55a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function aplicarDPI() {
        document.body.style.zoom = settings.dpi + '%';
        document.getElementById('dpiValue').innerText = settings.dpi + '%';
        document.getElementById('dpiSlider').value = settings.dpi;
    }

    function aplicarZoomNoBrowser(browserId) {
        const browser = browsers.find(b => b.id === browserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            if (iframe) {
                iframe.style.transform = `scale(${settings.zoom / 100})`;
                iframe.style.transformOrigin = '0 0';
                iframe.style.width = `${100 * 100 / settings.zoom}%`;
                iframe.style.height = `${100 * 100 / settings.zoom}%`;
            }
        }
    }

    function aplicarZoomGlobal() {
        browsers.forEach(b => aplicarZoomNoBrowser(b.id));
        document.getElementById('zoomValue').innerText = settings.zoom + '%';
        document.getElementById('zoomSlider').value = settings.zoom;
    }

    function aplicarModoNoturno() {
        if (settings.nightMode === 'on') {
            document.body.style.background = '#000';
            document.body.style.backgroundColor = '#000';
            const style = document.createElement('style');
            style.id = 'nightModeStyle';
            style.textContent = 'iframe { filter: invert(1) hue-rotate(180deg); }';
            if (!document.getElementById('nightModeStyle')) document.head.appendChild(style);
        } else {
            const style = document.getElementById('nightModeStyle');
            if (style) style.remove();
        }
    }

    function salvarSettings() {
        localStorage.setItem('browser_settings', JSON.stringify(settings));
        aplicarDPI();
        aplicarZoomGlobal();
        aplicarModoNoturno();
        mostrarToast('✅ Configurações salvas!', '#23a55a');
    }

    function criarNovaBrowser(url = null) {
        const browserId = 'browser_' + (++browserCounter);
        const iframeId = 'iframe_' + browserId;
        
        const browserDiv = document.createElement('div');
        browserDiv.className = 'browser-window';
        browserDiv.id = browserId;
        
        browserDiv.innerHTML = `
            <div class="browser-toolbar">
                <input type="text" class="browser-url" id="url_${iframeId}" placeholder="Digite URL...">
                <button class="browser-go" data-browser="${browserId}">IR</button>
                <button class="browser-back" data-browser="${browserId}">◀</button>
                <button class="browser-forward" data-browser="${browserId}">▶</button>
                <button class="browser-reload" data-browser="${browserId}">🔄</button>
            </div>
            <iframe id="${iframeId}" class="browser-frame" src="${url || 'https://www.google.com/webhp?igu=1'}"></iframe>
        `;
        
        document.getElementById('contentArea').appendChild(browserDiv);
        
        const iframe = document.getElementById(iframeId);
        
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.id = 'tab_' + browserId;
        tabDiv.innerHTML = `
            <span>${url ? new URL(url).hostname : 'Nova aba'}</span>
            <button class="close-tab" data-browser="${browserId}">✕</button>
        `;
        document.getElementById('tabsContainer').appendChild(tabDiv);
        
        browsers.push({
            id: browserId,
            iframeId: iframeId,
            url: url || 'https://www.google.com/webhp?igu=1',
            tabId: 'tab_' + browserId
        });
        
        tabDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('close-tab')) return;
            ativarBrowser(browserId);
        });
        
        const closeBtn = tabDiv.querySelector('.close-tab');
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fecharBrowser(browserId);
        });
        
        const goBtn = browserDiv.querySelector('.browser-go');
        const urlInput = browserDiv.querySelector('.browser-url');
        const backBtn = browserDiv.querySelector('.browser-back');
        const forwardBtn = browserDiv.querySelector('.browser-forward');
        const reloadBtn = browserDiv.querySelector('.browser-reload');
        
        urlInput.value = url || 'https://www.google.com/webhp?igu=1';
        
        goBtn.addEventListener('click', () => {
            let newUrl = urlInput.value;
            if (!newUrl.startsWith('http')) {
                if (newUrl.includes('.')) newUrl = 'https://' + newUrl;
                else newUrl = 'https://www.google.com/search?q=' + encodeURIComponent(newUrl);
            }
            iframe.src = newUrl;
            urlInput.value = newUrl;
            const b = browsers.find(b => b.id === browserId);
            if (b) b.url = newUrl;
            try { tabDiv.querySelector('span').textContent = new URL(newUrl).hostname; } catch(e) {}
            mostrarToast('🔍 Carregando: ' + newUrl);
        });
        
        backBtn.addEventListener('click', () => { try { iframe.contentWindow.history.back(); } catch(e) { mostrarToast('Não foi possível voltar', '#ed4245'); } });
        forwardBtn.addEventListener('click', () => { try { iframe.contentWindow.history.forward(); } catch(e) { mostrarToast('Não foi possível avançar', '#ed4245'); } });
        reloadBtn.addEventListener('click', () => { iframe.src = iframe.src; mostrarToast('🔄 Recarregando'); });
        
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goBtn.click();
        });
        
        iframe.addEventListener('load', () => {
            try {
                const currentUrl = iframe.contentWindow.location.href;
                urlInput.value = currentUrl;
                const b = browsers.find(b => b.id === browserId);
                if (b) b.url = currentUrl;
                try { tabDiv.querySelector('span').textContent = new URL(currentUrl).hostname; } catch(e) {}
            } catch(e) {}
            aplicarZoomNoBrowser(browserId);
        });
        
        ativarBrowser(browserId);
        aplicarZoomNoBrowser(browserId);
        return browserId;
    }

    function ativarBrowser(browserId) {
        activeBrowserId = browserId;
        browsers.forEach(b => {
            const browser = document.getElementById(b.id);
            if (browser) browser.classList.remove('active');
            const tab = document.getElementById(b.tabId);
            if (tab) tab.classList.remove('active');
        });
        document.getElementById(browserId).classList.add('active');
        document.getElementById('tab_' + browserId).classList.add('active');
        
        const browser = browsers.find(b => b.id === browserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            try {
                const currentUrl = iframe.contentWindow.location.href;
                if (currentUrl && currentUrl !== 'about:blank') {
                    document.getElementById('globalUrlInput').value = currentUrl;
                }
            } catch(e) {
                document.getElementById('globalUrlInput').value = browser.url;
            }
        }
    }

    function fecharBrowser(browserId) {
        const index = browsers.findIndex(b => b.id === browserId);
        if (index === -1) return;
        const browser = browsers[index];
        const browserDiv = document.getElementById(browser.id);
        if (browserDiv) browserDiv.remove();
        const tabDiv = document.getElementById(browser.tabId);
        if (tabDiv) tabDiv.remove();
        
        browsers.splice(index, 1);
        
        if (browsers.length === 0) {
            criarNovaBrowser('https://www.google.com/webhp?igu=1');
        } else if (activeBrowserId === browserId) {
            const nextIndex = index > 0 ? index - 1 : 0;
            ativarBrowser(browsers[nextIndex].id);
        }
        mostrarToast('Browser fechado', '#5865F2');
    }

    function acaoGlobal(tipo) {
        if (!activeBrowserId) return;
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (!browser) return;
        const iframe = document.getElementById(browser.iframeId);
        if (tipo === 'back') { try { iframe.contentWindow.history.back(); } catch(e) { mostrarToast('Erro', '#ed4245'); } }
        else if (tipo === 'forward') { try { iframe.contentWindow.history.forward(); } catch(e) { mostrarToast('Erro', '#ed4245'); } }
        else if (tipo === 'reload') { iframe.src = iframe.src; mostrarToast('🔄 Recarregado'); }
    }

    document.getElementById('globalGoBtn').addEventListener('click', () => {
        if (!activeBrowserId) return;
        let url = document.getElementById('globalUrlInput').value;
        if (!url.startsWith('http')) {
            if (url.includes('.')) url = 'https://' + url;
            else url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        const browser = browsers.find(b => b.id === activeBrowserId);
        if (browser) {
            const iframe = document.getElementById(browser.iframeId);
            iframe.src = url;
            browser.url = url;
            const tab = document.getElementById(browser.tabId);
            try { tab.querySelector('span').textContent = new URL(url).hostname; } catch(e) {}
            mostrarToast('🔍 Carregando: ' + url);
        }
    });
    
    document.getElementById('globalUrlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('globalGoBtn').click();
    });
    
    document.getElementById('globalBackBtn').addEventListener('click', () => acaoGlobal('back'));
    document.getElementById('globalForwardBtn').addEventListener('click', () => acaoGlobal('forward'));
    document.getElementById('globalReloadBtn').addEventListener('click', () => acaoGlobal('reload'));
    document.getElementById('newTabBtn').addEventListener('click', () => criarNovaBrowser('https://www.google.com/webhp?igu=1'));
    
    document.querySelectorAll('.shortcuts button').forEach(btn => {
        btn.addEventListener('click', () => {
            const url = btn.getAttribute('data-url');
            if (url && activeBrowserId) {
                const browser = browsers.find(b => b.id === activeBrowserId);
                if (browser) {
                    const iframe = document.getElementById(browser.iframeId);
                    iframe.src = url;
                    browser.url = url;
                    mostrarToast('🌐 Carregando atalho: ' + url);
                }
            }
        });
    });
    
    const modal = document.getElementById('settingsModal');
    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('dpiSlider').value = settings.dpi;
        document.getElementById('zoomSlider').value = settings.zoom;
        document.getElementById('nightMode').value = settings.nightMode;
        modal.style.display = 'flex';
    });
    
    document.getElementById('closeModalBtn').addEventListener('click', () => { modal.style.display = 'none'; });
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        settings.dpi = parseInt(document.getElementById('dpiSlider').value);
        settings.zoom = parseInt(document.getElementById('zoomSlider').value);
        settings.nightMode = document.getElementById('nightMode').value;
        salvarSettings();
        modal.style.display = 'none';
    });
    
    document.getElementById('dpiSlider').addEventListener('input', (e) => {
        document.getElementById('dpiValue').innerText = e.target.value + '%';
    });
    document.getElementById('zoomSlider').addEventListener('input', (e) => {
        document.getElementById('zoomValue').innerText = e.target.value + '%';
    });
    
    const saved = localStorage.getItem('browser_settings');
    if (saved) {
        try {
            const s = JSON.parse(saved);
            settings.dpi = s.dpi || 100;
            settings.zoom = s.zoom || 100;
            settings.nightMode = s.nightMode || 'off';
        } catch(e) {}
    }
    aplicarDPI();
    aplicarZoomGlobal();
    aplicarModoNoturno();
    
    criarNovaBrowser('https://www.google.com/webhp?igu=1');
    mostrarToast('✅ Navegador Multi-Browsers pronto! Várias abas, DPI, zoom, VSPhone, Temp Mail.', '#23a55a');
</script>
</body>
</html>
