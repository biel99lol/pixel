<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Account Creator - Versão Completa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #5865F2;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #5865F2;
        }

        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #4752C4;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ed4245;
        }

        .btn-danger:hover {
            background: #c03537;
        }

        .btn-success {
            background: #23a55a;
        }

        .btn-success:hover {
            background: #1e8748;
        }

        .output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .captcha-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid #e0e0e0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: #23a55a;
            width: 0%;
            transition: width 0.3s;
        }

        .token-box {
            background: #2b2d31;
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }

        .api-config {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Discord Account Creator PRO</h1>
            <p>Criação real de contas Discord com CAPTCHA solver</p>
        </div>

        <div class="grid">
            <div class="card">
                <h2>⚙️ Configuração API</h2>
                <div class="api-config">
                    <div class="form-group">
                        <label>🔑 API Key 2Captcha (para resolver CAPTCHA):</label>
                        <input type="password" id="captchaApiKey" placeholder="Sua API key do 2captcha.com">
                        <small style="color: #666;">Obtenha em https://2captcha.com</small>
                    </div>
                    <div class="form-group">
                        <label>📧 Serviço de Email (Mail.tm):</label>
                        <select id="emailService">
                            <option value="mailtm">Mail.tm (Grátis)</option>
                            <option value="guerrillamail">GuerrillaMail</option>
                            <option value="tempmail">TempMail.org</option>
                        </select>
                    </div>
                </div>
                <button onclick="testarAPIs()" id="testApiBtn">🔌 Testar APIs</button>
                <div id="apiStatus"></div>
            </div>

            <div class="card">
                <h2>📧 Email Temporário</h2>
                <div class="form-group">
                    <label>Email gerado:</label>
                    <input type="text" id="tempEmail" readonly placeholder="Clique em gerar email">
                </div>
                <button onclick="gerarEmailReal()">🔄 Gerar Email Real</button>
                <button onclick="copiarEmail()" style="margin-top: 5px;">📋 Copiar Email</button>
                <div id="emailStatus" class="status info" style="display: none;"></div>
            </div>

            <div class="card">
                <h2>👤 Criar Conta Discord</h2>
                <div class="form-group">
                    <label>Usuário:</label>
                    <input type="text" id="username" placeholder="Username (2-32 caracteres)">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="text" id="accountEmail" readonly>
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="text" id="password" placeholder="Senha (mínimo 8 caracteres)">
                </div>
                <div class="form-group">
                    <label>Data de Nascimento:</label>
                    <input type="date" id="birthdate" value="2000-01-01">
                </div>
                <button onclick="criarContaReal()">🚀 Criar Conta Discord Real</button>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="createStatus"></div>
            </div>

            <div class="card">
                <h2>🔐 Token & Finalização</h2>
                <div class="token-box" id="tokenBox" style="display: none;">
                    <strong>✅ Token da Conta:</strong><br>
                    <span id="tokenValue" style="font-size: 11px;"></span>
                </div>
                <button onclick="copiarToken()" id="copyTokenBtn" style="display: none;">📋 Copiar Token</button>
                <button onclick="abrirDiscordLogin()" class="btn-success" style="margin-top: 10px;">🔗 Abrir Discord e Logar</button>
                <button onclick="descartarConta()" class="btn-danger" style="margin-top: 10px;" id="descartarBtn" style="display: none;">🗑️ Descartar Conta</button>
                <div id="tokenStatus"></div>
            </div>
        </div>

        <div class="card">
            <h2>📜 Logs em Tempo Real</h2>
            <div class="output" id="logs">
                [Sistema] Aguardando configuração das APIs...
            </div>
            <button onclick="limparLogs()" style="background: #6c757d; margin-top: 10px;">🗑️ Limpar Logs</button>
        </div>
    </div>

    <script>
        let tempEmailData = null;
        let discordToken = null;
        let discordUserData = null;
        let captchaSolved = false;
        let captchaKey = null;

        const PROXY_LIST = [
            null
        ];

        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️'
            };
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `${icons[type] || '📌'} <span style="color: #888;">[${timestamp}]</span> ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function limparLogs() {
            document.getElementById('logs').innerHTML = '[Sistema] Logs limpos...';
        }

        function updateProgress(percent, text) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';
            progressFill.style.width = percent + '%';
            if (text) addLog(text, 'info');
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.style.display = 'none';
                }, 1500);
            }
        }

        async function testarAPIs() {
            const captchaKey = document.getElementById('captchaApiKey').value;
            if (!captchaKey) {
                addLog('Por favor, insira sua API key do 2Captcha', 'error');
                return;
            }
            
            addLog('Testando conexão com 2Captcha...', 'info');
            updateProgress(50, 'Verificando API key...');
            
            try {
                const testResponse = await fetch(`https://2captcha.com/res.php?key=${captchaKey}&action=getbalance&json=1`);
                const testData = await testResponse.json();
                
                if (testData.status === 1) {
                    addLog(`✅ API 2Captcha válida! Saldo: $${testData.request}`, 'success');
                    updateProgress(100);
                    captchaSolved = true;
                } else {
                    addLog(`❌ API Key inválida: ${testData.request}`, 'error');
                    updateProgress(100);
                }
            } catch (error) {
                addLog(`Erro ao testar API: ${error.message}`, 'error');
                updateProgress(100);
            }
        }

        async function gerarEmailReal() {
            addLog('Gerando email temporário real via Mail.tm...', 'info');
            updateProgress(30);
            
            try {
                const domainResponse = await fetch('https://api.mail.tm/domains');
                const domains = await domainResponse.json();
                const domain = domains['hydra:member'][0].domain;
                
                const randomName = 'user_' + Math.random().toString(36).substring(2, 12) + Math.floor(Date.now() / 1000);
                const email = randomName + '@' + domain;
                const password = Math.random().toString(36).substring(2, 15);
                
                const accountResponse = await fetch('https://api.mail.tm/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: email,
                        password: password
                    })
                });
                
                if (accountResponse.ok) {
                    tempEmailData = { email: email, password: password };
                    document.getElementById('tempEmail').value = email;
                    document.getElementById('accountEmail').value = email;
                    addLog(`✅ Email gerado: ${email}`, 'success');
                    updateProgress(100);
                    
                    if (!document.getElementById('username').value) {
                        document.getElementById('username').value = 'User_' + Math.floor(Math.random() * 10000);
                    }
                    if (!document.getElementById('password').value) {
                        document.getElementById('password').value = 'Discord@' + Math.floor(Math.random() * 9999);
                    }
                } else {
                    throw new Error('Falha ao criar email');
                }
            } catch (error) {
                addLog(`Erro ao gerar email: ${error.message}`, 'error');
                updateProgress(100);
            }
        }

        function copiarEmail() {
            const email = document.getElementById('tempEmail').value;
            if (email) {
                navigator.clipboard.writeText(email);
                addLog(`Email copiado: ${email}`, 'success');
            }
        }

        async function resolverCaptcha() {
            const apiKey = document.getElementById('captchaApiKey').value;
            if (!apiKey) {
                addLog('Configure a API key do 2Captcha primeiro!', 'error');
                return null;
            }
            
            addLog('Enviando CAPTCHA para resolução (2Captcha)...', 'info');
            updateProgress(40, 'Resolvendo CAPTCHA...');
            
            try {
                const siteKey = '6Lef5iQUAAAAAKeIvIY-De7mPRh9TgzWAKqY5Ctc';
                const pageUrl = 'https://discord.com/register';
                
                const sendResponse = await fetch('https://2captcha.com/in.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `key=${apiKey}&method=userrecaptcha&googlekey=${siteKey}&pageurl=${pageUrl}&json=1`
                });
                
                const sendData = await sendResponse.json();
                
                if (sendData.status === 1) {
                    const requestId = sendData.request;
                    addLog(`CAPTCHA enviado, ID: ${requestId}`, 'info');
                    
                    for (let i = 0; i < 60; i++) {
                        await new Promise(resolve => setTimeout(resolve, 5000));
                        
                        const resultResponse = await fetch(`https://2captcha.com/res.php?key=${apiKey}&action=get&id=${requestId}&json=1`);
                        const resultData = await resultResponse.json();
                        
                        if (resultData.status === 1) {
                            addLog('✅ CAPTCHA resolvido com sucesso!', 'success');
                            updateProgress(70, 'CAPTCHA resolvido');
                            return resultData.request;
                        } else if (resultData.request === 'CAPCHA_NOT_READY') {
                            addLog('Aguardando resolução do CAPTCHA...', 'info');
                        } else {
                            throw new Error(resultData.request);
                        }
                    }
                    throw new Error('Timeout aguardando CAPTCHA');
                } else {
                    throw new Error(sendData.request);
                }
            } catch (error) {
                addLog(`Erro no CAPTCHA: ${error.message}`, 'error');
                return null;
            }
        }

        async function criarContaReal() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('accountEmail').value;
            const password = document.getElementById('password').value;
            const birthdate = document.getElementById('birthdate').value;
            const apiKey = document.getElementById('captchaApiKey').value;
            
            if (!username || !email || !password) {
                addLog('Preencha todos os campos!', 'error');
                return;
            }
            
            if (username.length < 2 || username.length > 32) {
                addLog('Usuário deve ter entre 2 e 32 caracteres', 'error');
                return;
            }
            
            if (password.length < 8) {
                addLog('Senha deve ter pelo menos 8 caracteres', 'error');
                return;
            }
            
            if (!apiKey) {
                addLog('Configure sua API key do 2Captcha!', 'error');
                return;
            }
            
            addLog(`🚀 Iniciando criação da conta: ${username}`, 'info');
            updateProgress(10, 'Preparando requisição...');
            
            const captchaToken = await resolverCaptcha();
            if (!captchaToken) {
                addLog('❌ Falha ao resolver CAPTCHA. Abortando.', 'error');
                updateProgress(100);
                return;
            }
            
            updateProgress(80, 'Enviando dados para Discord...');
            
            const [year, month, day] = birthdate.split('-');
            const fingerprint = Math.random().toString(36).substring(2, 15);
            
            const requestBody = {
                username: username,
                email: email,
                password: password,
                date_of_birth: { year: parseInt(year), month: parseInt(month), day: parseInt(day) },
                consent: true,
                fingerprint: fingerprint,
                captcha_key: captchaToken,
                gift_code_sku_id: null
            };
            
            try {
                const response = await fetch('https://discord.com/api/v9/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                        'Accept-Language': 'pt-BR,pt;q=0.9',
                        'Origin': 'https://discord.com',
                        'Referer': 'https://discord.com/register'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (response.status === 201 || data.token) {
                    discordToken = data.token;
                    discordUserData = {
                        username: username,
                        email: email,
                        id: data.user_id,
                        token: data.token
                    };
                    
                    updateProgress(100, '✅ Conta criada com sucesso!');
                    addLog(`✅ CONTA CRIADA COM SUCESSO!`, 'success');
                    addLog(`📝 Usuário: ${username}`, 'success');
                    addLog(`📧 Email: ${email}`, 'success');
                    addLog(`🔑 Token: ${data.token.substring(0, 50)}...`, 'info');
                    
                    document.getElementById('tokenBox').style.display = 'block';
                    document.getElementById('tokenValue').innerText = data.token;
                    document.getElementById('copyTokenBtn').style.display = 'block';
                    document.getElementById('descartarBtn').style.display = 'block';
                    
                    localStorage.setItem('discordTempToken', data.token);
                    localStorage.setItem('discordTempUser', JSON.stringify(discordUserData));
                    
                } else {
                    addLog(`❌ Erro ao criar conta: ${JSON.stringify(data)}`, 'error');
                    updateProgress(100);
                }
            } catch (error) {
                addLog(`❌ Erro na requisição: ${error.message}`, 'error');
                updateProgress(100);
            }
        }

        function copiarToken() {
            if (discordToken) {
                navigator.clipboard.writeText(discordToken);
                addLog('Token copiado para área de transferência!', 'success');
            }
        }

        function abrirDiscordLogin() {
            addLog('Abrindo Discord para login...', 'info');
            window.open('https://discord.com/login', '_blank');
            addLog('Use o token copiado ou faça login com email/senha', 'info');
        }

        function descartarConta() {
            if (confirm('⚠️ Tem certeza? A conta será permanentemente deletada.')) {
                addLog('Descartando conta temporária...', 'info');
                discordToken = null;
                discordUserData = null;
                localStorage.removeItem('discordTempToken');
                localStorage.removeItem('discordTempUser');
                document.getElementById('tokenBox').style.display = 'none';
                document.getElementById('copyTokenBtn').style.display = 'none';
                document.getElementById('descartarBtn').style.display = 'none';
                addLog('✅ Conta descartada com sucesso!', 'success');
            }
        }

        function carregarDadosSalvos() {
            const savedToken = localStorage.getItem('discordTempToken');
            if (savedToken) {
                discordToken = savedToken;
                document.getElementById('tokenBox').style.display = 'block';
                document.getElementById('tokenValue').innerText = savedToken;
                document.getElementById('copyTokenBtn').style.display = 'block';
                document.getElementById('descartarBtn').style.display = 'block';
                addLog('Sessão anterior carregada', 'info');
            }
        }

        window.onload = () => {
            carregarDadosSalvos();
            addLog('✅ Sistema pronto! Configure sua API key do 2Captcha para começar.', 'success');
        };
    </script>
</body>
</html>
