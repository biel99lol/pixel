<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Discord Creator - Flutuante e Minimizável</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita seleção ao arrastar */
        }

        body {
            background: transparent; /* Fundo transparente para parecer flutuante */
            min-height: 100vh;
            position: relative;
            overflow: hidden; /* Remove scroll da página */
        }

        /* App flutuante - posicionado no canto inferior direito */
        .floating-app {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            background: rgba(30, 30, 47, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 99999;
            transition: all 0.2s ease;
            cursor: grab;
            border: 1px solid rgba(88, 101, 242, 0.5);
        }

        .floating-app:active {
            cursor: grabbing;
        }

        /* Cabeçalho arrastável */
        .app-header {
            background: #5865F2;
            padding: 12px 16px;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            color: white;
            font-weight: bold;
        }

        .app-header:active {
            cursor: grabbing;
        }

        .app-header h3 {
            font-size: 16px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .controls button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .controls button:active {
            transform: scale(0.9);
        }

        /* Conteúdo do app */
        .app-content {
            padding: 16px;
            transition: all 0.2s;
        }

        /* Estado minimizado */
        .floating-app.minimized .app-content {
            display: none;
        }

        .floating-app.minimized {
            width: auto;
            border-radius: 40px;
        }

        /* Estilos dos elementos internos (igual antes) */
        .dados-box {
            background: #1e1e2f;
            color: #00ff88;
            padding: 12px;
            border-radius: 20px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            margin: 6px 0;
            cursor: pointer;
            transition: 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary { background: #23a55a; color: white; }
        .btn-secondary { background: #1e1e2f; color: #00ff88; border: 1px solid #2a2a3a; }
        .btn-discord { background: #5865F2; color: white; }
        .flex-buttons { display: flex; gap: 8px; }
        .flex-buttons button { flex: 1; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e1e2f;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100000;
            animation: fadeUp 0.2s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="floatingApp" class="floating-app">
    <div class="app-header" id="appHeader">
        <h3>🎮 Discord Creator</h3>
        <div class="controls">
            <button id="minimizeBtn">─</button>
        </div>
    </div>
    <div class="app-content">
        <div class="dados-box" id="dadosBox">
            📧 <span id="email">---</span><br>
            👤 <span id="username">---</span><br>
            🔐 <span id="password">---</span>
        </div>

        <button id="btnGerar" class="btn-primary">✨ GERAR CONTA</button>
        <div class="flex-buttons">
            <button id="btnCopiar" class="btn-secondary">📋 COPIAR</button>
            <button id="btnDiscord" class="btn-discord">🔗 ABRIR</button>
        </div>
        <div style="font-size: 10px; text-align: center; margin-top: 8px; color: #aaa;">
            ↕️ Arraste pela barra azul
        </div>
    </div>
</div>

<script>
    // ======================= DADOS E FUNÇÕES DO APP =======================
    let dadosAtuais = { email: '', username: '', password: '' };

    function mostrarToast(msg, cor = '#1e1e2f') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function gerarDados() {
        const timestamp = Date.now();
        const random = Math.floor(Math.random() * 99999);
        const dominios = ['gmail.com', 'outlook.com', 'protonmail.com', 'yahoo.com', 'hotmail.com'];
        const dominio = dominios[Math.floor(Math.random() * dominios.length)];
        dadosAtuais.email = `user${timestamp}${random}@${dominio}`;
        dadosAtuais.username = `User_${Math.floor(Math.random() * 99999)}`;
        dadosAtuais.password = `Disc@${Math.random().toString(36).substring(2, 10)}!${Math.floor(Math.random() * 999)}`;
        document.getElementById('email').innerText = dadosAtuais.email;
        document.getElementById('username').innerText = dadosAtuais.username;
        document.getElementById('password').innerText = dadosAtuais.password;
        mostrarToast('✅ Conta gerada!', '#23a55a');
        localStorage.setItem('discord_dados', JSON.stringify(dadosAtuais));
    }

    async function copiarDados() {
        if (!dadosAtuais.email || dadosAtuais.email === '---') {
            mostrarToast('⚠️ Gere uma conta primeiro', '#faa61a');
            return;
        }
        const texto = `${dadosAtuais.email}\n${dadosAtuais.username}\n${dadosAtuais.password}`;
        await navigator.clipboard.writeText(texto);
        mostrarToast('📋 Dados copiados!', '#1e1e2f');
    }

    function abrirDiscord() {
        if (!dadosAtuais.email || dadosAtuais.email === '---') {
            mostrarToast('⚠️ Gere uma conta primeiro', '#faa61a');
            return;
        }
        window.open('https://discord.com/register', '_blank');
        mostrarToast('🔗 Discord aberto! Cole os dados.', '#5865F2');
    }

    function carregarDados() {
        const salvos = localStorage.getItem('discord_dados');
        if (salvos) {
            try {
                dadosAtuais = JSON.parse(salvos);
                document.getElementById('email').innerText = dadosAtuais.email;
                document.getElementById('username').innerText = dadosAtuais.username;
                document.getElementById('password').innerText = dadosAtuais.password;
            } catch(e) {}
        } else {
            // Gera automaticamente na primeira vez
            gerarDados();
        }
    }

    // ======================= FUNÇÕES DE ARRASTAR E MINIMIZAR =======================
    const app = document.getElementById('floatingApp');
    const header = document.getElementById('appHeader');
    let isDragging = false;
    let offsetX, offsetY;

    header.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return; // Não arrasta se clicar nos botões
        isDragging = true;
        offsetX = e.clientX - app.offsetLeft;
        offsetY = e.clientY - app.offsetTop;
        app.style.cursor = 'grabbing';
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let left = e.clientX - offsetX;
        let top = e.clientY - offsetY;
        // Limita para não sair da tela
        left = Math.max(10, Math.min(window.innerWidth - app.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - app.offsetHeight - 10, top));
        app.style.left = left + 'px';
        app.style.right = 'auto';
        app.style.bottom = 'auto';
        app.style.top = top + 'px';
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        app.style.cursor = 'grab';
    });

    // Minimizar / Restaurar
    const minimizeBtn = document.getElementById('minimizeBtn');
    let isMinimized = false;
    minimizeBtn.addEventListener('click', () => {
        if (isMinimized) {
            app.classList.remove('minimized');
            minimizeBtn.textContent = '─';
            app.style.width = '360px';
        } else {
            app.classList.add('minimized');
            minimizeBtn.textContent = '□';
            app.style.width = 'auto';
        }
        isMinimized = !isMinimized;
    });

    // Para toque em dispositivos móveis (arrastar com dedo)
    header.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        const touch = e.touches[0];
        offsetX = touch.clientX - app.offsetLeft;
        offsetY = touch.clientY - app.offsetTop;
        isDragging = true;
        e.preventDefault();
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        let left = touch.clientX - offsetX;
        let top = touch.clientY - offsetY;
        left = Math.max(10, Math.min(window.innerWidth - app.offsetWidth - 10, left));
        top = Math.max(10, Math.min(window.innerHeight - app.offsetHeight - 10, top));
        app.style.left = left + 'px';
        app.style.right = 'auto';
        app.style.bottom = 'auto';
        app.style.top = top + 'px';
    });

    window.addEventListener('touchend', () => {
        isDragging = false;
    });

    // Inicialização
    carregarDados();
    document.getElementById('btnGerar').addEventListener('click', gerarDados);
    document.getElementById('btnCopiar').addEventListener('click', copiarDados);
    document.getElementById('btnDiscord').addEventListener('click', abrirDiscord);

    // Posicionar no canto inferior direito por padrão
    app.style.left = 'auto';
    app.style.right = '20px';
    app.style.bottom = '20px';
    app.style.top = 'auto';
</script>
</body>
</html>
