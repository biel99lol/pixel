<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Discord Creator Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { color: #5865F2; text-align: center; font-size: 26px; }
        .sub { text-align: center; color: #666; margin: 5px 0 20px; font-size: 14px; }
        .dados-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            border-radius: 16px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 13px;
            text-align: center;
            word-break: break-all;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-success { background: #23a55a; }
        .btn-warning { background: #faa61a; color: #333; }
        .status {
            background: #e8f4fd;
            padding: 12px;
            border-radius: 14px;
            margin: 10px 0;
            font-size: 13px;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e1e;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            z-index: 1000;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .badge {
            background: #ed4245;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            display: inline-block;
            margin-left: 8px;
        }
        .perm-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 14px;
            padding: 12px;
            margin: 10px 0;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎮 Discord Creator Pro <span class="badge">APP</span></h1>
            <p class="sub">Clique em PERMITIR nas notificações</p>

            <div class="perm-box" id="permBox">
                ⚠️ <strong>Ative as notificações:</strong> Clique no botão abaixo e escolha "PERMITIR"
            </div>

            <div class="dados-box" id="dadosBox">
                📧 <span id="email">Clique em "Nova Conta"</span><br>
                👤 <span id="username">---</span><br>
                🔐 <span id="password">---</span>
            </div>

            <button id="btnPermitir" class="btn-warning">🔔 ATIVAR NOTIFICAÇÕES</button>
            <button id="btnNovaConta" class="btn-success">🔄 NOVA CONTA</button>
            <button id="btnCopiarDados">📋 COPIAR DADOS</button>
            <button id="btnAbrirDiscord">🔗 ABRIR DISCORD</button>

            <div class="status" id="statusArea">
                ✅ Sistema pronto. Ative as notificações primeiro.
            </div>
        </div>
    </div>

    <script>
        let dadosAtuais = { email: '', username: '', password: '' };
        let notificacoesAtivas = false;

        function mostrarToast(mensagem, cor = '#1e1e1e') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = cor;
            toast.innerHTML = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function enviarNotificacao(titulo, corpo) {
            if (notificacoesAtivas && Notification.permission === 'granted') {
                try {
                    new Notification(titulo, {
                        body: corpo,
                        icon: 'https://discord.com/assets/2c21aeda16de354ba5334551a883b481.png',
                        vibrate: [200, 100, 200],
                        silent: false
                    });
                    console.log('Notificação enviada:', titulo);
                    return true;
                } catch(e) {
                    console.log('Erro na notificação:', e);
                    return false;
                }
            } else {
                console.log('Notificações não ativadas');
                return false;
            }
        }

        async function ativarNotificacoes() {
            if (Notification.permission === 'granted') {
                notificacoesAtivas = true;
                document.getElementById('permBox').innerHTML = '✅ <strong>Notificações ativadas!</strong> Você receberá alertas do app.';
                document.getElementById('permBox').style.background = '#d4edda';
                document.getElementById('permBox').style.borderColor = '#28a745';
                mostrarToast('🔔 Notificações ativadas com sucesso!', '#23a55a');
                enviarNotificacao('✅ Notificações ativas', 'App Discord Creator Pro está pronto para usar!');
                return;
            }
            
            if (Notification.permission === 'denied') {
                mostrarToast('❌ Notificações bloqueadas. Vá nas configurações do site e permita.', '#ed4245');
                alert('Notificações estão bloqueadas. Vá em Configurações > Configurações do site > Notificações e permita para este site.');
                return;
            }
            
            const permissao = await Notification.requestPermission();
            if (permissao === 'granted') {
                notificacoesAtivas = true;
                document.getElementById('permBox').innerHTML = '✅ <strong>Notificações ativadas!</strong> Você receberá alertas do app.';
                document.getElementById('permBox').style.background = '#d4edda';
                document.getElementById('permBox').style.borderColor = '#28a745';
                mostrarToast('🔔 Notificações ativadas!', '#23a55a');
                enviarNotificacao('✅ App pronto!', 'Clique em "Nova Conta" para começar.');
            } else {
                mostrarToast('❌ Você precisa permitir as notificações para o app funcionar completamente.', '#ed4245');
            }
        }

        function gerarDados() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 99999);
            const dominios = ['gmail.com', 'outlook.com', 'protonmail.com', 'yahoo.com'];
            const dominio = dominios[Math.floor(Math.random() * dominios.length)];
            
            dadosAtuais.email = `user${timestamp}${random}@${dominio}`;
            dadosAtuais.username = `User_${Math.floor(Math.random() * 99999)}`;
            dadosAtuais.password = `Disc@${Math.random().toString(36).substring(2, 10)}!${Math.floor(Math.random() * 999)}`;
            
            document.getElementById('email').innerText = dadosAtuais.email;
            document.getElementById('username').innerText = dadosAtuais.username;
            document.getElementById('password').innerText = dadosAtuais.password;
            document.getElementById('statusArea').innerHTML = '✅ DADOS GERADOS! Clique em "Copiar Dados"';
            
            mostrarToast('🎉 Dados gerados com sucesso!', '#23a55a');
            enviarNotificacao('🎉 NOVOS DADOS GERADOS!', `Email: ${dadosAtuais.email}\nUsuário: ${dadosAtuais.username}`);
            
            localStorage.setItem('discord_dados', JSON.stringify(dadosAtuais));
        }

        async function copiarDados() {
            if (!dadosAtuais.email) {
                mostrarToast('⚠️ Clique em "Nova Conta" primeiro!', '#faa61a');
                return;
            }
            
            const texto = `${dadosAtuais.email}\n${dadosAtuais.username}\n${dadosAtuais.password}`;
            
            try {
                await navigator.clipboard.writeText(texto);
                mostrarToast('📋 Dados copiados para área de transferência!', '#23a55a');
                enviarNotificacao('✅ DADOS COPIADOS!', 'Agora cole no Discord e resolva o CAPTCHA');
                document.getElementById('statusArea').innerHTML = '✅ Dados copiados! Clique em "Abrir Discord"';
            } catch (err) {
                mostrarToast('❌ Erro ao copiar. Copie manualmente.', '#ed4245');
            }
        }

        function abrirDiscord() {
            if (!dadosAtuais.email) {
                mostrarToast('⚠️ Gere os dados primeiro!', '#faa61a');
                return;
            }
            
            window.open('https://discord.com/register', '_blank');
            mostrarToast('🔗 Discord aberto! Cole os dados.', '#5865F2');
            enviarNotificacao('🔗 DISCORD ABERTO!', 'Cole os dados e resolva o CAPTCHA para criar sua conta');
            document.getElementById('statusArea').innerHTML = '🔗 Discord aberto! Cole os dados e resolva o CAPTCHA.';
        }

        function carregarDadosSalvos() {
            const salvos = localStorage.getItem('discord_dados');
            if (salvos) {
                try {
                    dadosAtuais = JSON.parse(salvos);
                    document.getElementById('email').innerText = dadosAtuais.email;
                    document.getElementById('username').innerText = dadosAtuais.username;
                    document.getElementById('password').innerText = dadosAtuais.password;
                } catch(e) {}
            }
        }

        document.getElementById('btnPermitir').onclick = ativarNotificacoes;
        document.getElementById('btnNovaConta').onclick = gerarDados;
        document.getElementById('btnCopiarDados').onclick = copiarDados;
        document.getElementById('btnAbrirDiscord').onclick = abrirDiscord;

        carregarDadosSalvos();
        
        if (Notification.permission === 'granted') {
            notificacoesAtivas = true;
            document.getElementById('permBox').innerHTML = '✅ <strong>Notificações ativadas!</strong> Você receberá alertas do app.';
            document.getElementById('permBox').style.background = '#d4edda';
            document.getElementById('permBox').style.borderColor = '#28a745';
        }
        
        if (!dadosAtuais.email) {
            setTimeout(() => {
                if (Notification.permission === 'granted') {
                    enviarNotificacao('🎮 Discord Creator Pro', 'App pronto! Clique em "Nova Conta" para começar.');
                }
            }, 1000);
        }
    </script>
</body>
</html>
