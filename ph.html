<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Capturar Foto</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e2e;
            color: #fff;
            text-align: center;
        }
        video, canvas, img {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin: 10px 0;
            background: #000;
        }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #4752c4;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .success {
            background: #23a55a;
            display: block;
        }
        .error {
            background: #da373c;
            display: block;
        }
        .loading {
            background: #faa61a;
            display: block;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>📸 Capturar Foto</h1>
    <p>Escolha a câmera e clique no botão</p>
    
    <select id="cameraSelect">
        <option value="environment">📷 Câmera Traseira</option>
        <option value="user">🤳 Câmera Frontal</option>
    </select>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="capture">📷 Tirar Foto e Enviar</button>
    <div id="status" class="status"></div>
    <img id="preview" style="display:none;">

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1465762369346080783/OBcgCQtcMXqW8gXjIkz2Dn6QlCxySPvTWGaui-HKXLFAM5GfMI0EWpmeV7AOy6JNRrvQ";
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture');
        const statusDiv = document.getElementById('status');
        const preview = document.getElementById('preview');
        const cameraSelect = document.getElementById('cameraSelect');
        
        let stream = null;
        
        function mostrarStatus(mensagem, tipo) {
            statusDiv.textContent = mensagem;
            statusDiv.className = 'status ' + tipo;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 4000);
        }
        
        async function iniciarCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            const facingMode = cameraSelect.value;
            
            try {
                mostrarStatus("🎥 Solicitando acesso à câmera...", "loading");
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: facingMode } }
                });
                
                video.srcObject = stream;
                video.style.transform = facingMode === "user" ? "scaleX(-1)" : "scaleX(1)";
                mostrarStatus("✅ Câmera pronta!", "success");
                
            } catch (error) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true
                    });
                    video.srcObject = stream;
                    mostrarStatus("✅ Câmera pronta (modo padrão)", "success");
                } catch (err) {
                    mostrarStatus("❌ Erro ao acessar câmera. Verifique as permissões.", "error");
                }
            }
        }
        
        async function enviarParaDiscord(blob) {
            const formData = new FormData();
            formData.append("file", blob, "foto.jpg");
            formData.append("payload_json", JSON.stringify({
                content: "📸 Nova foto!",
                username: "Camera"
            }));
            
            try {
                mostrarStatus("📤 Enviando para o Discord...", "loading");
                
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    body: formData
                });
                
                if (response.ok) {
                    mostrarStatus("✅ Foto enviada com sucesso!", "success");
                } else {
                    mostrarStatus("❌ Erro ao enviar. Webhook inválido?", "error");
                }
            } catch (error) {
                mostrarStatus("❌ Erro de conexão.", "error");
            }
        }
        
        function tirarFoto() {
            const context = canvas.getContext('2d');
            const width = video.videoWidth;
            const height = video.videoHeight;
            
            if (width === 0 || height === 0) {
                mostrarStatus("❌ Aguarde a câmera iniciar.", "error");
                return;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            if (cameraSelect.value === "user") {
                context.save();
                context.scale(-1, 1);
                context.drawImage(video, -width, 0, width, height);
                context.restore();
            } else {
                context.drawImage(video, 0, 0, width, height);
            }
            
            preview.style.display = 'block';
            preview.src = canvas.toDataURL('image/jpeg');
            
            canvas.toBlob(blob => {
                enviarParaDiscord(blob);
            }, 'image/jpeg', 0.9);
            
            setTimeout(() => {
                preview.style.display = 'none';
            }, 5000);
        }
        
        captureBtn.addEventListener('click', tirarFoto);
        cameraSelect.addEventListener('change', iniciarCamera);
        
        iniciarCamera();
        
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
