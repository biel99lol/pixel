<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Capturar Foto</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e2e;
            color: #fff;
            text-align: center;
        }
        video, canvas, img {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin: 10px 0;
            background: #000;
        }
        button {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #4752c4;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .success {
            background: #23a55a;
            display: block;
        }
        .error {
            background: #da373c;
            display: block;
        }
        .loading {
            background: #faa61a;
            display: block;
        }
    </style>
</head>
<body>
    <h1>📸 Capturar Foto</h1>
    <p>Clique no botão para tirar foto (câmera traseira)</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="capture">📷 Tirar Foto e Enviar</button>
    <div id="status" class="status"></div>
    <img id="preview" style="display:none;">

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1465762369346080783/OBcgCQtcMXqW8gXjIkz2Dn6QlCxySPvTWGaui-HKXLFAM5GfMI0EWpmeV7AOy6JNRrvQ";
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture');
        const statusDiv = document.getElementById('status');
        const preview = document.getElementById('preview');
        
        let stream = null;
        
        function mostrarStatus(mensagem, tipo) {
            statusDiv.textContent = mensagem;
            statusDiv.className = 'status ' + tipo;
            setTimeout(() => {
                if (statusDiv.className !== 'loading') {
                    statusDiv.style.display = 'none';
                    statusDiv.className = 'status';
                }
            }, 3000);
        }
        
        async function iniciarCamera() {
            try {
                mostrarStatus("🎥 Solicitando acesso à câmera traseira...", "loading");
                statusDiv.style.display = 'block';
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }
                });
                
                video.srcObject = stream;
                video.style.transform = "scaleX(1)";
                mostrarStatus("✅ Câmera traseira pronta! Clique no botão para tirar foto.", "success");
                
            } catch (error) {
                console.error("Erro ao acessar câmera:", error);
                mostrarStatus("❌ Erro ao acessar câmera traseira. Verifique as permissões.", "error");
            }
        }
        
        async function enviarParaDiscord(blob) {
            const formData = new FormData();
            formData.append("file", blob, "foto_camera.jpg");
            formData.append("payload_json", JSON.stringify({
                content: "📸 **Nova foto capturada!**",
                username: "Camera Traseira"
            }));
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    body: formData
                });
                
                if (response.ok) {
                    mostrarStatus("✅ Foto enviada com sucesso para o Discord!", "success");
                } else {
                    mostrarStatus("❌ Erro ao enviar para o Discord. Verifique o webhook.", "error");
                }
            } catch (error) {
                console.error("Erro no envio:", error);
                mostrarStatus("❌ Erro de conexão. Verifique sua internet.", "error");
            }
        }
        
        function tirarFoto() {
            const context = canvas.getContext('2d');
            const width = video.videoWidth;
            const height = video.videoHeight;
            
            if (width === 0 || height === 0) {
                mostrarStatus("❌ Aguarde a câmera iniciar completamente.", "error");
                return;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            context.drawImage(video, 0, 0, width, height);
            
            preview.style.display = 'block';
            preview.src = canvas.toDataURL('image/jpeg');
            
            canvas.toBlob(blob => {
                enviarParaDiscord(blob);
            }, 'image/jpeg', 0.9);
            
            setTimeout(() => {
                preview.style.display = 'none';
            }, 3000);
        }
        
        captureBtn.addEventListener('click', tirarFoto);
        iniciarCamera();
        
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
