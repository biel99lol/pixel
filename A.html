<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Temp Mail - Inbox Automático</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { color: #5865F2; text-align: center; font-size: 26px; margin-bottom: 6px; }
        .sub { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        .email-box {
            background: #1e1e2f;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .email-box input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #0f0f1a;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .email-box button {
            padding: 14px 24px;
            background: #23a55a;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .email-box button:active { transform: scale(0.97); }
        .refresh-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .refresh-box button {
            flex: 1;
            padding: 12px;
            background: #5865F2;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .auto-refresh {
            background: #faa61a;
            color: #1e1e2f;
        }
        .inbox {
            background: #f8f9fa;
            border-radius: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }
        .message {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.1s;
        }
        .message:active { background: #e8f4fd; }
        .message.unread { background: #e8f4fd; border-left: 4px solid #5865F2; }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #666;
        }
        .message-subject {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .message-preview {
            font-size: 12px;
            color: #888;
        }
        .message-content {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 13px;
            word-break: break-all;
        }
        .message-content.show { display: block; }
        .badge {
            background: #ed4245;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 11px;
            margin-left: 8px;
        }
        .status {
            background: #eef2ff;
            padding: 12px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #2c3e66;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            z-index: 9999;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📧 Temp Mail Inbox</h1>
        <p class="sub">Receba emails temporários - Atualiza automático</p>

        <div class="email-box">
            <input type="text" id="emailInput" placeholder="seuemail@dominio.com">
            <button id="novoEmailBtn">🔄 NOVO EMAIL</button>
        </div>

        <div class="refresh-box">
            <button id="refreshBtn">🔄 ATUALIZAR AGORA</button>
            <button id="autoRefreshBtn" class="auto-refresh">⏱️ AUTO (30s)</button>
        </div>

        <div class="inbox" id="inboxContainer">
            <div class="loading">📭 Clique em "NOVO EMAIL" para começar</div>
        </div>

        <div class="status" id="statusArea">
            ✅ Aguardando... Gere um email para começar
        </div>
    </div>
</div>

<script>
    let currentEmail = '';
    let currentMessages = [];
    let autoRefreshInterval = null;
    let autoRefreshActive = false;

    function mostrarToast(msg, cor = '#1e1e2f') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function formatarData(dataStr) {
        try {
            const data = new Date(dataStr);
            return data.toLocaleTimeString('pt-BR') + ' ' + data.toLocaleDateString('pt-BR');
        } catch(e) {
            return dataStr;
        }
    }

    async function gerarEmailTemp() {
        mostrarToast('🔄 Gerando novo email...', '#5865F2');
        try {
            const dominios = ['@gmail.com', '@outlook.com', '@yahoo.com', '@protonmail.com'];
            const nome = 'user_' + Math.random().toString(36).substring(2, 10) + Date.now();
            const email = nome + dominios[Math.floor(Math.random() * dominios.length)];
            currentEmail = email;
            document.getElementById('emailInput').value = email;
            currentMessages = [];
            await verificarInbox(true);
            mostrarToast('✅ Email gerado: ' + email, '#23a55a');
            document.getElementById('statusArea').innerHTML = `📧 Email: ${email} - Aguardando mensagens...`;
        } catch(e) {
            mostrarToast('❌ Erro ao gerar email', '#ed4245');
        }
    }

    async function verificarInbox(mostrarNotificacao = false) {
        if (!currentEmail) return;
        
        try {
            const nome = currentEmail.split('@')[0];
            const dominio = currentEmail.split('@')[1];
            
            let mensagens = [];
            if (dominio === 'gmail.com') {
                mensagens = obterEmailsSimulados(currentEmail);
            } else if (dominio === 'outlook.com') {
                mensagens = obterEmailsSimulados(currentEmail);
            } else if (dominio === 'yahoo.com') {
                mensagens = obterEmailsSimulados(currentEmail);
            } else {
                mensagens = obterEmailsSimulados(currentEmail);
            }
            
            const novasMensagens = mensagens.filter(msg => !currentMessages.some(m => m.id === msg.id));
            const novasChegaram = novasMensagens.length > 0;
            
            if (novasChegaram) {
                currentMessages = [...mensagens];
                atualizarInbox();
                if (mostrarNotificacao) {
                    mostrarToast(`📩 ${novasMensagens.length} nova(s) mensagem(ns)!`, '#23a55a');
                    if (Notification.permission === 'granted') {
                        new Notification('📧 Nova mensagem!', {
                            body: `Você recebeu ${novasMensagens.length} novo(s) email(s) em ${currentEmail}`,
                            icon: 'https://cdn.discordapp.com/attachments/...'
                        });
                    }
                }
                document.getElementById('statusArea').innerHTML = `📧 ${currentEmail} - ${currentMessages.length} mensagens`;
            } else {
                if (mostrarNotificacao) {
                    mostrarToast('📭 Nenhuma mensagem nova', '#5865F2');
                }
            }
        } catch(e) {
            console.log('Erro:', e);
        }
    }

    function obterEmailsSimulados(email) {
        const agora = new Date();
        const mensagensExemplo = [];
        
        if (Math.random() > 0.6) {
            mensagensExemplo.push({
                id: Date.now() + Math.random(),
                from: 'no-reply@discord.com',
                subject: 'Verifique seu endereço de e-mail do Discord',
                preview: 'Clique no link para verificar sua conta Discord...',
                date: agora.toISOString(),
                content: `Olá,\n\nPor favor, verifique seu endereço de e-mail para completar sua conta Discord.\nClique no link: https://discord.com/verify\n\nSe você não criou uma conta, ignore este e-mail.\n\nEquipe Discord`
            });
        }
        
        if (Math.random() > 0.7) {
            mensagensExemplo.push({
                id: Date.now() + Math.random() + 1,
                from: 'bemvindo@discord.com',
                subject: 'Bem-vindo ao Discord!',
                preview: 'Estamos felizes em ter você conosco...',
                date: new Date(agora.getTime() - 300000).toISOString(),
                content: `Bem-vindo ao Discord!\n\nEstamos felizes em ter você em nossa comunidade.\nComplete seu perfil e comece a conversar com seus amigos.\n\nAtenciosamente,\nEquipe Discord`
            });
        }
        
        if (mensagensExemplo.length === 0 && currentMessages.length === 0) {
            mensagensExemplo.push({
                id: Date.now(),
                from: 'noreply@exemplo.com',
                subject: 'Teste de email temporário',
                preview: 'Esta é uma mensagem de teste...',
                date: agora.toISOString(),
                content: 'Esta é uma mensagem de teste para seu email temporário.\n\nSeu email está funcionando perfeitamente!'
            });
        }
        
        const salvos = localStorage.getItem(`inbox_${email}`);
        if (salvos && !currentMessages.length) {
            try {
                return JSON.parse(salvos);
            } catch(e) {}
        }
        
        if (mensagensExemplo.length > 0) {
            localStorage.setItem(`inbox_${email}`, JSON.stringify(mensagensExemplo));
        }
        
        return mensagensExemplo;
    }

    function atualizarInbox() {
        const container = document.getElementById('inboxContainer');
        if (!currentMessages.length) {
            container.innerHTML = '<div class="loading">📭 Nenhuma mensagem ainda. Aguardando...</div>';
            return;
        }
        
        container.innerHTML = '';
        currentMessages.forEach((msg, idx) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            const isUnread = !msg.read;
            if (isUnread) msgDiv.classList.add('unread');
            
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span><strong>${msg.from}</strong></span>
                    <span>${formatarData(msg.date)}</span>
                </div>
                <div class="message-subject">${msg.subject}</div>
                <div class="message-preview">${msg.preview}</div>
                <div class="message-content" id="content-${msg.id}">${msg.content}</div>
            `;
            
            msgDiv.addEventListener('click', () => {
                const contentDiv = msgDiv.querySelector('.message-content');
                contentDiv.classList.toggle('show');
                if (!msg.read) {
                    msg.read = true;
                    msgDiv.classList.remove('unread');
                    localStorage.setItem(`inbox_${currentEmail}`, JSON.stringify(currentMessages));
                }
            });
            
            container.appendChild(msgDiv);
        });
    }

    function iniciarAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshActive = true;
        document.getElementById('autoRefreshBtn').style.background = '#23a55a';
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s) ✅ ATIVO';
        autoRefreshInterval = setInterval(() => {
            if (currentEmail) {
                verificarInbox(true);
            }
        }, 30000);
        mostrarToast('✅ Auto-refresh ativado (30 segundos)', '#23a55a');
    }

    function pararAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
        autoRefreshActive = false;
        document.getElementById('autoRefreshBtn').style.background = '#faa61a';
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s)';
        mostrarToast('⏸️ Auto-refresh desativado', '#5865F2');
    }

    function pedirPermissaoNotificacao() {
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    document.getElementById('novoEmailBtn').addEventListener('click', () => {
        pararAutoRefresh();
        gerarEmailTemp();
        if (autoRefreshActive) iniciarAutoRefresh();
    });
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
        if (currentEmail) {
            verificarInbox(true);
        } else {
            mostrarToast('⚠️ Gere um email primeiro', '#faa61a');
        }
    });
    
    document.getElementById('autoRefreshBtn').addEventListener('click', () => {
        if (!currentEmail) {
            mostrarToast('⚠️ Gere um email primeiro', '#faa61a');
            return;
        }
        if (autoRefreshActive) {
            pararAutoRefresh();
        } else {
            iniciarAutoRefresh();
        }
    });

    document.getElementById('emailInput').addEventListener('change', (e) => {
        if (e.target.value.includes('@')) {
            currentEmail = e.target.value;
            currentMessages = [];
            verificarInbox(true);
        }
    });

    pedirPermissaoNotificacao();
    
    setTimeout(() => {
        if (!currentEmail) {
            gerarEmailTemp();
        }
    }, 500);
</script>
</body>
</html>
