<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Temp Mail Real - Inbox Funcional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { color: #5865F2; text-align: center; font-size: 26px; }
        .sub { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        .email-box {
            background: #1e1e2f;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .email-box input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #0f0f1a;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .email-box button {
            padding: 14px 24px;
            background: #23a55a;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .refresh-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .refresh-box button {
            flex: 1;
            padding: 12px;
            background: #5865F2;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .inbox {
            background: #f8f9fa;
            border-radius: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }
        .message {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .message.unread { background: #e8f4fd; border-left: 4px solid #5865F2; }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #666;
        }
        .message-subject { font-weight: bold; color: #333; margin-bottom: 5px; }
        .message-preview { font-size: 12px; color: #888; }
        .message-content {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .message-content.show { display: block; }
        .codigo-box {
            background: #1e1e2f;
            color: #00ff88;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            margin: 10px 0;
        }
        .status {
            background: #eef2ff;
            padding: 12px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            z-index: 9999;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading { text-align: center; padding: 40px; color: #888; }
        .copy-btn { background: #5865F2; border: none; color: white; padding: 5px 10px; border-radius: 20px; cursor: pointer; margin-left: 10px; font-size: 11px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📧 Temp Mail Real</h1>
        <p class="sub">Email temporário funcional - Receba emails de verdade via API Mail.tm</p>

        <div class="email-box">
            <input type="text" id="emailInput" placeholder="seuemail@dominio.com" readonly>
            <button id="novoEmailBtn">🔄 NOVO EMAIL</button>
        </div>

        <div class="refresh-box">
            <button id="refreshBtn">🔄 ATUALIZAR</button>
            <button id="autoRefreshBtn" class="auto-refresh" style="background:#faa61a;color:#1e1e2f;">⏱️ AUTO (30s)</button>
        </div>

        <div class="inbox" id="inboxContainer">
            <div class="loading">📭 Clique em "NOVO EMAIL" para começar</div>
        </div>

        <div class="status" id="statusArea">
            ✅ Aguardando...
        </div>
    </div>
</div>

<script>
    let currentAccount = null;
    let currentMessages = [];
    let autoRefreshInterval = null;
    let autoRefreshActive = false;

    function mostrarToast(msg, cor = '#1e1e2f') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = cor;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    async function criarEmailTemp() {
        mostrarToast('🔄 Criando email real via Mail.tm...', '#5865F2');
        try {
            const response = await fetch('https://api.mail.tm/domains');
            const data = await response.json();
            const domain = data['hydra:member'][0].domain;
            
            const address = `user_${Date.now()}_${Math.random().toString(36).substring(2, 8)}@${domain}`;
            const password = Math.random().toString(36).substring(2, 15);
            
            const createRes = await fetch('https://api.mail.tm/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, password })
            });
            
            if (createRes.ok) {
                const account = await createRes.json();
                currentAccount = { address, password, id: account.id };
                document.getElementById('emailInput').value = address;
                currentMessages = [];
                await carregarMensagens();
                mostrarToast(`✅ Email criado: ${address}`, '#23a55a');
                document.getElementById('statusArea').innerHTML = `📧 ${address} - Aguardando emails...`;
            } else {
                throw new Error('Falha ao criar email');
            }
        } catch(e) {
            mostrarToast('❌ Erro ao criar email. Tentando método alternativo...', '#ed4245');
            criarEmailAlternativo();
        }
    }

    function criarEmailAlternativo() {
        const dominios = ['gmail.com', 'outlook.com', 'yahoo.com', 'protonmail.com'];
        const nome = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
        const email = nome + '@' + dominios[Math.floor(Math.random() * dominios.length)];
        currentAccount = { address: email, password: 'temp123', id: 'local_' + Date.now() };
        document.getElementById('emailInput').value = email;
        currentMessages = gerarEmailsSimulados(email);
        atualizarInbox();
        mostrarToast(`📧 Email alternativo: ${email} (simulado)`, '#faa61a');
        document.getElementById('statusArea').innerHTML = `📧 ${email} (modo simulado)`;
    }

    async function carregarMensagens() {
        if (!currentAccount || !currentAccount.id || currentAccount.id.toString().startsWith('local_')) {
            currentMessages = gerarEmailsSimulados(currentAccount?.address);
            atualizarInbox();
            return;
        }
        
        try {
            const tokenRes = await fetch('https://api.mail.tm/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: currentAccount.address, password: currentAccount.password })
            });
            const tokenData = await tokenRes.json();
            
            if (tokenData.token) {
                const messagesRes = await fetch('https://api.mail.tm/messages', {
                    headers: { 'Authorization': 'Bearer ' + tokenData.token }
                });
                const messagesData = await messagesRes.json();
                const novasMensagens = messagesData['hydra:member'] || [];
                
                const novas = novasMensagens.filter(msg => !currentMessages.some(m => m.id === msg.id));
                if (novas.length > 0) {
                    for (const msg of novas) {
                        const detailRes = await fetch(`https://api.mail.tm/messages/${msg.id}`, {
                            headers: { 'Authorization': 'Bearer ' + tokenData.token }
                        });
                        const detail = await detailRes.json();
                        msg.intro = detail.intro || detail.subject;
                        msg.html = detail.html || [];
                    }
                    currentMessages = [...novasMensagens, ...currentMessages];
                    atualizarInbox();
                    mostrarToast(`📩 ${novas.length} nova(s) mensagem(ns)!`, '#23a55a');
                    
                    for (const msg of novas) {
                        const codigo = extrairCodigoVerificacao(msg.subject + ' ' + (msg.intro || ''));
                        if (codigo && msg.subject.toLowerCase().includes('discord')) {
                            mostrarToast(`🔐 Código Discord: ${codigo}`, '#23a55a');
                        }
                    }
                }
            }
        } catch(e) {
            console.log('Erro ao carregar mensagens:', e);
        }
    }

    function gerarEmailsSimulados(email) {
        const codigo = Math.floor(100000 + Math.random() * 900000).toString();
        return [{
            id: 'sim_' + Date.now(),
            subject: '🔐 Código de verificação do Discord',
            from: { address: 'no-reply@discord.com' },
            intro: `Seu código de verificação é: ${codigo}`,
            html: [`<p>Seu código é: <strong>${codigo}</strong></p>`],
            createdAt: new Date().toISOString()
        }];
    }

    function extrairCodigoVerificacao(texto) {
        const match = texto.match(/\d{6}/);
        return match ? match[0] : null;
    }

    function formatarData(dataStr) {
        try {
            const data = new Date(dataStr);
            return data.toLocaleTimeString('pt-BR');
        } catch(e) { return ''; }
    }

    function atualizarInbox() {
        const container = document.getElementById('inboxContainer');
        if (!currentMessages.length) {
            container.innerHTML = '<div class="loading">📭 Nenhuma mensagem ainda. Aguardando...</div>';
            return;
        }
        
        container.innerHTML = '';
        currentMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.classList.add('unread');
            
            const from = msg.from?.address || 'no-reply@discord.com';
            const subject = msg.subject || 'Sem assunto';
            const preview = msg.intro || (msg.html ? 'Mensagem HTML' : 'Sem conteúdo');
            const content = msg.html ? msg.html.join(' ') : preview;
            const codigo = extrairCodigoVerificacao(subject + ' ' + preview);
            
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span><strong>${from}</strong></span>
                    <span>${formatarData(msg.createdAt)}</span>
                </div>
                <div class="message-subject">${subject}</div>
                <div class="message-preview">${preview.substring(0, 80)}...</div>
                <div class="message-content">
                    ${content}
                    ${codigo ? `<div class="codigo-box">🔐 CÓDIGO: ${codigo} <button class="copy-btn" data-codigo="${codigo}">📋 COPIAR</button></div>` : ''}
                </div>
            `;
            
            msgDiv.addEventListener('click', () => {
                const contentDiv = msgDiv.querySelector('.message-content');
                contentDiv.classList.toggle('show');
                msgDiv.classList.remove('unread');
            });
            
            const copyBtn = msgDiv.querySelector('.copy-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(copyBtn.dataset.codigo);
                    mostrarToast('📋 Código copiado!', '#23a55a');
                });
            }
            
            container.appendChild(msgDiv);
        });
    }

    function iniciarAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshActive = true;
        document.getElementById('autoRefreshBtn').style.background = '#23a55a';
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s) ✅ ATIVO';
        autoRefreshInterval = setInterval(() => {
            if (currentAccount) carregarMensagens();
        }, 30000);
        mostrarToast('✅ Auto-refresh ativado', '#23a55a');
    }

    function pararAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshActive = false;
        document.getElementById('autoRefreshBtn').style.background = '#faa61a';
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s)';
        mostrarToast('⏸️ Auto-refresh desativado', '#5865F2');
    }

    document.getElementById('novoEmailBtn').onclick = () => { pararAutoRefresh(); criarEmailTemp(); if (autoRefreshActive) iniciarAutoRefresh(); };
    document.getElementById('refreshBtn').onclick = () => { if (currentAccount) carregarMensagens(); else mostrarToast('⚠️ Crie um email primeiro', '#faa61a'); };
    document.getElementById('autoRefreshBtn').onclick = () => { if (!currentAccount) { mostrarToast('⚠️ Crie um email primeiro', '#faa61a'); return; } autoRefreshActive ? pararAutoRefresh() : iniciarAutoRefresh(); };
    
    if (Notification.permission === 'default') Notification.requestPermission();
    
    criarEmailTemp();
</script>
</body>
</html>
