<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Discord Creator Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #5865F2;
            text-align: center;
            font-size: 26px;
            margin-bottom: 6px;
        }

        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .dados-box {
            background: #1e1e2f;
            color: #00ff88;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            text-align: center;
            word-break: break-all;
            border: 1px solid #2a2a3a;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.15s ease;
        }

        button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-success {
            background: #23a55a;
        }

        .btn-warning {
            background: #faa61a;
            color: #1e1e2f;
        }

        .status {
            background: #eef2ff;
            padding: 12px;
            border-radius: 40px;
            margin-top: 16px;
            font-size: 12px;
            text-align: center;
            color: #2c3e66;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e1e2f;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 9999;
            font-size: 14px;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎮 Discord Creator Pro</h1>
            <p class="sub">Clique em NOVA CONTA para gerar dados</p>

            <div class="dados-box" id="dadosBox">
                📧 <span id="email">---</span><br>
                👤 <span id="username">---</span><br>
                🔐 <span id="password">---</span>
            </div>

            <button id="btnNovaConta" class="btn-success">🔄 NOVA CONTA</button>
            <button id="btnCopiarDados">📋 COPIAR DADOS</button>
            <button id="btnAbrirDiscord">🔗 ABRIR DISCORD</button>

            <div class="status" id="statusArea">
                ✅ App pronto. Clique em NOVA CONTA.
            </div>
        </div>
    </div>

    <script>
        let dadosAtuais = { email: '', username: '', password: '' };
        let notificacaoPermitida = false;

        function mostrarToast(msg, cor = '#1e1e2f') {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = cor;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function enviarNotificacao(titulo, corpo) {
            if (Notification.permission === 'granted') {
                new Notification(titulo, {
                    body: corpo,
                    icon: 'https://discord.com/assets/2c21aeda16de354ba5334551a883b481.png',
                    vibrate: [200, 100, 200]
                });
            }
        }

        function gerarDados() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 99999);
            const dominios = ['gmail.com', 'outlook.com', 'protonmail.com', 'yahoo.com', 'hotmail.com'];
            const dominio = dominios[Math.floor(Math.random() * dominios.length)];
            
            dadosAtuais.email = `user${timestamp}${random}@${dominio}`;
            dadosAtuais.username = `User_${Math.floor(Math.random() * 99999)}`;
            dadosAtuais.password = `Disc@${Math.random().toString(36).substring(2, 10)}!${Math.floor(Math.random() * 999)}`;
            
            document.getElementById('email').innerText = dadosAtuais.email;
            document.getElementById('username').innerText = dadosAtuais.username;
            document.getElementById('password').innerText = dadosAtuais.password;
            
            mostrarToast('✅ Conta gerada com sucesso!', '#23a55a');
            enviarNotificacao('🎉 Nova conta gerada!', `Email: ${dadosAtuais.email}`);
            
            document.getElementById('statusArea').innerHTML = '✅ Conta gerada! Clique em COPIAR DADOS.';
            localStorage.setItem('discord_dados', JSON.stringify(dadosAtuais));
        }

        async function copiarDados() {
            if (!dadosAtuais.email || dadosAtuais.email === '---') {
                mostrarToast('⚠️ Clique em NOVA CONTA primeiro!', '#faa61a');
                return;
            }
            
            const texto = `${dadosAtuais.email}\n${dadosAtuais.username}\n${dadosAtuais.password}`;
            await navigator.clipboard.writeText(texto);
            mostrarToast('📋 Dados copiados para área de transferência!', '#1e1e2f');
            enviarNotificacao('✅ Dados copiados!', 'Agora cole no Discord.');
            document.getElementById('statusArea').innerHTML = '📋 Dados copiados! Clique em ABRIR DISCORD.';
        }

        function abrirDiscord() {
            if (!dadosAtuais.email || dadosAtuais.email === '---') {
                mostrarToast('⚠️ Gere uma conta primeiro!', '#faa61a');
                return;
            }
            window.open('https://discord.com/register', '_blank');
            mostrarToast('🔗 Discord aberto! Cole os dados e resolva o CAPTCHA.', '#5865F2');
            enviarNotificacao('🔗 Discord aberto!', 'Cole os dados e resolva o CAPTCHA.');
            document.getElementById('statusArea').innerHTML = '🔗 Discord aberto! Cole os dados.';
        }

        function carregarDadosSalvos() {
            const salvos = localStorage.getItem('discord_dados');
            if (salvos) {
                try {
                    dadosAtuais = JSON.parse(salvos);
                    document.getElementById('email').innerText = dadosAtuais.email;
                    document.getElementById('username').innerText = dadosAtuais.username;
                    document.getElementById('password').innerText = dadosAtuais.password;
                    mostrarToast('📀 Dados carregados da sessão anterior', '#5865F2');
                } catch(e) {}
            }
        }

        function pedirPermissaoNotificacao() {
            if (Notification.permission === 'default') {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        mostrarToast('🔔 Notificações ativadas!', '#23a55a');
                    }
                });
            }
        }

        document.getElementById('btnNovaConta').onclick = gerarDados;
        document.getElementById('btnCopiarDados').onclick = copiarDados;
        document.getElementById('btnAbrirDiscord').onclick = abrirDiscord;

        carregarDadosSalvos();
        pedirPermissaoNotificacao();

        if (!dadosAtuais.email) {
            setTimeout(gerarDados, 500);
        }
    </script>
</body>
</html>
