<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📬 Inbox Fake - Caixa de Entrada Temporária</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { color: #3b82f6; text-align: center; font-size: 28px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .sub { text-align: center; color: #64748b; margin-bottom: 28px; font-size: 14px; }
        .toolbar {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .email-info {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: #0f172a;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            font-size: 13px;
        }
        button:active { transform: scale(0.96); }
        .btn-outline { background: #64748b; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        .inbox {
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            overflow: hidden;
            background: #f8fafc;
            min-height: 450px;
            max-height: 550px;
            overflow-y: auto;
        }
        .email-item {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.1s;
        }
        .email-item:hover { background: #f1f5f9; }
        .email-item.unread { background: #eff6ff; border-left: 4px solid #3b82f6; }
        .email-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #475569;
        }
        .email-subject { font-weight: 700; color: #0f172a; margin-bottom: 6px; font-size: 15px; }
        .email-preview { font-size: 13px; color: #64748b; }
        .email-body {
            display: none;
            margin-top: 14px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .email-body.show { display: block; }
        .verification-code {
            background: #0f172a;
            color: #4ade80;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            margin: 12px 0;
        }
        .copy-code {
            background: #3b82f6;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
        }
        .empty-inbox {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #0f172a;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 999;
            animation: fadeUp 0.25s;
            font-size: 14px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .badge {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📬 Inbox Fake <span class="badge">simulada</span></h1>
        <p class="sub">Email temporário falso com caixa de entrada automática</p>

        <div class="toolbar">
            <div class="email-info" id="emailDisplay">carregando...</div>
            <div style="display: flex; gap: 8px;">
                <button id="newInboxBtn">🔄 NOVO EMAIL</button>
                <button id="refreshInboxBtn" class="btn-outline">🔄 ATUALIZAR</button>
                <button id="autoRefreshBtn" class="btn-warning">⏱️ AUTO (30s)</button>
            </div>
        </div>

        <div class="inbox" id="inboxContainer">
            <div class="empty-inbox">📭 Nenhum email ainda. Aguardando novas mensagens...</div>
        </div>
        <div style="font-size: 12px; text-align: center; margin-top: 20px; color: #94a3b8;">
            ⚡ Simulação de inbox | Os emails são gerados automaticamente para demonstração
        </div>
    </div>
</div>

<script>
    let currentEmail = '';
    let emailsList = [];
    let autoInterval = null;
    let autoActive = false;

    function showToast(msg, bg = '#0f172a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = bg;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function gerarEmailFalso() {
        const nomes = ['ana.silva', 'joao.santos', 'maria.lima', 'pedro.alves', 'carla.melo', 'rafael.costa', 'juliana.rocha', 'lucas.pereira', 'beatriz.oliveira', 'thiago.souza'];
        const dominios = ['tempmail.com', 'mailfake.com', '10minute.net', 'descartavel.com', 'inboxfake.com'];
        const nome = nomes[Math.floor(Math.random() * nomes.length)] + Math.floor(Math.random() * 999);
        const dominio = dominios[Math.floor(Math.random() * dominios.length)];
        return nome + '@' + dominio;
    }

    function gerarEmailAleatorio() {
        const caracteres = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let nome = '';
        for (let i = 0; i < 10; i++) nome += caracteres[Math.floor(Math.random() * caracteres.length)];
        const dominios = ['fakeinbox.com', 'temp-mail.io', 'guerrillamail.net', 'sharklasers.com'];
        return nome + '@' + dominios[Math.floor(Math.random() * dominios.length)];
    }

    function gerarMensagemFake(emailDestino) {
        const remetentes = [
            { from: 'no-reply@discord.com', subject: '🔐 Código de verificação do Discord', template: 'discord' },
            { from: 'verify@discord.com', subject: 'Verifique seu e-mail do Discord', template: 'discord' },
            { from: 'noreply@roblox.com', subject: 'Código de confirmação Roblox', template: 'roblox' },
            { from: 'bemvindo@discord.com', subject: 'Bem-vindo ao Discord!', template: 'welcome' },
            { from: 'security@discord.com', subject: 'Novo login detectado', template: 'login' },
            { from: 'contato@tempinbox.com', subject: 'Seu email temporário está ativo', template: 'generic' }
        ];
        const rand = remetentes[Math.floor(Math.random() * remetentes.length)];
        const codigo6 = Math.floor(100000 + Math.random() * 900000).toString();
        const codigo4 = Math.floor(1000 + Math.random() * 9000).toString();
        let body = '';
        
        if (rand.template === 'discord') {
            body = `Olá,\n\nSeu código de verificação do Discord é: ${codigo6}\n\nEste código expira em 10 minutos.\n\nSe você não solicitou, ignore este e-mail.\n\n— Equipe Discord`;
        } else if (rand.template === 'roblox') {
            body = `Olá,\n\nSeu código de verificação Roblox é: ${codigo6}\n\nUse este código para concluir seu login.\n\n— Roblox Team`;
        } else if (rand.template === 'welcome') {
            body = `Bem-vindo ao Discord!\n\nEstamos felizes em ter você. Complete seu perfil e comece a conversar.\n\nAtive sua conta com o código: ${codigo6}`;
        } else if (rand.template === 'login') {
            body = `Detectamos um novo login na sua conta.\n\nData: ${new Date().toLocaleString()}\nDispositivo: Navegador Chrome\n\nSe não foi você, redefina sua senha imediatamente.\n\nCódigo de segurança: ${codigo6}`;
        } else {
            body = `Seu email temporário ${emailDestino} foi criado com sucesso.\n\nVocê pode receber mensagens normalmente.\n\nQualquer dúvida, entre em contato.`;
        }
        
        return {
            id: Date.now() + Math.random(),
            from: rand.from,
            subject: rand.subject,
            preview: body.substring(0, 70) + '...',
            body: body,
            code: rand.template === 'discord' || rand.template === 'roblox' || rand.template === 'login' ? codigo6 : null,
            timestamp: new Date(),
            read: false
        };
    }

    function carregarInbox() {
        if (!currentEmail) return;
        const container = document.getElementById('inboxContainer');
        
        if (emailsList.length === 0) {
            container.innerHTML = '<div class="empty-inbox">📭 Nenhum email ainda. As mensagens chegarão automaticamente...</div>';
            return;
        }
        
        container.innerHTML = '';
        emailsList.forEach(email => {
            const div = document.createElement('div');
            div.className = 'email-item' + (email.read ? '' : ' unread');
            
            div.innerHTML = `
                <div class="email-header">
                    <span><strong>${email.from}</strong></span>
                    <span>${email.timestamp.toLocaleTimeString()} - ${email.timestamp.toLocaleDateString()}</span>
                </div>
                <div class="email-subject">${email.subject}</div>
                <div class="email-preview">${email.preview}</div>
                <div class="email-body" id="body-${email.id}">
                    ${email.body}
                    ${email.code ? `<div class="verification-code">🔐 CÓDIGO: ${email.code} <button class="copy-code-btn" data-code="${email.code}">📋 COPIAR</button></div>` : ''}
                </div>
            `;
            
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('copy-code-btn')) return;
                const bodyDiv = div.querySelector('.email-body');
                bodyDiv.classList.toggle('show');
                if (!email.read) {
                    email.read = true;
                    div.classList.remove('unread');
                }
            });
            
            const copyBtn = div.querySelector('.copy-code-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = copyBtn.getAttribute('data-code');
                    navigator.clipboard.writeText(code);
                    showToast(`📋 Código ${code} copiado!`, '#0f172a');
                });
            }
            
            container.appendChild(div);
        });
    }

    function adicionarEmailFake() {
        if (!currentEmail) return;
        const newEmail = gerarMensagemFake(currentEmail);
        emailsList.unshift(newEmail);
        carregarInbox();
        showToast(`📩 Nova mensagem: ${newEmail.subject}`, '#3b82f6');
        
        if (Notification.permission === 'granted') {
            new Notification('📬 Nova mensagem na inbox', {
                body: `${newEmail.from} - ${newEmail.subject}`,
                icon: 'https://cdn-icons-png.flaticon.com/512/732/732200.png'
            });
        }
    }

    function criarNovaInbox() {
        currentEmail = gerarEmailAleatorio();
        emailsList = [];
        document.getElementById('emailDisplay').innerText = currentEmail;
        carregarInbox();
        showToast(`📧 Novo email gerado: ${currentEmail}`, '#10b981');
        if (autoActive) {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                if (emailsList.length < 25) adicionarEmailFake();
            }, 30000);
        }
        setTimeout(() => adicionarEmailFake(), 2000);
        setTimeout(() => adicionarEmailFake(), 15000);
    }

    function atualizarManual() {
        if (!currentEmail) {
            showToast('⚠️ Gere um email primeiro', '#f59e0b');
            return;
        }
        adicionarEmailFake();
        showToast('🔄 Inbox atualizada manualmente', '#64748b');
    }

    function toggleAutoRefresh() {
        if (!currentEmail) {
            showToast('⚠️ Gere um email primeiro', '#f59e0b');
            return;
        }
        if (autoActive) {
            if (autoInterval) clearInterval(autoInterval);
            autoActive = false;
            document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s)';
            document.getElementById('autoRefreshBtn').style.background = '#f59e0b';
            showToast('⏸️ Auto-refresh desativado', '#475569');
        } else {
            autoActive = true;
            autoInterval = setInterval(() => {
                if (emailsList.length < 25) adicionarEmailFake();
            }, 30000);
            document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO ✅ ATIVO';
            document.getElementById('autoRefreshBtn').style.background = '#10b981';
            showToast('✅ Auto-refresh ativado (30s)', '#10b981');
        }
    }

    if (Notification.permission === 'default') Notification.requestPermission();

    document.getElementById('newInboxBtn').addEventListener('click', () => { criarNovaInbox(); });
    document.getElementById('refreshInboxBtn').addEventListener('click', () => { atualizarManual(); });
    document.getElementById('autoRefreshBtn').addEventListener('click', () => { toggleAutoRefresh(); });

    criarNovaInbox();
</script>
</body>
</html>
