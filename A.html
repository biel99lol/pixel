<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📬 INBOX REAL - Caixa de Entrada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { color: #3b82f6; text-align: center; font-size: 32px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .sub { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 14px; }
        .toolbar {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 28px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .email-box {
            background: #e2e8f0;
            padding: 10px 20px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
            color: #0f172a;
            word-break: break-all;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
        }
        button:active { transform: scale(0.96); }
        .btn-outline { background: #64748b; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        .inbox {
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            overflow: hidden;
            background: #f8fafc;
            min-height: 500px;
            max-height: 600px;
            overflow-y: auto;
        }
        .email-item {
            background: white;
            padding: 18px 22px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.1s;
        }
        .email-item:hover { background: #f1f5f9; }
        .email-item.unread { background: #eff6ff; border-left: 4px solid #3b82f6; }
        .email-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
            color: #475569;
        }
        .email-subject { font-weight: 700; color: #0f172a; margin-bottom: 8px; font-size: 16px; }
        .email-preview { font-size: 13px; color: #64748b; }
        .email-body {
            display: none;
            margin-top: 16px;
            padding: 18px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .email-body.show { display: block; }
        .verification-code {
            background: #0f172a;
            color: #4ade80;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 22px;
            text-align: center;
            letter-spacing: 4px;
            margin: 12px 0;
        }
        .copy-code {
            background: #3b82f6;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
        }
        .empty-inbox {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #0f172a;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 999;
            animation: fadeUp 0.25s;
            font-size: 14px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .badge {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📬 INBOX REAL <span class="badge">FUNCIONAL</span></h1>
        <p class="sub">Email temporário com caixa de entrada real (API 1secmail)</p>

        <div class="toolbar">
            <div class="email-box" id="emailDisplay">🔁 Clique em "NOVO EMAIL"</div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="newEmailBtn">🔄 NOVO EMAIL</button>
                <button id="refreshBtn" class="btn-outline">🔄 ATUALIZAR</button>
                <button id="autoRefreshBtn" class="btn-warning">⏱️ AUTO (30s)</button>
            </div>
        </div>

        <div class="inbox" id="inboxContainer">
            <div class="empty-inbox">📭 Nenhum email ainda. Clique em "NOVO EMAIL" para começar.</div>
        </div>
        <div style="font-size: 12px; text-align: center; margin-top: 18px; color: #94a3b8;">
            ✅ Os emails chegam de verdade | Códigos de verificação aparecem no inbox
        </div>
    </div>
</div>

<script>
    let currentLogin = '';
    let currentDomain = '';
    let currentEmail = '';
    let messagesList = [];
    let autoInterval = null;
    let autoActive = false;

    function showToast(msg, bg = '#0f172a') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = bg;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function criarEmail() {
        showToast('🔄 Criando email real...', '#3b82f6');
        try {
            const dominios = ['1secmail.com', '1secmail.org', '1secmail.net'];
            const randomDomain = dominios[Math.floor(Math.random() * dominios.length)];
            const nome = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            currentLogin = nome;
            currentDomain = randomDomain;
            currentEmail = nome + '@' + randomDomain;
            document.getElementById('emailDisplay').innerText = currentEmail;
            messagesList = [];
            renderInbox();
            showToast(`✅ Email criado: ${currentEmail}`, '#10b981');
            setTimeout(() => checkInbox(true), 2000);
        } catch(e) {
            showToast('❌ Erro, tentando novamente...', '#ef4444');
            setTimeout(() => criarEmail(), 1000);
        }
    }

    async function checkInbox(notify = false) {
        if (!currentLogin || !currentDomain) return;
        try {
            const url = `https://www.1secmail.com/api/v1/?action=getMessages&login=${currentLogin}&domain=${currentDomain}`;
            const response = await fetch(url);
            const data = await response.json();
            if (!Array.isArray(data)) return;
            
            if (data.length > messagesList.length) {
                const newMsgs = data.slice(messagesList.length);
                for (const msg of newMsgs) {
                    const full = await getFullMessage(msg.id);
                    messagesList.push(full);
                }
                renderInbox();
                if (notify && newMsgs.length) {
                    showToast(`📩 ${newMsgs.length} nova(s) mensagem(ns)!`, '#3b82f6');
                    if (Notification.permission === 'granted') {
                        new Notification('📬 Nova mensagem!', {
                            body: `${newMsgs.length} email(s) recebido(s) em ${currentEmail}`,
                            icon: 'https://cdn-icons-png.flaticon.com/512/732/732200.png'
                        });
                    }
                }
            }
        } catch(e) { console.log(e); }
    }

    async function getFullMessage(id) {
        try {
            const url = `https://www.1secmail.com/api/v1/?action=readMessage&login=${currentLogin}&domain=${currentDomain}&id=${id}`;
            const res = await fetch(url);
            const data = await res.json();
            return {
                id: id,
                from: data.from || 'remetente@desconhecido',
                subject: data.subject || 'Sem assunto',
                date: data.date || new Date().toISOString(),
                body: data.textBody || data.htmlBody || 'Conteúdo não disponível',
                read: false
            };
        } catch(e) {
            return { id, from: 'erro@api.com', subject: 'Erro', date: new Date().toISOString(), body: 'Erro ao carregar', read: false };
        }
    }

    function extractCode(text) {
        const match = text.match(/\b(\d{6})\b/);
        return match ? match[0] : null;
    }

    function formatDate(d) {
        try { return new Date(d).toLocaleString(); } catch(e) { return d; }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderInbox() {
        const container = document.getElementById('inboxContainer');
        if (!messagesList.length) {
            container.innerHTML = '<div class="empty-inbox">📭 Nenhum email ainda. Aguarde ou atualize.</div>';
            return;
        }
        container.innerHTML = '';
        for (const msg of messagesList) {
            const div = document.createElement('div');
            div.className = 'email-item' + (msg.read ? '' : ' unread');
            const preview = msg.body.substring(0, 90);
            const code = extractCode(msg.body);
            div.innerHTML = `
                <div class="email-header">
                    <span><strong>${escapeHtml(msg.from)}</strong></span>
                    <span>${formatDate(msg.date)}</span>
                </div>
                <div class="email-subject">${escapeHtml(msg.subject)}</div>
                <div class="email-preview">${escapeHtml(preview)}...</div>
                <div class="email-body" id="body-${msg.id}">
                    <div style="white-space: pre-wrap;">${escapeHtml(msg.body)}</div>
                    ${code ? `<div class="verification-code">🔐 CÓDIGO: ${code} <button class="copy-btn" data-code="${code}">📋 COPIAR</button></div>` : ''}
                </div>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('copy-btn')) return;
                const b = div.querySelector('.email-body');
                b.classList.toggle('show');
                if (!msg.read) { msg.read = true; div.classList.remove('unread'); }
            });
            const btn = div.querySelector('.copy-btn');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = btn.getAttribute('data-code');
                    navigator.clipboard.writeText(code);
                    showToast(`📋 Código ${code} copiado!`, '#10b981');
                });
            }
            container.appendChild(div);
        }
    }

    function startAuto() {
        if (autoInterval) clearInterval(autoInterval);
        autoActive = true;
        autoInterval = setInterval(() => { if (currentLogin) checkInbox(true); }, 30000);
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO ✅ ATIVO';
        document.getElementById('autoRefreshBtn').style.background = '#10b981';
        showToast('✅ Auto-refresh ativado (30s)', '#10b981');
    }

    function stopAuto() {
        if (autoInterval) clearInterval(autoInterval);
        autoActive = false;
        document.getElementById('autoRefreshBtn').innerHTML = '⏱️ AUTO (30s)';
        document.getElementById('autoRefreshBtn').style.background = '#f59e0b';
        showToast('⏸️ Auto-refresh desativado', '#64748b');
    }

    document.getElementById('newEmailBtn').onclick = () => { stopAuto(); criarEmail(); if (autoActive) startAuto(); };
    document.getElementById('refreshBtn').onclick = async () => { if (!currentLogin) { showToast('⚠️ Crie um email primeiro', '#f59e0b'); return; } showToast('🔄 Verificando...', '#3b82f6'); await checkInbox(true); showToast('✅ Atualizado', '#10b981'); };
    document.getElementById('autoRefreshBtn').onclick = () => { if (!currentLogin) { showToast('⚠️ Crie um email primeiro', '#f59e0b'); return; } autoActive ? stopAuto() : startAuto(); };

    if (Notification.permission === 'default') Notification.requestPermission();
    criarEmail();
</script>
</body>
</html>
